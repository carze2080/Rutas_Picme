  document.getElementById('tabs').innerHTML = `
    <button class="tab on" onclick="swAdmTab('dashboard',this)"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
    <button class="tab" onclick="swAdmTab('conciliacion',this)"><i class="ti ti-git-compare"></i>Conciliación</button>
    <button class="tab" onclick="swAdmTab('gerencial',this)"><i class="ti ti-chart-bar"></i>Gerencial</button>
    <button class="tab" onclick="swAdmTab('cobros',this)"><i class="ti ti-cash-register"></i>Cobros</button>
    <button class="tab" onclick="swAdmTab('pendientes',this)"><i class="ti ti-alert-circle"></i>Pendientes</button>
    <button class="tab" onclick="swAdmTab('historial',this)"><i class="ti ti-history"></i>Historial</button>
    <button class="tab" onclick="swAdmTab('clientes',this)"><i class="ti ti-users"></i>Clientes</button>
    <button class="tab" onclick="swAdmTab('cargar',this)"><i class="ti ti-upload"></i>Cargar Ruta</button>
    ${isSuper ? '<button class="tab" onclick="swAdmTab(\'permisos\',this)"><i class="ti ti-calendar-check"></i>Permisos <span style=\'background:#dc2626;color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;margin-left:3px\'>SUPER</span></button>' : ''}
    <button class="tab" onclick="swAdmTab('config',this)"><i class="ti ti-settings"></i>Config${isSuper?' <span style=\'background:#185FA5;color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;margin-left:3px\'>SUPER</span>':''}</button>
  `;
  CURRENT_TAB = 'dashboard';
  renderDashboard();
  // Escuchar cambios en rutas de hoy en tiempo real
  try {
    const q = query(collection(db,'rutas'), where('fecha','==',hoy()));
    const unsub = onSnapshot(q, (snap) => {
      setCache('rutasHoy', snap.docs.map(d => ({...d.data(), _id:d.id})));
      mergeRutasHoyEnTodas(CACHE.rutasHoy);
      document.getElementById('tb-sync').textContent = '🟢 En vivo · '+snap.size+' facturas';
      if (CURRENT_TAB === 'dashboard') renderDashboard();
    });
    unsubscribes.push(unsub);

    const unsubPend = onSnapshot(
      query(collection(db,'pendientes'), where('estado','==','pendiente')),
      (snap) => { setCache('pendientes', snap.docs.map(d => ({...d.data(), _id:d.id}))); }
    );
    unsubscribes.push(unsubPend);
  } catch(e) {
    document.getElementById('tb-sync').textContent = '⚠ Sin conexión';
  }
}

function swAdmTab(id, el) {
  CURRENT_TAB = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  if (id==='dashboard') renderDashboard();
  else if (id==='conciliacion') renderConciliacion();
  else if (id==='gerencial') renderGerencial();
  else if (id==='cobros') renderCobros();
  else if (id==='pendientes') renderPendientes();
  else if (id==='historial') renderHistorialAdmin();
  else if (id==='clientes') renderClientes();
  else if (id==='cargar') renderCargar();
  else if (id==='permisos') renderPermisos();
  else if (id==='config') renderConfig();
}
window.swAdmTab = swAdmTab;

// Función global para cambiar fecha desde el input
window.cambiarFechaDash = function(val) {
  dashFechaSeleccionada = val || hoy();
  renderDashboard();
};
window.irAHoyDash = function() {
  dashFechaSeleccionada = hoy();
  renderDashboard();
};

async function renderDashboard() {
  // Usar la variable de estado, no el DOM (el DOM se regenera en cada render)
  const dashFecha = dashFechaSeleccionada || hoy();
  const esHoy = dashFecha === hoy();
  const content = document.getElementById('content');

  try {
    if (esHoy) {
      if (!cacheOk('rutasHoy')) {
        content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
        const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',hoy())));
        setCache('rutasHoy', snap.docs.map(d => ({...d.data(), _id:d.id})));
      }
    } else {
      const cacheKeyFecha = 'rutasFecha_' + dashFecha;
      if (!cacheOk(cacheKeyFecha, 300000)) {
        content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
        const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',dashFecha)));
        setCache(cacheKeyFecha, snap.docs.map(d => ({...d.data(), _id:d.id})));
      }
    }
  } catch(e) {
    content.innerHTML = '<div class="empty"><i class="ti ti-wifi-off" style="color:var(--amber)"></i><p style="color:var(--amber)">Sin conexión a la base de datos.<br>Verifica tu conexión a internet.</p></div>';
    return;
  }

  const cacheKey = esHoy ? 'rutasHoy' : 'rutasFecha_' + dashFecha;
  const rutasRaw = CACHE[cacheKey] || [];

  // AUDITORÍA v18: contar emitidas del día desde Firestore (fuente compartida entre dispositivos)
  let emitidasCount = 0;
  try {
    const emSnap = await getDocs(query(collection(db, 'facturas_emitidas'), where('fechaConciliacion', '==', dashFecha)));
    emitidasCount = emSnap.size;
  } catch(e) { emitidasCount = 0; }

  const kpis = calcKPIsOperativos(rutasRaw, { emitidas: emitidasCount });
  const rutas = rutasRaw.filter(r => r.estado !== 'reprogramada');
  const total = kpis.asignadas;
  const ent = kpis.entregadas;
  const noEnt = kpis.noEntregadas;
  const pend = kpis.pendientes;
  const parciales = rutas.filter(r=>r.estado==='parcial' || r.entregaParcial).length;
  const extraviadas_hoy = rutas.filter(r=>r.estado==='extraviada').length;
  const totalContado = rutas.filter(r=>r.tipoPago==='Contado' && r.estado==='entregada').length;
  const pctConc = total ? Math.round((total-pend)/total*100) : 0;
  const pct = kpis.pctCumplimiento;

  // ── Tiempo promedio de entrega ──────────────────────────
  // horaEnt está en formato HH:MM (hora El Salvador, misma fecha)
  function parseMins(hhmm) {
    if (!hhmm) return null;
    const parts = hhmm.match(/(\d{1,2}):(\d{2})/);
    if (!parts) return null;
    return parseInt(parts[1]) * 60 + parseInt(parts[2]);
  }
  // Para cada entrega que tenga horaEnt, calculamos cuánto tiempo llevan entregando
  // usando la primera entrega del día como referencia de inicio
  const entregadas = rutas.filter(r => r.estado === 'entregada' && r.horaEnt);
  let avgEntregaStr = '—';
  let totalEntregaMin = 0;
  let countEntrega = 0;
  if (entregadas.length >= 2) {
    const minutos = entregadas.map(r => parseMins(r.horaEnt)).filter(m => m !== null).sort((a,b)=>a-b);
    const inicio = minutos[0];
    const diffs = minutos.slice(1).map(m => m - inicio);
    if (diffs.length) {
      const avg = Math.round(diffs.reduce((a,b)=>a+b,0) / diffs.length);
      avgEntregaStr = avg >= 60 ? `${Math.floor(avg/60)}h ${avg%60}m` : `${avg} min`;
    }
  } else if (entregadas.length === 1) {
    avgEntregaStr = 'N/A';
  }

  const motoristas = USUARIOS.filter(u => u.rol === 'motorista');

  let h = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--gray-900);letter-spacing:.5px">
        <i class="ti ti-calendar" style="color:var(--blue)"></i>
        ${esHoy ? 'Hoy — '+fmtFecha(hoy()) : 'Resultados: '+fmtFecha(dashFecha)}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="date" id="dash-fecha" value="${dashFecha}" max="2099-12-31"
          onchange="cambiarFechaDash(this.value)"
          style="padding:6px 10px;font-size:13px;border:1.5px solid var(--gray-200);border-radius:var(--rs);font-family:Barlow,sans-serif;color:var(--gray-700)">
        ${!esHoy ? `<button onclick="irAHoyDash()" style="padding:6px 10px;background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer">Hoy</button>` : ''}
      </div>
    </div>
    <!-- AUDITORÍA v18: KPIs ejecutivos ampliados -->
    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-num">${kpis.emitidas || total}</div><div class="stat-label">${kpis.emitidas ? 'Emitidas (CSV)' : 'Asignadas'}</div></div>
      <div class="stat-card" style="border-top:3px solid var(--blue-mid)"><div class="stat-num">${total}</div><div class="stat-label">Asignadas</div></div>
      <div class="stat-card green"><div class="stat-num">${ent}</div><div class="stat-label">Entregadas</div></div>
      <div class="stat-card amber"><div class="stat-num">${pend}</div><div class="stat-label">Pendientes</div></div>
    </div>
    <div class="stats-grid" style="margin-top:-4px">
      <div class="stat-card red"><div class="stat-num">${noEnt}</div><div class="stat-label">No Entregadas</div></div>
      <div class="stat-card" style="border-top:3px solid #7c3aed"><div class="stat-num" style="color:#7c3aed">${kpis.reprogramadas}</div><div class="stat-label">Reprogramadas</div></div>
      <div class="stat-card" style="border-top:3px solid var(--gray-400)"><div class="stat-num">${kpis.anuladas}</div><div class="stat-label">Anuladas</div></div>
      <div class="stat-card" style="border-top:3px solid var(--blue)"><div class="stat-num" style="color:var(--blue)">${pct}%</div><div class="stat-label">% Cumplimiento</div></div>
    </div>
    <!-- KPI Row 2: logísticos -->
    <div class="stats-grid" style="margin-top:-4px">
      <div class="stat-card" style="border-top:3px solid #6b21a8">
        <div class="stat-num" style="color:#6b21a8">${extraviadas_hoy}</div>
        <div class="stat-label">Extraviadas</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--blue)">
        <div class="stat-num" style="color:var(--blue)">${pctConc}%</div>
        <div class="stat-label">Conciliación</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--green)">
        <div class="stat-num" style="color:var(--green)">${totalContado}</div>
        <div class="stat-label">Cobros Contado</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--gray-300)">
        <div class="stat-num" style="color:var(--gray-700)">${parciales}</div>
        <div class="stat-label">Parciales</div>
      </div>
    </div>
    <!-- Tiempo promedio de entrega -->
    <div class="card" style="margin-bottom:14px;border-top:3px solid var(--blue-mid)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="ti ti-clock-hour-4" style="font-size:22px;color:var(--blue)"></i>
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500)">Tiempo Promedio entre Entregas</div>
            <div style="font-size:11px;color:var(--gray-500);margin-top:2px">Calculado sobre ${entregadas.length} entrega${entregadas.length!==1?'s':''} con hora registrada</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--blue);line-height:1">${avgEntregaStr}</div>
          ${entregadas.length < 2 ? '<div style="font-size:11px;color:var(--gray-500);margin-top:2px">Mínimo 2 entregas para calcular</div>' : ''}
        </div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600;color:var(--gray-700)">Progreso general del día</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--blue)">${pct}%</span>
      </div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    </div>

    <!-- DONUT GENERAL -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Distribución general de entregas</div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="flex:0 0 auto">
          <canvas id="chart-donut" width="190" height="190"></canvas>
        </div>
        <div style="flex:1;min-width:140px" id="donut-legend"></div>
      </div>
    </div>

    <!-- EFICIENCIA POR MOTORISTA -->
    <div class="card-title" style="margin-top:4px">Eficiencia por Motorista</div>
  `;

  motoristas.forEach(mot => {
    const mrs = rutas.filter(r => r.motorista === mot.id);
    if (!mrs.length) return;
    const mEnt  = mrs.filter(r=>r.estado==='entregada').length;
    const mNo   = mrs.filter(r=>r.estado==='no-entregada').length;
    const mPend = mrs.filter(r=>r.estado==='pendiente').length;
    const mPct  = mrs.length ? Math.round(mEnt/mrs.length*100) : 0;

    const efColor  = mPct >= 80 ? '#1e7d3a' : mPct >= 50 ? '#a05c00' : '#c0392b';
    const efColorV = mPct >= 80 ? 'var(--green)' : mPct >= 50 ? 'var(--amber)' : 'var(--red)';
    const efBg     = mPct >= 80 ? 'var(--green-bg)' : mPct >= 50 ? 'var(--amber-bg)' : 'var(--red-bg)';

    // SVG gauge — escala perfecta en cualquier densidad de pantalla
    const R = 34, SW = 8, CX = 44, CY = 44, SIZE = 88;
    const circ = 2 * Math.PI * R;
    const dash = (mPct / 100) * circ;
    const gap  = circ - dash;

    const svgGauge = `<svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" xmlns="http://www.w3.org/2000/svg">
      <!-- Track gris -->
      <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#eef2f7" stroke-width="${SW}" stroke-linecap="round"/>
      <!-- Arco coloreado (empieza en la parte de arriba: rotate -90) -->
      <circle cx="${CX}" cy="${CY}" r="${R}" fill="none"
        stroke="${efColor}" stroke-width="${SW}" stroke-linecap="round"
        stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
        transform="rotate(-90 ${CX} ${CY})"/>
      <!-- Texto porcentaje -->
      <text x="${CX}" y="${CY - 3}" text-anchor="middle" dominant-baseline="middle"
        font-family="'Barlow Condensed',sans-serif" font-size="17" font-weight="800" fill="${efColor}">${mPct}%</text>
      <text x="${CX}" y="${CY + 14}" text-anchor="middle" dominant-baseline="middle"
        font-family="'Barlow',sans-serif" font-size="8" font-weight="600" fill="#7a90aa" letter-spacing="0.5">EFIC.</text>
    </svg>`;

    h += `<div class="mot-card" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">

      <div style="flex:1;min-width:160px">

        <div style="display:flex;flex-wrap:wrap;gap:6px">

          </span>
          <span style="background:var(--green-bg);color:var(--green);border-radius:var(--rs);padding:5px 10px;font-size:12px;font-weight:700">
            <i class="ti ti-check"></i> ${mEnt} entregadas
          </span>
          <span style="background:var(--amber-bg);color:var(--amber);border-radius:var(--rs);padding:5px 10px;font-size:12px;font-weight:700">
            <i class="ti ti-clock"></i> ${mPend} pendientes
          </span>
          <span style="background:var(--red-bg);color:var(--red);border-radius:var(--rs);padding:5px 10px;font-size:12px;font-weight:700">
            <i class="ti ti-x"></i> ${mNo} no entregadas
          </span>
        </div>
      </div>

// ── CHART HELPERS — alta calidad con Canvas ──────────────
const CHART_FONT = "'Barlow', 'Segoe UI', sans-serif";
const CHART_FONT_COND = "'Barlow Condensed', 'Arial Narrow', sans-serif";

function dpr() { return window.devicePixelRatio || 1; }

function setupCanvas(canvas) {
  // HiDPI support para pantallas retina
  const rect = canvas.getBoundingClientRect();
  const ratio = dpr();
  canvas.width = (rect.width || canvas.offsetWidth || 300) * ratio;
  canvas.height = canvas.height * ratio;
  const ctx = canvas.getContext('2d');
  ctx.scale(ratio, ratio);
  return ctx;
}

function drawDonut(ctxRaw, data, labels, colors) {
  const canvas = ctxRaw.canvas;
  const ratio = dpr();
  const W = canvas.width / ratio;
  const H = canvas.height / ratio;
  const ctx = ctxRaw;
  ctx.clearRect(0,0,W,H);

  const total = data.reduce((a,b)=>a+b,0);
  const cx = W/2, cy = H*0.44;
  const r = Math.min(W, H*0.88) * 0.36;
  const ir = r * 0.60;

  if (!total) {
    ctx.fillStyle = '#dce4ef';
    ctx.font = `13px ${CHART_FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText('Sin datos', cx, cy+4);
    return;
  }

  // Draw slices with gap
  let start = -Math.PI/2;
  const gap = 0.025;
  data.forEach((v,i) => {
    if (!v) return;
    const slice = (v/total)*2*Math.PI - gap;
    // Shadow
    ctx.save();
    ctx.shadowColor = colors[i]+'55';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r, start+gap/2, start+gap/2+slice);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.restore();
    start += slice + gap;
  });

  // Donut hole
  ctx.beginPath();
  ctx.arc(cx,cy,ir,0,2*Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Center: show biggest segment value
  const maxIdx = data.indexOf(Math.max(...data));
  ctx.textAlign = 'center';
  ctx.fillStyle = colors[maxIdx];
  ctx.font = `bold 22px ${CHART_FONT_COND}`;
  ctx.fillText(data[maxIdx], cx, cy-2);
  ctx.fillStyle = '#7a90aa';
  ctx.font = `10px ${CHART_FONT}`;
  ctx.fillText(labels[maxIdx].toLowerCase(), cx, cy+13);

  // Legend row at bottom
  const legY = H - 10;
  const colW = W / data.length;
  data.forEach((v,i) => {
    const lx = colW*i + colW/2;
    ctx.fillStyle = colors[i];
    ctx.beginPath(); ctx.arc(lx-28, legY-4, 5, 0, 2*Math.PI); ctx.fill();
    ctx.fillStyle = '#3d5168';
    ctx.font = `10px ${CHART_FONT}`;
    ctx.textAlign = 'left';
    const pct = total ? Math.round(v/total*100) : 0;
    ctx.fillText(`${v} · ${pct}%`, lx-20, legY);
    ctx.fillStyle = '#7a90aa';
    ctx.font = `9px ${CHART_FONT}`;
    ctx.fillText(labels[i], lx-20, legY+11);
  });
}

function drawBar(ctxRaw, labels, vals, tots) {
  const canvas = ctxRaw.canvas;
  const ratio = dpr();
  const W = canvas.width / ratio;
  const H = canvas.height / ratio;
  const ctx = ctxRaw;
  ctx.clearRect(0,0,W,H);

  const padL=32, padB=32, padT=12, padR=10;
  const bw = (W-padL-padR) / labels.length;
  const maxV = Math.max(...tots, 1);
  const bh = H - padB - padT;

  // Background grid
  const gridCount = 4;
  for (let g=0; g<=gridCount; g++) {
    const p = g/gridCount;
    const y = padT + bh*(1-p);
    ctx.strokeStyle = g===0 ? '#dce4ef' : '#f0f4f8';
    ctx.lineWidth = g===0 ? 1.5 : 1;
    ctx.setLineDash(g===0 ? [] : [4,4]);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.setLineDash([]);
    if (g > 0) {
      ctx.fillStyle='#bbc8da'; ctx.font=`9px ${CHART_FONT}`; ctx.textAlign='right';
      ctx.fillText(Math.round(maxV*p), padL-4, y+3);
    }
  }

  labels.forEach((l,i) => {
    const x = padL + i*bw + bw*0.10;
    const w = bw * 0.80;
    const motColors = ['#185FA5','#1a8a5c','#a05c00','#7b2d8b','#c0392b'];
    const color = motColors[i % motColors.length];

    // Background bar
    const thFull = tots[i] > 0 ? Math.max((tots[i]/maxV)*bh, 3) : 0;
    ctx.fillStyle = color+'22';
    roundRect(ctx, x, padT+bh-thFull, w, thFull, 4);
    ctx.fill();

    // Value bar with gradient
    const th = vals[i] > 0 ? Math.max((vals[i]/maxV)*bh, 3) : 0;
    if (th > 0) {
      const grad = ctx.createLinearGradient(0, padT+bh-th, 0, padT+bh);
      grad.addColorStop(0, color);
      grad.addColorStop(1, color+'bb');
      ctx.fillStyle = grad;
      roundRect(ctx, x, padT+bh-th, w, th, 4);
      ctx.fill();
    }

    // Count label inside bar
    if (th > 18) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold 11px ${CHART_FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText(vals[i], x+w/2, padT+bh-th+13);
    } else if (vals[i] > 0) {
      ctx.fillStyle = color;
      ctx.font = `bold 11px ${CHART_FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText(vals[i], x+w/2, padT+bh-th-4);
    }

    // X label
    ctx.fillStyle = '#7a90aa';
    ctx.font = `9px ${CHART_FONT}`;
    ctx.textAlign = 'center';
    const shortL = l.length > 7 ? l.substring(0,7)+'…' : l;
    ctx.fillText(shortL, x+w/2, H-8);

    // Percentage
    const pct = tots[i] ? Math.round(vals[i]/tots[i]*100) : 0;
    ctx.fillStyle = '#bbc8da';
    ctx.font = `9px ${CHART_FONT}`;
    ctx.fillText(pct+'%', x+w/2, H-18);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  if (h <= 0) return;
  r = Math.min(r, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawLine(ctxRaw, labels, ent, noEnt) {
  const canvas = ctxRaw.canvas;
  const ratio = dpr();
  const W = canvas.width / ratio;
  const H = canvas.height / ratio;
  const ctx = ctxRaw;
  ctx.clearRect(0,0,W,H);

  const padL=36, padB=30, padT=28, padR=16;
  const n = labels.length;
  const maxV = Math.max(...ent, ...noEnt, 1);
  const bh = H - padB - padT;
  const step = n > 1 ? (W-padL-padR)/(n-1) : 0;

  // Grid
  const gridLines = 4;
  for (let g=0; g<=gridLines; g++) {
    const p = g/gridLines;
    const y = padT + bh*(1-p);
    ctx.strokeStyle = g===0 ? '#dce4ef' : '#f0f4f8';
    ctx.lineWidth = 1;
    ctx.setLineDash(g===0 ? [] : [3,3]);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#bbc8da'; ctx.font=`9px ${CHART_FONT}`; ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*p), padL-4, y+3);
  }

  function getPoints(data) {
    return data.map((v,i)=>({ x: padL+i*step, y: padT+bh - Math.min(v/maxV,1)*bh, v }));
  }

  function drawSmoothArea(data, lineColor, fillColor) {
    const p = getPoints(data);
    if (!p.length) return;
    // Fill area
    ctx.beginPath();
    ctx.moveTo(p[0].x, padT+bh);
    p.forEach((pt,i) => {
      if (i===0) { ctx.lineTo(pt.x, pt.y); return; }
      const prev = p[i-1];
      const cpx = (prev.x+pt.x)/2;
      ctx.bezierCurveTo(cpx, prev.y, cpx, pt.y, pt.x, pt.y);
    });
    ctx.lineTo(p[p.length-1].x, padT+bh);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, padT, 0, padT+bh);
    grad.addColorStop(0, fillColor);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fill();
    // Smooth line
    ctx.strokeStyle = lineColor; ctx.lineWidth = 2.5;
    ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.beginPath();
    p.forEach((pt,i) => {
      if (i===0) { ctx.moveTo(pt.x, pt.y); return; }
      const prev = p[i-1];
      const cpx = (prev.x+pt.x)/2;
      ctx.bezierCurveTo(cpx, prev.y, cpx, pt.y, pt.x, pt.y);
    });
    ctx.stroke();
    // Dots with value tooltip
    p.forEach(pt => {
      ctx.beginPath(); ctx.arc(pt.x, pt.y, 4.5, 0, 2*Math.PI);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = lineColor; ctx.lineWidth = 2.5; ctx.stroke();
      ctx.lineWidth = 1;
      if (pt.v > 0) {
        ctx.fillStyle = lineColor;
        ctx.font = `bold 9px ${CHART_FONT}`;
        ctx.textAlign = 'center';
        ctx.fillText(pt.v, pt.x, pt.y-8);
      }
    });
  }

  drawSmoothArea(noEnt, '#c0392b', 'rgba(192,57,43,0.12)');
  drawSmoothArea(ent, '#1e7d3a', 'rgba(30,125,58,0.14)');

  // X axis labels
  labels.forEach((l,i) => {
    ctx.fillStyle = '#7a90aa'; ctx.font=`9px ${CHART_FONT}`; ctx.textAlign='center';
    ctx.fillText(l, padL+i*step, H-8);
  });

  // Legend top-right
  const legData = [['Entregadas','#1e7d3a'],['No entregadas','#c0392b']];
  legData.forEach(([t,c],i) => {
    const lx = padL + i*120;
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(lx+5, padT-10, 5, 0, 2*Math.PI); ctx.fill();
    ctx.fillStyle='#3d5168'; ctx.font=`10px ${CHART_FONT}`; ctx.textAlign='left';
    ctx.fillText(t, lx+14, padT-6);
  });
}

async function renderHistorialAdmin() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
  try {
    if (!cacheOk('rutasTodas', 60000)) {
      const snap = await getDocs(collection(db,'rutas'));
      setCache('rutasTodas', snap.docs.map(d => ({...d.data(), _id:d.id})));
    }
  } catch(e) {
    content.innerHTML = '<div class="empty"><i class="ti ti-wifi-off" style="color:var(--amber)"></i><p>Error de conexión</p></div>';
    return;
  }
  renderHistorialFiltrado();
}

function renderHistorialFiltrado() {
  const all = CACHE.rutasTodas || [];
  const motoristas = USUARIOS.filter(u => u.rol === 'motorista');

  // Obtener filtros actuales
  const filtFecha = document.getElementById('hist-filtFecha')?.value || '';
  const filtMot   = document.getElementById('hist-filtMot')?.value || '';
  const filtEst   = document.getElementById('hist-filtEst')?.value || '';

  let filtered = all.filter(r => {
    if (filtFecha && r.fecha !== filtFecha) return false;
    if (filtMot   && r.motorista !== filtMot) return false;
    if (filtEst   && r.estado !== filtEst) return false;
    return true;
  });

  const byDate = {};
  filtered.forEach(r => {
    const f = r.fecha || '—';
    if (!byDate[f]) byDate[f] = [];
    byDate[f].push(r);
  });
  const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

  // Totales filtrados
  const totEnt = filtered.filter(r=>r.estado==='entregada').length;
  const totNo  = filtered.filter(r=>r.estado==='no-entregada').length;
  const totMonto = filtered.filter(r=>r.estado==='entregada'&&r.tipoPago==='Contado')
                           .reduce((a,r)=>a+(parseFloat(r.monto)||0),0);

  let h = `
    <!-- FILTROS -->
    <div class="card">
      <div class="card-title" style="margin-bottom:12px">Filtros</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div>
          <label>Fecha</label>
          <input type="date" id="hist-filtFecha" value="${filtFecha}"
            onchange="renderHistorialFiltrado()"
            style="padding:8px 10px;font-size:14px;border:1.5px solid var(--gray-200);border-radius:var(--rs);width:100%;font-family:Barlow,sans-serif">
        </div>
        <div>
          <label>Motorista</label>
          <select id="hist-filtMot" onchange="renderHistorialFiltrado()"
            style="padding:8px 10px;font-size:14px;border:1.5px solid var(--gray-200);border-radius:var(--rs);width:100%;font-family:Barlow,sans-serif">
            <option value="">Todos</option>
            ${motoristas.map(m=>`<option value="${m.id}" ${filtMot===m.id?'selected':''}>${esc(m.nombre)}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Estado</label>
          <select id="hist-filtEst" onchange="renderHistorialFiltrado()"
            style="padding:8px 10px;font-size:14px;border:1.5px solid var(--gray-200);border-radius:var(--rs);width:100%;font-family:Barlow,sans-serif">
            <option value="">Todos</option>
            <option value="entregada" ${filtEst==='entregada'?'selected':''}>Entregadas</option>
            <option value="no-entregada" ${filtEst==='no-entregada'?'selected':''}>No entregadas</option>
            <option value="pendiente" ${filtEst==='pendiente'?'selected':''}>Pendientes</option>
          </select>
        </div>
      </div>
      ${filtFecha||filtMot||filtEst ? `<button onclick="limpiarFiltrosHist()"
        style="margin-top:10px;background:none;border:1px solid var(--gray-200);border-radius:var(--rs);padding:6px 14px;font-size:12px;cursor:pointer;color:var(--gray-500);font-family:Barlow,sans-serif">
        <i class="ti ti-x"></i> Limpiar filtros
      </button>` : ''}
    </div>

    <!-- RESUMEN FILTRADO -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
      <div class="stat-card green"><div class="stat-num">${totEnt}</div><div class="stat-label">Entregadas</div></div>
      <div class="stat-card red"><div class="stat-num">${totNo}</div><div class="stat-label">No entregadas</div></div>
      <div class="stat-card blue"><div class="stat-num">$${totMonto.toFixed(0)}</div><div class="stat-label">Cobrado contado</div></div>
    </div>

    <div style="text-align:right;margin-bottom:12px;display:flex;justify-content:flex-end;gap:8px">
      <button class="btn-pdf" onclick="exportarPDFHistorial()">
        <i class="ti ti-file-type-pdf"></i> PDF Historial
      </button>
      <button class="btn bs" style="width:auto;padding:8px 16px;display:inline-flex" onclick="expTodo()">
        <i class="ti ti-download"></i> Exportar CSV
      </button>
    </div>`;

  if (!dates.length) {
    h += '<div class="empty"><i class="ti ti-history"></i><p>Sin resultados con los filtros aplicados</p></div>';
  } else {
    dates.forEach(fecha => {
      const items = byDate[fecha];
      const ent = items.filter(r=>r.estado==='entregada').length;
      const noEnt = items.filter(r=>r.estado==='no-entregada').length;
      const pend = items.filter(r=>r.estado==='pendiente').length;
      const contado = items.filter(r=>r.estado==='entregada'&&r.tipoPago==='Contado')
                           .reduce((a,r)=>a+(parseFloat(r.monto)||0),0);
      h += `<div class="hday">
        <div class="hday-hdr" onclick="toggleDay(this)">
          <div>
            <div class="hday-title">${fmtFecha(fecha)}</div>
            <div style="font-size:12px;color:var(--gray-500);margin-top:2px">
              ${items.length} facturas · <span style="color:var(--green)">${ent} entregadas</span> · <span style="color:var(--red)">${noEnt} no entregadas</span> · ${pend} pendientes
              ${contado>0?`<span style="color:var(--blue);margin-left:8px">· $${contado.toFixed(2)} contado</span>`:''}
            </div>

              </tr></thead>
              <tbody>
                ${items.map(r => `<tr>
                  <td><strong>#${esc(r.factura)}</strong></td>
                  <td>${esc(r.nombre||r.cliente||'—')}</td>
                  <td>${esc(r.motoristaNombre||r.motorista||'—')}</td>
                  <td>${r.monto?'$'+esc(r.monto):'—'}</td>
                  <td>${r.tipoPago?`<span class="badge ${r.tipoPago==='Contado'?'b-ok':'b-blue'}">${esc(r.tipoPago)}</span>`:'—'}</td>
                  <td>${estadoBadge(r.estado, r.entregaParcial)}</td>
                  <td>${esc(r.horaEnt||'—')}</td>
                  <td>${r.lat ? `<span class="gps-tag"><i class="ti ti-map-pin"></i>${r.gpsAccuracy||'✓'}${r.gpsAccuracy?'m':''}</span>` : '—'}</td>
                  <td>${r.fotoEvidencia ? `<img src="${r.fotoEvidencia}" class="photo-thumb" style="width:40px;height:40px" onclick="openLightbox('${r.fotoEvidencia}')">` : '—'}</td>
                  <td style="color:var(--red);font-size:12px">${esc(r.motivo||'')}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
    });
  }

  document.getElementById('content').innerHTML = h;
}

  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
  try {
    if (!cacheOk('rutasTodas', 60000)) {
      const snap = await getDocs(collection(db,'rutas'));
      setCache('rutasTodas', snap.docs.map(d => ({...d.data(), _id:d.id})));
    }
  } catch(e) {
    content.innerHTML = '<div class="empty"><i class="ti ti-wifi-off" style="color:var(--amber)"></i><p>Error de conexión</p></div>';
    return;
  }

  content.innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        <div style="flex:1;min-width:160px">
          <label style="font-size:11px">Buscar cliente</label>
          <input type="text" id="cli-search" placeholder="Nombre del cliente..."
            oninput="renderClientesFiltrado()"
            style="padding:8px 10px;font-size:14px;border:1.5px solid var(--gray-200);border-radius:var(--rs);width:100%;font-family:Barlow,sans-serif">
        </div>
        <div>
          <label style="font-size:11px">Período</label>
          <select id="cli-filtPer" onchange="renderClientesFiltrado()"
            style="padding:8px 10px;font-size:14px;border:1.5px solid var(--gray-200);border-radius:var(--rs);font-family:Barlow,sans-serif">
            <option value="7">Última semana</option>
            <option value="14">Últimas 2 semanas</option>
            <option value="30" selected>Último mes</option>
            <option value="60">Últimos 2 meses</option>
            <option value="90">Últimos 3 meses</option>
            <option value="365">Último año</option>
          </select>
        </div>
      </div>
    </div>
    <div id="cli-content"></div>
  `;
  renderClientesFiltrado();
}


function renderClientesFiltrado() {
  const all = (CACHE.rutasTodas || []).filter(r => r.estado === 'entregada');
  const filtPer = document.getElementById('cli-filtPer')?.value || '30';
  const filtSearch = (document.getElementById('cli-search')?.value || '').trim().toUpperCase();

  const hoyD = new Date(hoy() + 'T12:00:00');
  const desdeD = new Date(hoyD);
  desdeD.setDate(hoyD.getDate() - parseInt(filtPer));
  const desdeStr = desdeD.toISOString().split('T')[0];
  const filtrado = all.filter(r => (r.fecha||'') >= desdeStr);

  // Group by client
  const clientes = {};
  filtrado.forEach(r => {
    const key = (r.nombre||r.cliente||'Desconocido').trim().toUpperCase();
    if (!clientes[key]) clientes[key] = { nombre: r.nombre||r.cliente||'—', entregas:[], semanas:{}, dias:{} };
    clientes[key].entregas.push(r);
    // Weekly grouping
    const d = new Date(r.fecha+'T00:00:00');
    const jan1 = new Date(d.getFullYear(),0,1);
    const wk = Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
    const wkKey = d.getFullYear()+'-W'+String(wk).padStart(2,'0');
    if (!clientes[key].semanas[wkKey]) clientes[key].semanas[wkKey] = 0;
    clientes[key].semanas[wkKey]++;
    // Daily grouping
    if (!clientes[key].dias[r.fecha]) clientes[key].dias[r.fecha] = 0;
    clientes[key].dias[r.fecha]++;
  });

  let lista = Object.values(clientes).map(c => {
    const semList = Object.values(c.semanas);
    const promedioSemanal = semList.length ? (semList.reduce((a,b)=>a+b,0)/semList.length).toFixed(1) : '0';
    const maxSemana = semList.length ? Math.max(...semList) : 0;
    const montoTotal = c.entregas.reduce((a,r)=>a+(parseFloat(r.monto)||0),0);
    const contado = c.entregas.filter(r=>r.tipoPago==='Contado').length;
    const motoristas = [...new Set(c.entregas.map(r=>r.motoristaNombre||r.motorista||'—'))];
    const ultimaEntrega = c.entregas.map(r=>r.fecha||'').sort().reverse()[0];
    return { ...c, total: c.entregas.length, promedioSemanal, maxSemana, montoTotal, contado, motoristas, ultimaEntrega };
  }).sort((a,b) => b.total - a.total);

  // Apply search filter
  if (filtSearch) {
    lista = lista.filter(c => c.nombre.toUpperCase().includes(filtSearch));
  }

  const topCliente = lista[0];
  const masFrecuente = [...lista].sort((a,b)=>parseFloat(b.promedioSemanal)-parseFloat(a.promedioSemanal))[0];
  const masFacturado = [...lista].sort((a,b)=>b.montoTotal-a.montoTotal)[0];

  const el = document.getElementById('cli-content');
  if (!el) return;

  // KPI row
  let h = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
      <div class="stat-card blue"><div class="stat-num">${lista.length}</div><div class="stat-label">Clientes únicos</div></div>
      <div class="stat-card green"><div class="stat-num">${filtrado.length}</div><div class="stat-label">Entregas totales</div></div>
      <div class="stat-card amber">
        <div class="stat-num">${topCliente ? topCliente.total : 0}</div>
        <div class="stat-label">Máx. por cliente</div>
      </div>
    </div>`;

  // Insights chips
  if (topCliente) {
    h += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      <div style="background:var(--blue-light);border:1px solid var(--blue);border-radius:var(--rs);padding:8px 12px;flex:1;min-width:160px">
        <div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.05em">Más entregas</div>
        <div style="font-weight:700;font-size:14px;color:var(--gray-900);margin-top:2px">${esc(topCliente.nombre)}</div>
        <div style="font-size:12px;color:var(--gray-500)">${topCliente.total} entregas en ${filtPer} días</div>
      </div>
      ${masFrecuente ? `<div style="background:var(--green-bg);border:1px solid var(--green);border-radius:var(--rs);padding:8px 12px;flex:1;min-width:160px">
        <div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.05em">Más frecuente</div>
        <div style="font-weight:700;font-size:14px;color:var(--gray-900);margin-top:2px">${esc(masFrecuente.nombre)}</div>
        <div style="font-size:12px;color:var(--gray-500)">${masFrecuente.promedioSemanal} entregas/semana</div>
      </div>` : ''}
      ${masFacturado && masFacturado.montoTotal > 0 ? `<div style="background:var(--amber-bg);border:1px solid #e6a51a;border-radius:var(--rs);padding:8px 12px;flex:1;min-width:160px">
        <div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.05em">Mayor facturación</div>
        <div style="font-weight:700;font-size:14px;color:var(--gray-900);margin-top:2px">${esc(masFacturado.nombre)}</div>
        <div style="font-size:12px;color:var(--gray-500)">$${masFacturado.montoTotal.toFixed(2)}</div>
      </div>` : ''}
    </div>`;
  }

  if (!lista.length) {
    h += '<div class="empty"><i class="ti ti-users-off"></i><p>Sin resultados para el filtro aplicado</p></div>';
    el.innerHTML = h;
    return;
  }

  // Client cards
  lista.forEach((c, idx) => {
    const pctContado = c.total ? Math.round(c.contado/c.total*100) : 0;
    const semanas = Object.entries(c.semanas).sort((a,b)=>a[0].localeCompare(b[0])).slice(-4);
    const miniBar = semanas.map(([wk,cnt]) => {
      const maxS = Math.max(...Object.values(c.semanas),1);
      const pct = Math.round(cnt/maxS*100);
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="width:20px;background:var(--blue);border-radius:3px 3px 0 0;height:${Math.max(pct*0.3,2)}px;min-height:2px"></div>
        <div style="font-size:9px;color:var(--gray-500)">${cnt}</div>
      </div>`;
    }).join('');

    h += `<div class="card" style="margin-bottom:10px;padding:14px 16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.05em">#${idx+1}</div>
          <div style="font-size:16px;font-weight:700;color:var(--gray-900)">${esc(c.nombre)}</div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:2px">
            Última entrega: ${c.ultimaEntrega ? fmtFecha(c.ultimaEntrega) : '—'}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--blue)">${c.total}</div>
          <div style="font-size:10px;color:var(--gray-500);text-transform:uppercase">entregas</div>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <span class="badge b-blue"><i class="ti ti-refresh"></i> ${c.promedioSemanal}/sem</span>
        <span class="badge b-ok"><i class="ti ti-trending-up"></i> máx ${c.maxSemana}/sem</span>
        ${c.montoTotal > 0 ? `<span class="badge b-pend"><i class="ti ti-coin"></i> $${c.montoTotal.toFixed(0)} total</span>` : ''}
        <span class="badge" style="background:var(--gray-100);color:var(--gray-700)"><i class="ti ti-cash"></i> ${pctContado}% contado</span>
      </div>
      ${semanas.length > 0 ? `
      <div>
        <div style="font-size:10px;color:var(--gray-500);margin-bottom:4px;font-weight:600">ENTREGAS POR SEMANA (últimas ${semanas.length})</div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:36px;background:var(--gray-50);border-radius:6px;padding:6px 10px">
          ${miniBar}
        </div>
      </div>` : ''}
      <div style="margin-top:10px;font-size:12px;color:var(--gray-500)">
        <i class="ti ti-motorbike" style="color:var(--blue)"></i> ${c.motoristas.join(', ')}
      </div>
    </div>`;
  });

  el.innerHTML = h;
}
window.renderClientesFiltrado = renderClientesFiltrado;

async function renderPendientes() {
  const content = document.getElementById('content');
  if (!cacheOk('pendientes')) {
    content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
    const snap = await getDocs(query(collection(db,'pendientes'), where('estado','==','pendiente')));
    setCache('pendientes', snap.docs.map(d => ({...d.data(), _id:d.id})));
  }
  const pends = CACHE.pendientes;

  if (!pends.length) {
    content.innerHTML = '<div class="empty"><i class="ti ti-circle-check" style="color:var(--green);opacity:.7"></i><p style="color:var(--green)">Sin facturas pendientes 🎉</p></div>';
    return;
  }

  let h = `<div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--red);margin-bottom:14px">
    <i class="ti ti-alert-circle"></i> ${pends.length} Facturas sin entregar
  </div>`;

  pends.sort((a,b) => (b.tsEpoch||0)-(a.tsEpoch||0)).forEach(p => {
    const intentos = p.intentos || [];
    const esParcial = p.entregaParcial;
    const nc = p.notaCredito || '';
    h += `<div class="pend-card" style="${esParcial ? 'border-color:#9b2672;background:#fff0f9' : ''}">
      <div class="pend-card-top">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div style="font-size:11px;font-weight:700;letter-spacing:.05em;color:${esParcial ? '#9b2672' : 'var(--amber)'}">FACTURA #${esc(p.facturaOriginal)}</div>
            ${esParcial ? '<span class="badge b-parcial" style="font-size:10px"><i class="ti ti-git-branch"></i> Parcial</span>' : ''}
          </div>
          <div style="font-size:16px;font-weight:700;color:var(--gray-900);margin:4px 0">${esc(p.nombre||'—')}</div>
          ${p.direccion ? `<div style="font-size:13px;color:var(--gray-500)"><i class="ti ti-map-pin" style="color:var(--blue)"></i> ${esc(p.direccion)}${p.municipio?', '+esc(p.municipio):''}</div>` : ''}
        </div>
        <button onclick="marcarPendEnt('${p._id}')" class="fa-btn fa-ok" style="flex:none;padding:8px 14px;font-size:12px">
          <i class="ti ti-check"></i> Entregar
        </button>
      </div>
      ${p.monto ? `<div style="font-size:14px;font-weight:600;color:var(--blue);margin-top:6px">${esc(p.monto)}</div>` : ''}
      
      <!-- Nota de crédito -->
      <div style="margin-top:10px">
        ${nc
          ? `<div class="nc-badge"><i class="ti ti-file-minus"></i> NC: ${esc(nc)}
              <button onclick="quitarNC('${p._id}')" style="background:none;border:none;cursor:pointer;color:#9b2672;font-size:14px;margin-left:4px;padding:0" title="Quitar NC"><i class="ti ti-x"></i></button>
             </div>
             <button onclick="anularConNC('${p._id}')" style="margin-top:8px;width:100%;padding:9px;background:#5a3fa0;color:#fff;border:none;border-radius:var(--rs);font-family:Barlow,sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
               <i class="ti ti-file-minus"></i> Anular con NC ${esc(nc)}
             </button>`
          : `<button onclick="agregarNC('${p._id}')" style="width:100%;padding:8px;background:#f0f0ff;color:#5a3fa0;border:1.5px dashed #7c5cbf;border-radius:var(--rs);font-family:Barlow,sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px">
               <i class="ti ti-file-plus"></i> Agregar N° Nota de Crédito

        }

      <div style="margin-top:10px;border-top:1px solid rgba(160,92,0,.2);padding-top:10px">

        ${intentos.map(i => `<div style="font-size:12px;color:var(--gray-700);margin-bottom:4px">

window.marcarPendEnt = async function(id) {
  if (!confirm('¿Marcar esta factura pendiente como entregada?')) return;
  await updateDoc(doc(db,'pendientes',id), { estado:'entregada', fechaEnt: hoy() });
  clearCache();
  toast('✓ Marcada como entregada');
  renderPendientes();
};

window.agregarNC = async function(id) {
  const nc = prompt('Ingresa el número de Nota de Crédito:');
  if (!nc || !nc.trim()) return;
  await updateDoc(doc(db,'pendientes',id), { notaCredito: nc.trim() });
  clearCache();
  toast('✓ Nota de Crédito guardada');
  renderPendientes();
};

window.quitarNC = async function(id) {
  if (!confirm('¿Quitar la Nota de Crédito?')) return;
  await updateDoc(doc(db,'pendientes',id), { notaCredito: null });
  clearCache();
  toast('Nota de Crédito eliminada');
  renderPendientes();
};

window.anularConNC = async function(id) {
  const pend = (CACHE.pendientes || []).find(p => p._id === id);
  const nc = pend?.notaCredito;
  if (!nc) { toast('Sin NC registrada'); return; }
  if (!confirm(`¿Anular lo no entregado con Nota de Crédito ${nc}? Esto marcará la factura como anulada.`)) return;
  await updateDoc(doc(db,'pendientes',id), {
    estado: 'anulada-nc',
    notaCredito: nc,
    fechaAnulacion: hoy()
  });
  // También marcar en rutas si existe
  if (pend?.facturaOriginal) {
    try {
      const rutasSnap = await getDocs(query(collection(db,'rutas'), where('factura','==',pend.facturaOriginal)));
      const batch = writeBatch(db);
      rutasSnap.docs.forEach(d => batch.update(doc(db,'rutas',d.id), { notaCredito: nc, anulada: true }));
      await batch.commit();
      await registrarEstadoFactura(pend.facturaOriginal, 'nota_credito', {
        nota: 'NC ' + nc, motivo: 'Anulación con nota de crédito',
      });
      await registrarEstadoFactura(pend.facturaOriginal, 'anulada', { nota: 'Anulada vía NC ' + nc });
    } catch(e) {}
  }
  clearCache();
  toast(`✓ Anulada con NC ${nc}`);
  renderPendientes();
};

// ── CONCILIACIÓN v17 — FACTURAS EMITIDAS vs RUTA ────────────
// FIX SINCRONIZACIÓN: CONC_EMITIDAS se hidrata desde Firestore al abrir Conciliación
// (antes solo existía en memoria del navegador → no visible en otros dispositivos)
let CONC_EMITIDAS = []; // [{factura, nombre, monto, ...}]
let CONC_FECHA = null;

// FIX SINCRONIZACIÓN: ID de documento Firestore por factura (evita duplicados al re-cargar CSV)
function emitidaDocId(factura) {
  const k = normFact(factura);
  return k || String(factura || '').trim().replace(/[^a-zA-Z0-9_-]/g, '_') || 'sin_numero';
}

// FIX SINCRONIZACIÓN: Guardar facturas emitidas en Firestore (colección compartida entre dispositivos)
async function guardarEmitidasFirestore(emitidas, fechaConciliacion, meta = {}) {
  const CHUNK = 450; // límite Firestore writeBatch ≈ 500
  for (let i = 0; i < emitidas.length; i += CHUNK) {
    const batch = writeBatch(db);
    emitidas.slice(i, i + CHUNK).forEach(em => {
      batch.set(doc(db, 'facturas_emitidas', emitidaDocId(em.factura)), {
        factura: em.factura,
        nombre: em.nombre || '',
        monto: em.monto || '',
        pedido: em.pedido || '',
        tipodoc: em.tipodoc || '',
        codigoCliente: em.codigoCliente || '',
        fechaEmision: em.fechaEmision || '',
        direccion: em.direccion || '',
        municipio: em.municipio || '',
        fechaConciliacion: fechaConciliacion,
        tsEpoch: Date.now(),
        usuario: currentUser ? currentUser.nombre : '—',
        archivo: meta.archivo || '',
      }, { merge: true }); // merge: re-cargar el mismo CSV actualiza sin duplicar
    });
    await batch.commit();
  }
  // Registro de la carga para trazabilidad (visible desde cualquier dispositivo)
  await addDoc(collection(db, 'historial_cargas_emitidas'), {
    fechaConciliacion,
    cantidad: emitidas.length,
    usuario: currentUser ? currentUser.nombre : '—',
    archivo: meta.archivo || '',
    tsEpoch: Date.now(),
  });
  // FIX REASIGNACIÓN: registrar estado "Emitida" en historial por cada factura del CSV
  await Promise.all(emitidas.map(em => registrarEstadoFactura(em.factura, 'emitida', {
    fechaEmision: em.fechaEmision || '',
    nota: 'CSV emitidas: ' + (meta.archivo || ''),
  })));
}

// FIX SINCRONIZACIÓN: Restaurar emitidas desde Firestore según fecha de conciliación
async function cargarEmitidasDesdeFirestore(fechaConciliacion) {
  const fecha = fechaConciliacion || hoy();
  const snap = await getDocs(query(
    collection(db, 'facturas_emitidas'),
    where('fechaConciliacion', '==', fecha)
  ));
  CONC_EMITIDAS = snap.docs.map(d => {
    const data = d.data();
    return {
      factura: data.factura,
      nombre: data.nombre || '',
      monto: data.monto || '',
      pedido: data.pedido || '',
      tipodoc: data.tipodoc || '',
      codigoCliente: data.codigoCliente || '',
      fechaEmision: data.fechaEmision || '',
      direccion: data.direccion || '',
      municipio: data.municipio || '',
    };
  });
  CONC_FECHA = fecha;
  return CONC_EMITIDAS.length;
}
window.cargarEmitidasDesdeFirestore = cargarEmitidasDesdeFirestore;

// ── Cargar CSV de facturas EMITIDAS ───────────────────────
window.cargarCSVEmitidas = function(input) {
  const file = input.files[0]; if (!file) return;
  const lbl = document.getElementById('conc-csv-lbl');
  const msg = document.getElementById('conc-csv-msg');
  lbl.textContent = '⏳ Procesando...';
  msg.textContent = '';

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const text = e.target.result;
      const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
      if (!lines.length) throw new Error('Archivo vacío');

      // Normalizar encabezados: quitar espacios, tildes y caracteres especiales
      const rawHeader = lines[0].split(',').map(h =>
        h.trim().toLowerCase()
         .replace(/["\r]/g,'')
         .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
         .replace(/\s+/g,'')
         .replace(/[^a-z0-9]/g,'')
      );

      // Mapa flexible de columnas — compatible con formato PICME real:
      // pedido, Tipo Documento, Documento(=factura), fecha, Monto, impresa, nula, Codigo, Cliente
      const colMap = {
        factura:  ['documento','factura','nfactura','nrodoc','doc'],
        cliente:  ['cliente','nombre','razon','razonsocial'],
        monto:    ['monto','total','importe','valor'],
        pedido:   ['pedido','nopedido'],
        tipodoc:  ['tipodocumento','tipodoc','tipo'],
        nula:     ['nula','anulada','anulado'],
        codigo:   ['codigo','codigocliente','cod'],
        fecha:    ['fecha','fechaemision'],
      };

      const idx = {};
      Object.entries(colMap).forEach(([campo, aliases]) => {
        const i = rawHeader.findIndex(h => aliases.some(a => h === a || h.startsWith(a) || a.startsWith(h)));
        if (i >= 0) idx[campo] = i;
      });

      if (idx.factura === undefined) {
        throw new Error('Columna de número de factura no encontrada. Encabezados detectados: ' + rawHeader.join(', '));
      }

      CONC_EMITIDAS = [];
      let anuladas = 0;

      for (let li = 1; li < lines.length; li++) {
        const cols = parseCsvLine(lines[li]);
        if (!cols.length) continue;
        const numDoc = (cols[idx.factura] || '').trim().replace(/["\r]/g,'');
        if (!numDoc) continue;

        // Excluir facturas anuladas (columna "nula" = VERDADERO)
        const esNula = idx.nula !== undefined
          ? (cols[idx.nula]||'').trim().toUpperCase() === 'VERDADERO'
          : false;
        if (esNula) { anuladas++; continue; }

        const cliente  = idx.cliente  !== undefined ? (cols[idx.cliente] ||'').replace(/["\r]/g,'').trim() : '';
        const monto    = idx.monto    !== undefined ? (cols[idx.monto]   ||'').replace(/["\r$, ]/g,'').trim() : '';
        const pedido   = idx.pedido   !== undefined ? (cols[idx.pedido]  ||'').replace(/["\r]/g,'').trim() : '';
        const tipodoc  = idx.tipodoc  !== undefined ? (cols[idx.tipodoc] ||'').replace(/["\r]/g,'').trim() : '';
        const codigo   = idx.codigo   !== undefined ? (cols[idx.codigo]  ||'').replace(/["\r]/g,'').trim() : '';
        const fechaDoc = idx.fecha    !== undefined ? (cols[idx.fecha]   ||'').replace(/["\r]/g,'').trim() : '';

        CONC_EMITIDAS.push({ factura: numDoc, nombre: cliente, monto, pedido, tipodoc, codigoCliente: codigo, fechaEmision: fechaDoc, direccion: '', municipio: '' });
      }

      if (!CONC_EMITIDAS.length) throw new Error('Sin facturas válidas (todas anuladas o vacías)');

      // Auto-detectar fecha del CSV (formato dd/mm/yyyy hh:mm)
      const fechaInput = document.getElementById('conc-fecha');
      if (fechaInput && !fechaInput._manualChange) {
        const primerFecha = CONC_EMITIDAS[0]?.fechaEmision || '';
        const matchDmy = primerFecha.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (matchDmy) fechaInput.value = matchDmy[3] + '-' + matchDmy[2] + '-' + matchDmy[1];
      }

      CONC_FECHA = fechaInput?.value || hoy();
      lbl.textContent = '⏳ Guardando...';

      // FIX SINCRONIZACIÓN: persistir en Firestore para que otros dispositivos vean las emitidas
      await guardarEmitidasFirestore(CONC_EMITIDAS, CONC_FECHA, { archivo: file.name });

      lbl.textContent = '✓ ' + file.name;
      msg.innerHTML = '<div style="margin-top:10px">'
        + '<div style="color:var(--green);font-weight:700;font-size:14px">✓ ' + CONC_EMITIDAS.length + ' facturas emitidas cargadas y sincronizadas</div>'
        + (anuladas ? '<div style="color:var(--gray-500);font-size:12px;margin-top:3px">⚠ ' + anuladas + ' factura(s) anuladas excluidas</div>' : '')
        + '<div style="color:var(--gray-500);font-size:12px;margin-top:2px">Fecha: <strong>' + fmtFecha(CONC_FECHA) + '</strong> · Disponible en todos tus dispositivos</div>'
        + '</div>';

      await ejecutarComparacion();
      document.getElementById('conc-tab-tabla')?.click();
    } catch(err) {
      lbl.textContent = '✗ Error';
      msg.innerHTML = '<span style="color:var(--red)">✗ ' + err.message + '</span>';
    }
  };
  reader.readAsText(file, 'iso-8859-1');
};

// ── Ejecutar comparación emitidas vs rutas ────────────────
async function ejecutarComparacion() {
  const fecha = CONC_FECHA || hoy();

  // Obtener números de factura de las emitidas para buscarlas en cualquier fecha
  const factNums = CONC_EMITIDAS.map(e => normFact(e.factura)).filter(Boolean);

  // Cargar TODAS las rutas sin filtro de fecha (para encontrar facturas asignadas en días distintos)
  const snap = await getDocs(collection(db,'rutas'));
  const todasRutas = snap.docs.map(d => ({...d.data(), _id: d.id}));

  // Indexar rutas por factura normalizada (sin restricción de fecha)
  // Prioridad de estado: entregada > no-entregada > reprogramada > pendiente > asignada
  const ESTADO_PRIO = { entregada:5, 'no-entregada':4, reprogramada:3, pendiente:2, asignada:1, en_ruta:1 };
  const rutasIdx = {};
  todasRutas.forEach(r => {
    const k = normFact(r.factura);
    if (!rutasIdx[k]) rutasIdx[k] = [];
    rutasIdx[k].push(r);
  });
  // Para cada factura, ordenar sus registros: primero por prioridad de estado (mayor=mejor),
  // después por fecha descendente, después por tsEpoch descendente.
  // Así si la misma factura tiene estado=pendiente en día 19 y estado=entregada en día 20,
  // siempre se muestra entregada.
  Object.keys(rutasIdx).forEach(k => {
    rutasIdx[k].sort((a, b) => {
      const pa = ESTADO_PRIO[a.estado] || 0;
      const pb = ESTADO_PRIO[b.estado] || 0;
      if (pb !== pa) return pb - pa;                          // mayor prioridad primero
      if ((b.fecha||'') !== (a.fecha||'')) return (b.fecha||'').localeCompare(a.fecha||''); // fecha más reciente
      return (b.tsEpoch||0) - (a.tsEpoch||0);               // timestamp más reciente
    });
  });

  // ── FIX BUG #1: Cargar estados admin de facturas no-asignadas desde Firestore ──
  // Antes esta colección nunca se leía al comparar, entonces estadoAdmin
  // siempre salía null para facturas sin ruta asignada al recargar la página.
  const adminSnap = await getDocs(collection(db,'conciliacion_admin'));
  const adminIdx = {};  // key: factura normalizada → estadoAdmin guardado
  adminSnap.docs.forEach(d => {
    const k = normFact(d.data().factura);
    // Si hay varios registros para la misma factura quedarnos con el más reciente
    if (!adminIdx[k] || (d.data().tsEpoch||0) > (adminIdx[k].tsEpoch||0)) {
      adminIdx[k] = d.data();
    }
  });
  // ── FIN FIX BUG #1 ───────────────────────────────────────────────────────

  // Indexar emitidas
  const emitidasIdx = {};
  CONC_EMITIDAS.forEach(e => { emitidasIdx[normFact(e.factura)] = e; });

  // Construir resultado de conciliación
  const resultado = [];

  // 1. Recorrer EMITIDAS → verificar si está en rutas
  CONC_EMITIDAS.forEach(em => {
    const k = normFact(em.factura);
    const rutasMatch = rutasIdx[k] || [];
    if (rutasMatch.length > 0) {
      // Usar el registro más reciente / más actualizado
      const ruta = rutasMatch.sort((a,b)=>(b.tsEpoch||0)-(a.tsEpoch||0))[0];
      resultado.push({
        factura: em.factura,
        nombre: em.nombre || ruta.nombre || ruta.cliente || '—',
        monto: em.monto || ruta.monto || '',
        direccion: em.direccion || ruta.direccion || '',
        municipio: em.municipio || ruta.municipio || '',
        estado: ruta.estado,           // estado REAL del motorista
        motorista: ruta.motorista,
        motoristaNombre: ruta.motoristaNombre || '—',
        horaEnt: ruta.horaEnt || '',
        tipoPago: ruta.tipoPago || '',
        motivo: ruta.motivo || '',
        rutaId: ruta._id,
        fechaRuta: ruta.fecha || '',       // fecha real en que fue puesta en ruta
        // FIX BUG #2: copiar fechaEmision del CSV al resultado para filtros y PDF
        fechaEmision: em.fechaEmision || '', // fecha en que se emitió la factura (del CSV)
        concEstado: 'en_ruta',              // concEstado: en_ruta | no_asignada
        estadoAdmin: ruta.estadoAdmin || null, // refacturacion | retiro_cliente | retiro_vendedor | anulacion
      });
    } else {
      // FIX BUG #1: aplicar estadoAdmin persistido en conciliacion_admin
      // Antes siempre era null porque nunca se consultaba esa colección
      const adminRec = adminIdx[k] || null;
      resultado.push({
        factura: em.factura,
        nombre: em.nombre || '—',
        monto: em.monto || '',
        direccion: em.direccion || '',
        municipio: em.municipio || '',
        estado: null,
        motorista: null,
        motoristaNombre: '—',
        horaEnt: '',
        tipoPago: '',
        motivo: '',
        rutaId: null,
        concEstado: 'no_asignada',
        // FIX BUG #2: fecha de emisión para que los filtros por fecha funcionen en no-asignadas
        fechaEmision: em.fechaEmision || '',
        estadoAdmin: adminRec ? adminRec.estadoAdmin : null, // ← restaurado de Firestore
        fechaAdminCambio: adminRec ? adminRec.fechaAdminCambio : null,
      });
    }
  });

  // Guardar resultado en cache temporal
  window._CONC_RESULTADO = resultado;
  renderConcTabla(resultado, fecha);
  renderConcResumen(resultado, fecha);
}

// ── Render tabla de conciliación ──────────────────────────
function renderConcTabla(resultado, fecha) {
  const el = document.getElementById('conc-tabla-body');
  const resEl = document.getElementById('conc-filtros-info');
  if (!el) return;

  const filtroEstado = document.getElementById('conc-filtro-estado')?.value || '';
  const filtroTexto  = (document.getElementById('conc-filtro-texto')?.value || '').toLowerCase();
  // NUEVA FUNCIONALIDAD: filtros por rango de fechas desde/hasta
  const filtroDesde  = document.getElementById('conc-filtro-fecha-desde')?.value || '';
  const filtroHasta  = document.getElementById('conc-filtro-fecha-hasta')?.value || '';
  // FIX BUG #2: selector de tipo de fecha para filtros — emisión vs entrega/ruta
  const tipoFecha = document.getElementById('conc-filtro-tipo-fecha')?.value || 'ruta';

  let filas = resultado;
  // FIX BUG #2: usar fechaEmision o fechaRuta según el selector
  if (filtroDesde) filas = filas.filter(r => {
    const campo = tipoFecha === 'emision' ? (r.fechaEmision || r.fechaRuta || '') : (r.fechaRuta || r.fechaEmision || '');
    return !campo || campo >= filtroDesde;
  });
  if (filtroHasta) filas = filas.filter(r => {
    const campo = tipoFecha === 'emision' ? (r.fechaEmision || r.fechaRuta || '') : (r.fechaRuta || r.fechaEmision || '');
    return !campo || campo <= filtroHasta;
  });
  if (filtroEstado) filas = filas.filter(r => {
    if (filtroEstado === 'no_asignada') return r.concEstado === 'no_asignada';
    if (filtroEstado === 'entregada')   return r.estado === 'entregada';
    if (filtroEstado === 'pendiente')   return r.estado === 'pendiente' && r.concEstado === 'en_ruta';
    if (filtroEstado === 'no-entregada') return r.estado === 'no-entregada';
    if (filtroEstado === 'refacturacion')  return r.estadoAdmin === 'refacturacion';
    if (filtroEstado === 'retiro_cliente') return r.estadoAdmin === 'retiro_cliente';
    if (filtroEstado === 'retiro_vendedor') return r.estadoAdmin === 'retiro_vendedor';
    if (filtroEstado === 'anulacion')   return r.estadoAdmin === 'anulacion';
    return true;
  });
  if (filtroTexto) filas = filas.filter(r =>
    normFact(r.factura).includes(filtroTexto.toUpperCase()) ||
    (r.nombre||'').toLowerCase().includes(filtroTexto) ||
    (r.motoristaNombre||'').toLowerCase().includes(filtroTexto)
  );

  if (resEl) resEl.textContent = `Mostrando ${filas.length} de ${resultado.length} facturas`;

  if (!filas.length) {
    el.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--gray-500)"><i class="ti ti-search-off"></i> Sin resultados</td></tr>`;
    return;
  }

  el.innerHTML = filas.map(r => {
    // Determinar badge visual
    let badge = '';
    if (r.estadoAdmin === 'entregada') {
      badge = `<span style="background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">✓ Entregada (Admin)</span>`;
    } else if (r.estadoAdmin) {
      const adminLabels = { refacturacion:'Refacturación', retiro_cliente:'Retiro Cliente', retiro_vendedor:'Retiro Vendedor', anulacion:'Anulación' };
      const adminColors = { refacturacion:'#7c3aed,#f3e8ff', retiro_cliente:'#0e7490,#ecfeff', retiro_vendedor:'#b45309,#fef3c7', anulacion:'#6b7280,#f3f4f6' };
      const [col, bg] = (adminColors[r.estadoAdmin]||'#6b7280,#f3f4f6').split(',');
      badge = `<span style="background:${bg};color:${col};padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;display:inline-block">${adminLabels[r.estadoAdmin]||r.estadoAdmin}</span>`;
    } else if (r.concEstado === 'no_asignada') {
      badge = `<span style="background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">No asignada</span>`;
    } else if (r.estado === 'entregada') {
      badge = `<span style="background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">✓ Entregada</span>`;
    } else if (r.estado === 'no-entregada') {
      badge = `<span style="background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">✗ No entregada</span>`;
    } else if (r.estado === 'pendiente') {
      badge = `<span style="background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">En ruta</span>`;
    } else {
      badge = `<span style="background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">En ruta</span>`;
    }

    // Indicador visual si la fecha de ruta es diferente a la fecha de emisión
    const fechaRutaLabel = r.fechaRuta
      ? (r.fechaRuta !== (CONC_FECHA || hoy())
          ? `<span style="color:var(--amber);font-weight:700">${fmtFecha(r.fechaRuta)}</span>`
          : `<span style="color:var(--gray-500)">${fmtFecha(r.fechaRuta)}</span>`)
      : '—';

    // NUEVA FUNCIONALIDAD: Botón de reasignación directa para no asignadas
    const puedeGestionar = r.concEstado === 'no_asignada' || (r.estado !== 'entregada');
    const btnGestionar = puedeGestionar
      ? `<button onclick="abrirModalAdminConc('${encodeURIComponent(JSON.stringify({factura:r.factura,nombre:r.nombre,rutaId:r.rutaId,concEstado:r.concEstado,estadoAdmin:r.estadoAdmin}))}',this)"
           style="background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--rs);padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">
           <i class="ti ti-settings"></i> Gestionar
         </button>`
      : `<span style="font-size:11px;color:var(--gray-300)">—</span>`;

    return `<tr>
      <td><strong style="font-family:'Barlow Condensed',sans-serif;font-size:14px">#${esc(r.factura)}</strong></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.nombre)}</td>
      <td style="font-family:'Barlow Condensed',sans-serif;font-weight:700">${r.monto?'$'+r.monto:'—'}</td>
      <td>${badge}</td>
      <td style="font-size:12px">${esc(r.motoristaNombre)}</td>
      <td style="font-size:12px">${r.horaEnt||'—'}</td>
      <td style="font-size:12px">${r.fechaEmision ? '<span style="color:var(--gray-500)">'+fmtFecha(r.fechaEmision)+'</span>' : '—'}</td>
      <td style="font-size:12px">${fechaRutaLabel}</td>
      <td style="font-size:12px">${esc(r.tipoPago||'—')}</td>
      <td>${btnGestionar}</td>
    </tr>`;
  }).join('');
}

                ? `<button onclick="abrirModalAdminConc('${encodeURIComponent(JSON.stringify({factura:r.factura,nombre:r.nombre,rutaId:r.rutaId,concEstado:r.concEstado,estadoAdmin:r.estadoAdmin}))}',this)" style="background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--rs);padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer"><i class="ti ti-settings"></i> Gestionar</button>`
                : '—';
              return `<tr style="background:${i%2===0?'var(--white)':'var(--gray-50)'}">
                <td style="padding:6px 8px;font-weight:700;font-family:'Barlow Condensed',sans-serif">#${esc(r.factura)}</td>

                <td style="padding:6px 8px">${tipoDif}</td>

    <!-- FIN NUEVA FUNCIONALIDAD diferencias -->

    <div class="card">
      <div class="card-title">Por motorista</div>
      ${porMotorista.map(m => {
        const col = m.pct>=90?'var(--green)':m.pct>=70?'var(--amber)':'var(--red)';

// NUEVA FUNCIONALIDAD: Resumen mensual acumulado (independiente del CSV)
window.renderResumenMensual = async function(mes) {
  const mesStr = mes || hoy().substring(0,7);
  const el = document.getElementById('resumen-mensual-content');
  if (!el) return;
  el.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
  try {
    if (!cacheOk('rutasTodas', 300000)) {
      const snap = await getDocs(collection(db,'rutas'));
      setCache('rutasTodas', snap.docs.map(d => ({...d.data(), _id:d.id})));
    }
    const todas = CACHE.rutasTodas || [];
    const rutasMes = todas.filter(r => (r.fecha || '').startsWith(mesStr));
    const motoristas = USUARIOS.filter(u => u.rol === 'motorista');
    const totalMes    = rutasMes.length;
    const entMes      = rutasMes.filter(r => r.estado === 'entregada').length;
    const noEntMes    = rutasMes.filter(r => r.estado === 'no-entregada').length;
    const pendMes     = rutasMes.filter(r => r.estado === 'pendiente').length;
    const pctConc     = totalMes ? Math.round(entMes/totalMes*100) : 0;
    const diasActivos = [...new Set(rutasMes.map(r => r.fecha))].length;

    const statsMot = motoristas.map(m => {
      const mrs = rutasMes.filter(r => r.motorista === m.id);
      const mEnt = mrs.filter(r => r.estado === 'entregada').length;
      const mNo  = mrs.filter(r => r.estado === 'no-entregada').length;
      const mPend = mrs.filter(r => r.estado === 'pendiente').length;
      const mPct = mrs.length ? Math.round(mEnt/mrs.length*100) : 0;
      const cobrado = mrs.filter(r => r.estado==='entregada' && r.tipoPago==='Contado').reduce((a,r)=>a+(parseFloat(r.monto)||0),0);
      return { ...m, total:mrs.length, ent:mEnt, no:mNo, pend:mPend, pct:mPct, cobrado };
    }).filter(m => m.total > 0).sort((a,b) => b.pct-a.pct);

    const [mesY, mesM] = mesStr.split('-');
    const mesLabel = new Date(parseInt(mesY), parseInt(mesM)-1, 1).toLocaleString('es', {month:'long', year:'numeric', timeZone:'UTC'});
    const col0 = 'var(--green)', col50 = 'var(--amber)', colR = 'var(--red)';

    let h = '<div class="card" style="margin-bottom:14px;border-top:3px solid var(--blue)">';
    h += '<div style="font-size:12px;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:700">';
    h += '<i class="ti ti-calendar" style="color:var(--blue)"></i> ' + mesLabel + ' — ' + diasActivos + ' días con actividad</div></div>';

    h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px">';
    h += '<div class="stat-card blue"><div class="stat-num">' + totalMes + '</div><div class="stat-label">Total Emitidas</div></div>';
    h += '<div class="stat-card green"><div class="stat-num">' + entMes + '</div><div class="stat-label">Entregadas</div></div>';
    h += '<div class="stat-card red"><div class="stat-num">' + noEntMes + '</div><div class="stat-label">No Entregadas</div></div>';
    h += '<div class="stat-card amber"><div class="stat-num">' + pendMes + '</div><div class="stat-label">Pendientes</div></div>';
    h += '</div>';

    const pctColor = pctConc>=90 ? col0 : pctConc>=70 ? col50 : colR;
    const barColor = pctConc>=90 ? 'var(--green)' : pctConc>=70 ? '#f39c12' : 'var(--red)';
    h += '<div class="card" style="margin-bottom:14px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    h += '<span style="font-size:13px;font-weight:600;color:var(--gray-700)">% Conciliación del mes</span>';
    h += '<span style="font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:28px;color:' + pctColor + '">' + pctConc + '%</span></div>';
    h += '<div class="prog-wrap"><div class="prog-bar" style="width:' + pctConc + '%;background:' + barColor + '"></div></div>';
    h += '<div style="font-size:11px;color:var(--gray-500);margin-top:6px;text-align:right">' + entMes + ' entregadas de ' + totalMes + ' facturas</div>';
    h += '</div>';

    h += '<div class="card"><div class="card-title"><i class="ti ti-motorbike" style="color:var(--blue)"></i> Por Motorista</div>';
    if (statsMot.length) {
      statsMot.forEach(function(m, i) {
        const mc = m.pct>=80 ? col0 : m.pct>=50 ? col50 : colR;
        const pos = i===0 ? '&#127945;' : i===1 ? '&#129352;' : i===2 ? '&#129353;' : '';
        h += '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100);flex-wrap:wrap">';
        h += '<div style="width:36px;height:36px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">' + (pos || '<i class=\"ti ti-motorbike\" style=\"color:var(--blue)\"></i>') + '</div>';
        h += '<div style="flex:1;min-width:120px">';
        h += '<div style="font-weight:700;font-size:14px">' + m.nombre + '</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">';
        h += '<span style="background:var(--blue-light);color:var(--blue);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700">' + m.total + ' total</span>';
        h += '<span style="background:var(--green-bg);color:var(--green);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700">✓ ' + m.ent + '</span>';
        h += '<span style="background:var(--red-bg);color:var(--red);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700">✗ ' + m.no + '</span>';
        if (m.cobrado > 0) {
          h += '<span style="background:var(--amber-bg);color:var(--amber);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700">$' + m.cobrado.toFixed(0) + '</span>';
        }
        h += '</div>';
        h += '<div class="prog-wrap" style="margin-top:5px"><div class="prog-bar" style="width:' + m.pct + '%;background:' + mc + '"></div></div>';
        h += '</div>';
        h += '<div style="text-align:right;flex-shrink:0;background:' + (m.pct>=80?'var(--green-bg)':m.pct>=50?'var(--amber-bg)':'var(--red-bg)') + ';border-radius:var(--rs);padding:8px 14px">';
        h += '<div style="font-family:Barlow Condensed,sans-serif;font-size:26px;font-weight:800;color:' + mc + '">' + m.pct + '%</div>';
        h += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:' + mc + '">Efectividad</div>';
        h += '</div></div>';
      });
    } else {
      h += '<div style="text-align:center;padding:20px;color:var(--gray-500)">Sin datos para este mes</div>';
    }
    h += '</div>';
    el.innerHTML = h;
  } catch(e) {
    if (el) el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off" style="color:var(--amber)"></i><p style="color:var(--amber)">Error al cargar datos</p></div>';
  }
};

// ── Aplicar estado administrativo ─────────────────────────
window.aplicarEstadoAdmin = async function(estadoAdmin, btn) {
  const data = window._CONC_MODAL_DATA;
  if (!data || !estadoAdmin) { toast('Selecciona una acción primero'); return; }

  const labels = { entregada:'Entregada', refacturacion:'Refacturación', retiro_cliente:'Retiro Cliente', retiro_vendedor:'Retiro Vendedor', anulacion:'Anulación' };
  if (!confirm(`¿Confirmar cambio de factura #${data.factura} a "${labels[estadoAdmin]}"?`)) return;

  // Leer campos del modal
  const fechaEnt  = document.getElementById('admin-fecha-ent')?.value  || hoy();
  const horaEnt   = document.getElementById('admin-hora-ent')?.value   || new Date().toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'});
  const tipoPago  = document.getElementById('admin-tipo-pago')?.value  || 'Admin';
  const nota      = (document.getElementById('admin-nota')?.value || '').trim();
  const tsAhora   = Date.now();
  const fechaCambio = hoy();

  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Guardando...'; }

  try {
    if (estadoAdmin === 'entregada') {
      const payload = {
        estado:           'entregada',
        estadoAdmin:      'entregada',
        fechaEnt:         fechaEnt,
        horaEnt:          horaEnt,
        tipoPago:         tipoPago,
        fechaAdminCambio: fechaCambio,
        tsEpoch:          tsAhora,
        ...(nota ? { notaAdmin: nota } : {}),
      };
      if (data.rutaId) {
        await updateDoc(doc(db,'rutas',data.rutaId), payload);
      } else {
        const concRef = collection(db,'conciliacion_admin');
        const existing = await getDocs(query(concRef, where('factura','==',data.factura)));
        const full = { factura:data.factura, nombre:data.nombre, fecha:CONC_FECHA||hoy(), concEstado:'no_asignada', ...payload };
        if (!existing.empty) {
          await updateDoc(doc(db,'conciliacion_admin',existing.docs[0].id), full);
        } else {
          await addDoc(concRef, full);
        }
      }
    } else {
      const payload = { estadoAdmin, fechaAdminCambio:fechaCambio, tsEpoch:tsAhora, ...(nota?{notaAdmin:nota}:{}) };
      if (data.rutaId) {
        await updateDoc(doc(db,'rutas',data.rutaId), payload);
      } else {
        const concRef = collection(db,'conciliacion_admin');
        const existing = await getDocs(query(concRef, where('factura','==',data.factura)));
        const full = { factura:data.factura, nombre:data.nombre, fecha:CONC_FECHA||hoy(), concEstado:'no_asignada', ...payload };
        if (!existing.empty) {
          await updateDoc(doc(db,'conciliacion_admin',existing.docs[0].id), full);
        } else {
          await addDoc(concRef, full);
        }
      }
    }

    // Trazabilidad
    const histMap = { entregada:'entregada', anulacion:'anulada', retiro_cliente:'cliente_retiro', retiro_vendedor:'cliente_retiro', refacturacion:'asignada' };
    await registrarEstadoFactura(data.factura, histMap[estadoAdmin] || estadoAdmin, {
      nota: nota || labels[estadoAdmin],
      usuario: currentUser ? currentUser.nombre : null,
      fechaEntrega: estadoAdmin === 'entregada' ? fechaEnt : null,
    });

    // Actualizar en memoria
    if (window._CONC_RESULTADO) {
      const row = window._CONC_RESULTADO.find(r => normFact(r.factura) === normFact(data.factura));
      if (row) {
        row.estadoAdmin = estadoAdmin;
        if (estadoAdmin === 'entregada') { row.estado='entregada'; row.fechaEnt=fechaEnt; row.horaEnt=horaEnt; row.tipoPago=tipoPago; }
        if (nota) row.notaAdmin = nota;
      }
      renderConcTabla(window._CONC_RESULTADO, CONC_FECHA || hoy());
      renderConcResumen(window._CONC_RESULTADO, CONC_FECHA || hoy());
    }

    clearCache();
    closeModal();
    toast(`✓ Factura #${data.factura} → ${labels[estadoAdmin]}${nota?' · "'+nota.slice(0,25)+'"':''}`);
  } catch(err) {
    toast('Error: ' + err.message);
    if (btn) { btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Aplicar cambio'; }
  }
};
