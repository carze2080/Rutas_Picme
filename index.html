<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PICME v16 — Rutas de Entrega</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --blue:       #185FA5;
  --blue-dark:  #0e3d6e;
  --blue-mid:   #1a6bbf;
  --blue-light: #e8f2fc;
  --blue-pale:  #f0f6fd;
  --white:      #ffffff;
  --gray-50:    #f7f9fc;
  --gray-100:   #eef2f7;
  --gray-200:   #dce4ef;
  --gray-300:   #bbc8da;
  --gray-500:   #7a90aa;
  --gray-700:   #3d5168;
  --gray-900:   #1a2535;
  --green:      #1e7d3a;
  --green-bg:   #e6f5eb;
  --red:        #c0392b;
  --red-bg:     #fdecea;
  --amber:      #a05c00;
  --amber-bg:   #fff3e0;
  --r:          12px;
  --rs:         8px;
  --shadow:     0 2px 12px rgba(24,95,165,0.10);
  --shadow-lg:  0 8px 32px rgba(24,95,165,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }

/* ── LOGIN ─────────────────────────────────────────────── */
#login {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh;
  background: linear-gradient(145deg, var(--blue-dark) 0%, var(--blue) 55%, var(--blue-mid) 100%);
  padding: 1.5rem;
  position: relative; overflow: hidden;
}
#login::before {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.login-card {
  background: var(--white); border-radius: 20px; padding: 36px 32px 32px;
  width: 100%; max-width: 400px; box-shadow: var(--shadow-lg);
  position: relative; z-index: 1;
}
.login-logo-wrap {
  text-align: center; margin-bottom: 28px;
}
.login-logo-wrap svg { width: 52px; height: 52px; }
.login-brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px; font-weight: 800; letter-spacing: 2px;
  color: var(--blue); line-height: 1;
}
.login-sub { font-size: 12px; color: var(--gray-500); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.login-divider { height: 1px; background: var(--gray-100); margin: 20px 0; }
.login-section { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--gray-500); margin-bottom: 12px; }

.user-btn {
  width: 100%; padding: 13px 16px; margin-bottom: 8px;
  border: 1.5px solid var(--gray-200); border-radius: var(--rs);
  background: var(--white); color: var(--gray-900);
  font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  transition: all .15s;
}
.user-btn:hover { border-color: var(--blue); background: var(--blue-pale); }
.user-btn.sel { border-color: var(--blue); background: var(--blue-light); }
.user-btn i { font-size: 20px; color: var(--blue); }
.user-btn small { display: block; font-size: 12px; color: var(--gray-500); font-weight: 400; }

.pin-wrap { margin-top: 16px; display: none; }
.pin-wrap.show { display: block; }
.pin-label { font-size: 13px; color: var(--gray-700); margin-bottom: 6px; font-weight: 500; }
.pin-input {
  width: 100%; padding: 12px 16px; font-size: 18px; font-weight: 700;
  letter-spacing: 4px; text-align: center;
  border: 2px solid var(--gray-200); border-radius: var(--rs);
  font-family: 'Barlow Condensed', sans-serif; color: var(--gray-900);
  background: var(--gray-50);
}
.pin-input:focus { outline: none; border-color: var(--blue); background: var(--white); }
.pin-error { color: var(--red); font-size: 13px; margin-top: 6px; display: none; }

.btn-login {
  width: 100%; padding: 14px; margin-top: 16px;
  background: var(--blue); color: var(--white);
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700;
  letter-spacing: 1px; border: none; border-radius: var(--rs); cursor: pointer;
  transition: background .15s;
}
.btn-login:hover { background: var(--blue-dark); }
.btn-login:disabled { opacity: .5; cursor: not-allowed; }

/* ── APP ────────────────────────────────────────────────── */
#app { display: none; }

.topbar {
  background: var(--blue); color: var(--white);
  padding: 0 16px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(14,61,110,.25);
}
.tb-logo {
  display: flex; align-items: center; gap: 10px;
}
.tb-logo svg { width: 28px; height: 28px; }
.tb-brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800; letter-spacing: 1.5px; color: var(--white);
}
.tb-user { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 1px; }
.tb-right { display: flex; align-items: center; gap: 8px; }
.tb-sync { font-size: 11px; color: rgba(255,255,255,.7); }
.lout-btn {
  background: rgba(255,255,255,.15); border: none; color: var(--white);
  padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Barlow', sans-serif; display: flex; align-items: center; gap: 5px;
}
.lout-btn:hover { background: rgba(255,255,255,.25); }

.tabs {
  background: var(--white); border-bottom: 2px solid var(--gray-100);
  display: flex; overflow-x: auto;
  position: sticky; top: 56px; z-index: 99;
  box-shadow: 0 2px 6px rgba(14,61,110,.08);
}
.tab {
  flex: none; padding: 13px 18px; font-size: 13px; font-weight: 600;
  border: none; background: none; color: var(--gray-500);
  cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px;
  white-space: nowrap; font-family: 'Barlow', sans-serif;
  display: flex; align-items: center; gap: 6px;
  transition: color .15s;
}
.tab.on { color: var(--blue); border-bottom-color: var(--blue); }
.tab i { font-size: 16px; }

.main { padding: 16px; max-width: 900px; margin: 0 auto; padding-bottom: 40px; }

/* ── CARDS ──────────────────────────────────────────────── */
.card {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--r); padding: 16px 18px; margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; color: var(--gray-500);
  margin-bottom: 14px;
}

/* ── STATS GRID ─────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px; }
.stat-card {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--r); padding: 14px 16px;
  box-shadow: var(--shadow); text-align: center;
}
.stat-card.blue { border-top: 3px solid var(--blue); }
.stat-card.green { border-top: 3px solid var(--green); }
.stat-card.red { border-top: 3px solid var(--red); }
.stat-card.amber { border-top: 3px solid var(--amber); }
.stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--gray-900); }
.stat-label { font-size: 11px; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

/* ── PROGRESS ───────────────────────────────────────────── */
.prog-wrap { background: var(--gray-100); border-radius: 20px; height: 8px; overflow: hidden; margin-top: 10px; }
.prog-bar { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width .6s ease; }

/* ── FACT SEARCH ────────────────────────────────────────── */
.fact-search-wrap {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue));
  border-radius: var(--r); padding: 24px 20px; margin-bottom: 14px; text-align: center;
}
.fact-search-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700;
  color: var(--white); letter-spacing: 1px; margin-bottom: 6px;
}
.fact-search-sub { font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 18px; }
.fact-big-input {
  width: 100%; padding: 16px; font-size: 24px; font-weight: 800;
  text-align: center; letter-spacing: 3px; border-radius: var(--r);
  border: 3px solid transparent; font-family: 'Barlow Condensed', sans-serif;
  color: var(--gray-900); background: var(--white);
  transition: border-color .2s;
}
.fact-big-input:focus { outline: none; border-color: var(--blue-light); }
.fact-big-input.found { border-color: var(--green); background: var(--green-bg); }
.fact-big-input.notfound { border-color: var(--red); background: var(--red-bg); }

/* ── FACT PREVIEW ───────────────────────────────────────── */
#fact-preview {
  display: none; background: var(--blue-light); border: 1.5px solid var(--blue);
  border-radius: var(--r); padding: 16px 18px; margin-bottom: 12px;
}
.fp-name { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
.fp-row { font-size: 13px; color: var(--gray-700); display: flex; align-items: flex-start; gap: 7px; margin-bottom: 5px; }
.fp-row i { color: var(--blue); flex-shrink: 0; margin-top: 1px; }
.fp-amount { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--blue); margin-top: 10px; }

/* ── FACT CARDS (motorista list) ──────────────────────────── */
.fcard {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--gray-200);
}
.fcard.pendiente { border-left-color: var(--amber); }
.fcard.entregada { border-left-color: var(--green); }
.fcard.no-entregada { border-left-color: var(--red); }
.fcard.extraviada { border-left-color: #6b21a8; }
.fcard.anulada { border-left-color: var(--gray-300); opacity: .7; }
.b-extra { background: #f3e8ff; color: #6b21a8; }
.b-anul  { background: var(--gray-100); color: var(--gray-500); }
/* Trazabilidad timeline */
.traza-line { position:relative; padding-left:24px; margin-bottom:8px; }
.traza-line::before { content:''; position:absolute; left:7px; top:18px; width:2px; bottom:-8px; background:var(--gray-200); }
.traza-line:last-child::before { display:none; }
.traza-dot { position:absolute; left:0; top:4px; width:14px; height:14px; border-radius:50%; border:2px solid var(--white); }
/* Conciliacion */
.conc-match { background:var(--green-bg); border-left:3px solid var(--green); }
.conc-pend  { background:var(--amber-bg); border-left:3px solid var(--amber); }
.conc-extra { background:#f3e8ff; border-left:3px solid #6b21a8; }
.conc-miss  { background:var(--red-bg); border-left:3px solid var(--red); }
.fcard-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.fcard-num { font-size: 11px; font-weight: 700; letter-spacing: .06em; color: var(--gray-500); }
.fcard-name { font-size: 16px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
.fcard-dir { font-size: 13px; color: var(--gray-500); display: flex; gap: 5px; align-items: flex-start; }
.fcard-dir i { color: var(--blue); flex-shrink: 0; margin-top: 1px; }
.fcard-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--gray-500); margin-top: 8px; }
.fcard-actions { display: flex; gap: 8px; margin-top: 12px; }
.fa-btn {
  flex: 1; padding: 10px; font-size: 13px; font-weight: 700;
  border-radius: var(--rs); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  font-family: 'Barlow', sans-serif; transition: opacity .15s;
}
.fa-btn:hover { opacity: .85; }
.fa-ok { background: var(--green-bg); color: var(--green); }
.fa-no { background: var(--red-bg); color: var(--red); }
.fa-undo { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }

/* ── BADGES ─────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  letter-spacing: .03em;
}
.b-pend { background: var(--amber-bg); color: var(--amber); }
.b-ok { background: var(--green-bg); color: var(--green); }
.b-no { background: var(--red-bg); color: var(--red); }
.b-blue { background: var(--blue-light); color: var(--blue); }
.b-parcial { background: #fff0f9; color: #9b2672; }

/* ── NC BADGE ───────────────────────────────────────────── */
.nc-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: #f0f0ff; border: 1.5px solid #7c5cbf; border-radius: var(--rs);
  padding: 4px 10px; font-size: 12px; font-weight: 700; color: #5a3fa0;
  margin-top: 6px;
}
.nc-input-wrap {
  background: #f0f0ff; border: 1.5px solid #7c5cbf; border-radius: var(--rs);
  padding: 12px 14px; margin-top: 10px;
}
.nc-input-wrap label { color: #5a3fa0; font-weight: 700; font-size: 12px; }
.nc-input-wrap input { border-color: #7c5cbf; margin-top: 4px; font-size: 15px; }
.fa-parcial { background: #fff0f9; color: #9b2672; }

/* ── MOT CARD (admin) ───────────────────────────────────── */
.mot-card {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--r); padding: 16px 18px; margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.mot-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800;
  color: var(--gray-900); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.mot-name i { color: var(--blue); }
.mot-stats { display: flex; flex-wrap: wrap; gap: 14px; font-size: 13px; margin-bottom: 10px; }
.mot-stat { display: flex; align-items: center; gap: 5px; color: var(--gray-700); }
.mot-stat i { font-size: 15px; }

/* ── TABLE ──────────────────────────────────────────────── */
.tbl { overflow-x: auto; border-radius: var(--rs); }
table { width: 100%; font-size: 13px; border-collapse: collapse; }
th {
  background: var(--gray-50); padding: 9px 12px; text-align: left;
  font-size: 11px; font-weight: 700; color: var(--gray-500);
  border-bottom: 1px solid var(--gray-200); white-space: nowrap;
  letter-spacing: .05em; text-transform: uppercase;
}
td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
tr:last-child td { border: none; }
tr:hover td { background: var(--blue-pale); }

/* ── UPLOAD ─────────────────────────────────────────────── */
.upload-area {
  border: 2px dashed var(--gray-200); border-radius: var(--r);
  padding: 24px; text-align: center; cursor: pointer;
  color: var(--gray-500); font-size: 14px; transition: all .15s;
}
.upload-area:hover { border-color: var(--blue); background: var(--blue-pale); }
.upload-area i { font-size: 32px; display: block; margin-bottom: 8px; color: var(--blue); }

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  width: 100%; padding: 13px; font-size: 15px; font-weight: 700;
  border-radius: var(--rs); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  font-family: 'Barlow', sans-serif; transition: all .15s;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.bp { background: var(--blue); color: var(--white); }
.bp:hover:not(:disabled) { background: var(--blue-dark); }
.bd { background: var(--red); color: var(--white); }
.bs { background: var(--white); color: var(--gray-700); border: 1px solid var(--gray-200); }
.bg { background: var(--green); color: var(--white); }

/* ── INPUTS ──────────────────────────────────────────────── */
select, input[type=text], input[type=number], input[type=password], textarea {
  width: 100%; padding: 10px 12px; font-size: 15px;
  border: 1.5px solid var(--gray-200); border-radius: var(--rs);
  background: var(--white); color: var(--gray-900); font-family: 'Barlow', sans-serif;
}
textarea { resize: vertical; min-height: 64px; }
select:focus, input:focus, textarea:focus { outline: none; border-color: var(--blue); }
label { font-size: 13px; color: var(--gray-500); display: block; margin-bottom: 5px; font-weight: 500; }
.field { margin-bottom: 14px; }

/* ── HIST ────────────────────────────────────────────────── */
.hday { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }
.hday-hdr { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.hday-hdr:hover { background: var(--blue-pale); }
.hday-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--gray-900); }
.hday-body { display: none; border-top: 1px solid var(--gray-100); padding: 14px 18px; }
.hday-body.open { display: block; }

/* ── PENDIENTES ─────────────────────────────────────────── */
.pend-card {
  background: var(--amber-bg); border: 1.5px solid #e6a51a;
  border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
}
.pend-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.pend-dias { font-size: 12px; font-weight: 700; color: var(--amber); }

/* ── TOAST ───────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--gray-900); color: var(--white);
  padding: 10px 20px; border-radius: 24px; font-size: 14px; font-weight: 500;
  z-index: 999; opacity: 0; transition: all .25s; pointer-events: none;
  white-space: nowrap; max-width: 92vw; text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MODAL ───────────────────────────────────────────────── */
#ov {
  display: none; position: fixed; inset: 0;
  background: rgba(14,61,110,.5); z-index: 200;
  align-items: flex-end; justify-content: center;
}
#ov.on { display: flex; }
.modal {
  background: var(--white); border-radius: 20px 20px 0 0;
  padding: 24px 20px; width: 100%; max-width: 480px; max-height: 80vh;
  overflow-y: auto;
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800;
  color: var(--gray-900); margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close { background: none; border: none; cursor: pointer; color: var(--gray-500); font-size: 22px; }

/* ── EMPTY ───────────────────────────────────────────────── */
.empty { text-align: center; padding: 40px 16px; color: var(--gray-500); }
.empty i { font-size: 40px; display: block; margin-bottom: 12px; opacity: .3; }
.empty p { font-size: 14px; }

/* ── TIPO PAGO MODAL ────────────────────────────────────── */
#ov-reenvio {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  align-items: center; justify-content: center; z-index: 9999; padding: 16px;
}
#ov-reenvio.on { display: flex; }
#ov-reenvio .modal { max-width: 440px; width: 100%; }
#ov-pago {
  display: none; position: fixed; inset: 0;
  background: rgba(14,61,110,.5); z-index: 200;
  align-items: flex-end; justify-content: center;
}
#ov-pago.on { display: flex; }
.tipo-pago-btn {
  padding: 14px 8px; border-radius: var(--r);
  border: 2px solid var(--gray-200); background: var(--white);
  cursor: pointer; font-family: 'Barlow', sans-serif;
  font-size: 15px; font-weight: 700; color: var(--gray-700);
  text-align: center; transition: all .15s;
}
.tipo-pago-btn:hover { border-color: var(--blue); background: var(--blue-pale); }
.tipo-pago-btn.sel { border-color: var(--green); background: var(--green-bg); color: var(--green); }

/* ── ALERT BANNER ──────────────────────────────────────────── */
.alert-banner {
  background: var(--red-bg); border: 1.5px solid var(--red);
  border-radius: var(--r); padding: 12px 16px; margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 10px;
}
.alert-banner i { color: var(--red); font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.alert-banner-title { font-weight: 700; color: var(--red); font-size: 14px; }
.alert-banner-body { font-size: 13px; color: var(--gray-700); margin-top: 2px; }

/* ── v16: KPI CARDS ──────────────────────────────────────── */
.kpi-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px; }
.kpi-card {
  background:var(--white); border:1px solid var(--gray-200);
  border-radius:var(--r); padding:14px 16px; box-shadow:var(--shadow);
  position:relative; overflow:hidden;
}
.kpi-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.kpi-card.kpi-blue::before { background:var(--blue); }
.kpi-card.kpi-green::before { background:var(--green); }
.kpi-card.kpi-amber::before { background:var(--amber); }
.kpi-card.kpi-red::before { background:var(--red); }
.kpi-card.kpi-purple::before { background:#7b2d8b; }
.kpi-num { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:800; color:var(--gray-900); line-height:1; }
.kpi-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--gray-500); margin-top:3px; }
.kpi-trend { font-size:11px; margin-top:6px; font-weight:600; }
.kpi-trend.up { color:var(--green); }
.kpi-trend.dn { color:var(--red); }
.kpi-trend.eq { color:var(--gray-500); }

/* ── v16: RANKING ────────────────────────────────────────── */
.rank-item {
  display:flex; align-items:center; gap:12px; padding:12px 0;
  border-bottom:1px solid var(--gray-100);
}
.rank-item:last-child { border:none; }
.rank-pos {
  font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800;
  color:var(--gray-300); width:28px; text-align:center; flex-shrink:0;
}
.rank-pos.gold { color:#f5a623; }
.rank-pos.silver { color:#9b9b9b; }
.rank-pos.bronze { color:#a0522d; }
.rank-bar-wrap { flex:1; }
.rank-name { font-size:14px; font-weight:700; color:var(--gray-900); }
.rank-bar { height:6px; background:var(--gray-100); border-radius:20px; margin-top:5px; overflow:hidden; }
.rank-bar-fill { height:100%; border-radius:20px; background:linear-gradient(90deg,var(--blue),var(--blue-mid)); transition:width .6s; }
.rank-score { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; color:var(--blue); }

/* ── v16: MONTHLY CHART CARD ─────────────────────────────── */
.month-card {
  background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));
  border-radius:var(--r); padding:18px 16px; margin-bottom:14px; color:#fff;
}
.month-card-title { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; opacity:.8; margin-bottom:12px; }

/* ── v16: GPS TAG ────────────────────────────────────────── */
.gps-tag {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:700; color:var(--green);
  background:var(--green-bg); border-radius:20px; padding:2px 8px;
}
.gps-tag.no-gps { color:var(--gray-500); background:var(--gray-100); }

/* ── v16: PHOTO EVIDENCE ─────────────────────────────────── */
.photo-thumb {
  width:72px; height:72px; object-fit:cover;
  border-radius:var(--rs); border:2px solid var(--gray-200);
  cursor:pointer; transition:transform .15s;
}
.photo-thumb:hover { transform:scale(1.05); border-color:var(--blue); }
.photo-upload-btn {
  width:72px; height:72px; border:2px dashed var(--gray-300);
  border-radius:var(--rs); background:var(--gray-50);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; font-size:10px; color:var(--gray-500); gap:3px;
  transition:all .15s;
}
.photo-upload-btn:hover { border-color:var(--blue); background:var(--blue-pale); }
.photo-upload-btn i { font-size:22px; color:var(--blue); }

/* ── v16: COBROS MODULE ──────────────────────────────────── */
.cobro-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:1px solid var(--gray-100);
}
.cobro-row:last-child { border:none; }
.cobro-badge { 
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px;
}
.cobro-pendiente { background:#fff3e0; color:#a05c00; }
.cobro-cobrado { background:var(--green-bg); color:var(--green); }
.cobro-parcial { background:#fff0f9; color:#9b2672; }

/* ── v16: AUTO-ASSIGN ────────────────────────────────────── */
.assign-preview {
  background:var(--blue-pale); border:1.5px solid var(--blue-light);
  border-radius:var(--r); padding:14px; margin-top:12px;
}
.assign-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 0; border-bottom:1px solid var(--blue-light);
}
.assign-row:last-child { border:none; }
.assign-cap {
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px; border-radius:50%;
  font-size:12px; font-weight:800; flex-shrink:0;
}
.assign-cap.ok { background:var(--green-bg); color:var(--green); }
.assign-cap.warn { background:var(--amber-bg); color:var(--amber); }
.assign-cap.over { background:var(--red-bg); color:var(--red); }

/* ── v16: LIGHTBOX ───────────────────────────────────────── */
#img-lightbox {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.9);
  z-index:500; align-items:center; justify-content:center;
}
#img-lightbox.on { display:flex; }
#img-lightbox img { max-width:95vw; max-height:90vh; border-radius:var(--r); }
#img-lightbox-close {
  position:absolute; top:16px; right:16px;
  background:rgba(255,255,255,.2); border:none; color:#fff;
  width:40px; height:40px; border-radius:50%; font-size:20px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}

/* ── v16: MONTHLY TABS ───────────────────────────────────── */
.sub-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.sub-tab {
  padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700;
  border:1.5px solid var(--gray-200); background:var(--white); color:var(--gray-500);
  cursor:pointer; transition:all .15s; font-family:'Barlow',sans-serif;
}
.sub-tab.on { background:var(--blue); color:#fff; border-color:var(--blue); }

/* ── v16: PDF EXPORT BTN ─────────────────────────────────── */
.btn-pdf {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px; background:#c0392b; color:#fff;
  border:none; border-radius:var(--rs); font-size:13px; font-weight:700;
  cursor:pointer; font-family:'Barlow',sans-serif; transition:opacity .15s;
}
.btn-pdf:hover { opacity:.85; }

/* ── LOADING ─────────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0; background: var(--blue);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999;
}
.loading-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; color: var(--white); letter-spacing: 3px; }
.loading-sub { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 8px; letter-spacing: 1px; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.2); border-top-color: var(--white); border-radius: 50%; animation: spin .8s linear infinite; margin-top: 24px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<!-- Fallback: si el módulo JS falla por cualquier razón, ocultar loading -->
<script>
  var _fallbackTimer = setTimeout(function() {
    var loading = document.getElementById('loading');
    var login   = document.getElementById('login');
    if (loading) loading.style.display = 'none';
    if (login)   login.style.display   = 'flex';
    var ul = document.getElementById('user-list');
    if (ul && !ul.innerHTML.trim()) {
      var usuarios = [
        { id:'mot1', nombre:'Motorista 1',   rol:'motorista', pin:'1234',      icon:'ti-motorbike'    },
        { id:'mot2', nombre:'Motorista 2',   rol:'motorista', pin:'2345',      icon:'ti-motorbike'    },
        { id:'mot3', nombre:'Motorista 3',   rol:'motorista', pin:'3456',      icon:'ti-motorbike'    },
        { id:'mot4', nombre:'Motorista 4',   rol:'motorista', pin:'4567',      icon:'ti-motorbike'    },
        { id:'mot5', nombre:'Motorista 5',   rol:'motorista', pin:'5678',      icon:'ti-motorbike'    },
        { id:'adm1', nombre:'Administrador 1', rol:'admin',   pin:'admin1',    icon:'ti-shield-check' },
        { id:'adm2', nombre:'Administrador 2', rol:'admin',   pin:'admin2',    icon:'ti-shield-check' },
        { id:'adm3', nombre:'Administrador 3', rol:'admin',   pin:'admin3',    icon:'ti-shield-check' },
        { id:'cons1',nombre:'Consulta',      rol:'consulta',  pin:'consulta1', icon:'ti-eye'          },
      ];
      window._fallbackUsuarios = usuarios;
      var h = '<div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin-bottom:10px">Motoristas</div>';
      usuarios.filter(function(u){return u.rol==='motorista';}).forEach(function(u){
        h+='<button class="user-btn" id="ubtn-'+u.id+'" onclick="window._fbPickUser(\''+u.id+'\')">'
          +'<i class="ti '+u.icon+'" style="font-size:20px;color:var(--blue)"></i>'
          +'<div><div>'+u.nombre+'</div></div></button>';
      });
      h+='<div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin:14px 0 10px">Administradores</div>';
      usuarios.filter(function(u){return u.rol==='admin';}).forEach(function(u){
        h+='<button class="user-btn" id="ubtn-'+u.id+'" onclick="window._fbPickUser(\''+u.id+'\')">'
          +'<i class="ti '+u.icon+'" style="font-size:20px;color:var(--blue)"></i>'
          +'<div><div>'+u.nombre+'</div></div></button>';
      });
      h+='<div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin:14px 0 10px">Consulta</div>';
      usuarios.filter(function(u){return u.rol==='consulta';}).forEach(function(u){
        h+='<button class="user-btn" id="ubtn-'+u.id+'" onclick="window._fbPickUser(\''+u.id+'\')">'
          +'<i class="ti '+u.icon+'" style="font-size:20px;color:var(--blue)"></i>'
          +'<div><div>'+u.nombre+'</div><small>Solo lectura</small></div></button>';
      });
      ul.innerHTML = h;
    }
  }, 4000);

  window._clearFallback = function() { clearTimeout(_fallbackTimer); };

  // Selección de usuario desde fallback
  window._fbSelUser = null;
  window._fbPickUser = function(id) {
    var lista = window._fallbackUsuarios || [];
    window._fbSelUser = lista.find(function(u){ return u.id===id; }) || null;
    if (window.selectUser) { window.selectUser(id); return; }
    document.querySelectorAll('.user-btn').forEach(function(b){ b.classList.remove('sel'); });
    var btn = document.getElementById('ubtn-'+id);
    if (btn) btn.classList.add('sel');
    document.getElementById('pin-wrap').classList.add('show');

function esc(s) {

// FIX REASIGNACIÓN: índice de facturas no entregadas para detectar reasignaciones al cargar CSV
async function buildNoEntregadasIndex() {
  const snap = await getDocs(query(collection(db, 'rutas'), where('estado', '==', 'no-entregada')));
  const idx = {};
  snap.docs.forEach(d => {
    const k = normFact(d.data().factura);
    if (!k) return;
    if (!idx[k]) idx[k] = [];
    idx[k].push({ id: d.id, data: d.data() });
  });
  return idx;
}

// FIX REASIGNACIÓN: si una factura no entregada vuelve a ruta, marcar la anterior como reprogramada
async function procesarReasignacionFactura(factura, ctx, noEntIdx) {
  const k = normFact(factura);
  const previas = (noEntIdx && noEntIdx[k]) ? noEntIdx[k] : [];
  if (!previas.length) {
    await registrarEstadoFactura(factura, 'asignada', ctx);
    await registrarEstadoFactura(factura, 'pendiente', { ...ctx, nota: 'Pendiente de entrega en ruta' });
    return false;
  }
  const batch = writeBatch(db);
  previas.forEach(p => {
    batch.update(doc(db, 'rutas', p.id), {
      estado: 'reprogramada',
      fechaReprogramacion: ctx.fechaAsignacion || hoy(),
      reprogramadaPor: ctx.motoristaNombre || '—',
      nuevaFechaRuta: ctx.fechaAsignacion || hoy(),
      tsEpoch: Date.now(),
    });
  });
  await batch.commit();
  for (const p of previas) {
    await registrarEstadoFactura(factura, 'reprogramada', {
      ...ctx,
      nota: 'Reasignada a ruta del ' + fmtFecha(ctx.fechaAsignacion || hoy()),
      motivo: p.data.motivo || null,
    });
  }
  await registrarEstadoFactura(factura, 'pendiente', {
    ...ctx,
    nota: 'Reprogramada — pendiente de entrega',
  });
  // Actualizar pendientes cross-day si existen
  const pendSnap = await getDocs(query(collection(db, 'pendientes'), where('facturaOriginal', '==', factura)));
  if (!pendSnap.empty) {
    await updateDoc(doc(db, 'pendientes', pendSnap.docs[0].id), {
      estado: 'reprogramada',
      fechaReprogramacion: ctx.fechaAsignacion || hoy(),
      motoristaNombre: ctx.motoristaNombre,
      tsEpoch: Date.now(),
    });
  }
  return true;
}

    if (!k) return;
    if (!byFact[k] || (r.tsEpoch || 0) >= (byFact[k].tsEpoch || 0)) byFact[k] = r;
  });
  return Object.values(byFact).filter(r => r.estado !== 'reprogramada');
}

// AUDITORÍA v18: KPIs operativos centralizados (dashboard, gerencial, reportes)
function calcKPIsOperativos(rutas, opts = {}) {
  const activas = rutas.filter(r => r.estado !== 'reprogramada');
  const reprogramadas = rutas.filter(r => r.estado === 'reprogramada').length;
  const asignadas = activas.length;
  const entregadas = activas.filter(r => r.estado === 'entregada').length;
  const pendientes = activas.filter(r => r.estado === 'pendiente').length;
  const noEntregadas = activas.filter(r => r.estado === 'no-entregada').length;
  const anuladas = activas.filter(r => r.estadoAdmin === 'anulacion' || r.anulada).length;
  const notaCredito = activas.filter(r => r.notaCredito).length;
  const pctCumplimiento = asignadas ? Math.round(entregadas / asignadas * 100) : 0;
  return {
    emitidas: opts.emitidas || 0,
    asignadas, entregadas, pendientes, noEntregadas, reprogramadas, anuladas, notaCredito,
    pctCumplimiento,
    contado: activas.filter(r => r.estado === 'entregada' && r.tipoPago === 'Contado')
      .reduce((a, r) => a + (parseFloat(r.monto) || 0), 0),
  };
}

// AUDITORÍA v18: debounce para filtros en tiempo real (reduce re-renders)
function debounce(fn, ms = 280) {
  let t;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}
const renderConsBusquedaFiltradoDebounced = debounce(() => renderConsBusquedaFiltrado(), 280);

// AUDITORÍA v18: merge incremental en cache (evita re-fetch completo en cada snapshot)
function mergeRutasHoyEnTodas(hoyRutas) {
  const hoyStr = hoy();
  const hoyIds = new Set(hoyRutas.map(r => r._id));
  if (!CACHE.rutasTodas) {
    // Cache aún no listo — inicializar con las de hoy para no perderlas
    CACHE.rutasTodas = [...hoyRutas];
  } else {
    CACHE.rutasTodas = [
      ...hoyRutas,
      ...CACHE.rutasTodas.filter(r => r.fecha !== hoyStr || !hoyIds.has(r._id)),
    ];
  }
  CACHE.ts.rutasTodas = Date.now();
}

// AUDITORÍA v18: parsear fecha emisión dd/mm/yyyy → YYYY-MM-DD
function parseFechaEmision(str) {
  if (!str) return '';
  const m = String(str).match(/(\d{2})\/(\d{2})\/(\d{4})/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : String(str).substring(0, 10);
}

// AUDITORÍA v18: commit de writeBatch en chunks (límite Firestore 500 ops)
async function commitBatchChunked(ops) {
  const CHUNK = 450;
  for (let i = 0; i < ops.length; i += CHUNK) {
    const batch = writeBatch(db);
    ops.slice(i, i + CHUNK).forEach(op => {
      if (op.type === 'set') batch.set(op.ref, op.data, op.opts || {});
      else if (op.type === 'update') batch.update(op.ref, op.data);
      else if (op.type === 'delete') batch.delete(op.ref);
    });
    await batch.commit();
  }
}

// Incluye rutas normales + registros de conciliacion_admin (gestionados por admin)
async function ensureConsRutasCache() {
  if (!cacheOk('rutasTodas', 60000)) {
    // Cargar rutas normales
    const [rutasSnap, concSnap] = await Promise.all([
      getDocs(collection(db, 'rutas')),
      getDocs(collection(db, 'conciliacion_admin'))
    ]);

    // Para rutas normales: si tienen estadoAdmin gestionado, reflejar en campo estado
    const ADMIN_A_ESTADO_RUTA = {
      entregada:       'entregada',
      retiro_cliente:  'gestionada',
      retiro_vendedor: 'gestionada',
      anulacion:       'gestionada',
      refacturacion:   'gestionada',
    };
    const rutas = rutasSnap.docs.map(d => {
      const data = { ...d.data(), _id: d.id, _origen: 'ruta' };
      // Si el admin gestionó la factura, reflejar el estado real
      if (data.estadoAdmin && data.estadoAdmin !== 'entregada') {
        data._estadoGestionado = data.estadoAdmin;
        if (ADMIN_A_ESTADO_RUTA[data.estadoAdmin]) {
          data.estado = ADMIN_A_ESTADO_RUTA[data.estadoAdmin];
        }
      }
      return data;
    });

    // Convertir registros de conciliacion_admin al mismo formato que rutas
    // Solo incluir los que tienen estado relevante (entregada, estadoAdmin, etc.)
    const rutasIds = new Set(rutas.map(r => normFact(r.factura)));
    // Mapa de estadoAdmin → estado visible en consultas
    const ADMIN_A_ESTADO = {
      entregada:       'entregada',
      retiro_cliente:  'gestionada',
      retiro_vendedor: 'gestionada',
      anulacion:       'gestionada',
      refacturacion:   'gestionada',
    };

    const concDocs = concSnap.docs
      .map(d => ({ ...d.data(), _id: d.id, _origen: 'conciliacion_admin' }))
      .filter(c => {
        // Incluir si NO existe en rutas, o si tiene cualquier estadoAdmin relevante
        const key = normFact(c.factura);
        if (!rutasIds.has(key)) return true;
        // Si ya existe en rutas, incluir solo si tiene un estadoAdmin definido (sobreescribe)
        return !!c.estadoAdmin || c.estado === 'entregada';
      })
      .map(c => ({
        _id:             c._id,
        _origen:         'conciliacion_admin',
        factura:         c.factura,
        nombre:          c.nombre || c.cliente || '',
        cliente:         c.cliente || c.nombre || '',
        fecha:           c.fecha || c.fechaAdminCambio || '',
        fechaEmision:    c.fechaEmision || c.fecha || '',
        fechaEnt:        c.fechaEnt || (c.estadoAdmin === 'entregada' ? c.fechaAdminCambio : ''),
        horaEnt:         c.horaEnt || '',
        motoristaNombre: c.motoristaNombre || 'Admin',
        monto:           c.monto || '',
        tipoPago:        c.tipoPago || (c.estadoAdmin === 'entregada' ? 'Admin' : ''),
        estado:          c.estado || ADMIN_A_ESTADO[c.estadoAdmin] || 'pendiente',
        estadoAdmin:     c.estadoAdmin || '',
        concEstado:      c.concEstado || 'no_asignada',
        fechaAdminCambio: c.fechaAdminCambio || '',
        tsEpoch:         c.tsEpoch || 0,
      }));

    setCache('rutasTodas', [...rutas, ...concDocs]);
  }
  return CACHE.rutasTodas || [];
}

// NUEVA FUNCIONALIDAD CONSULTA: filtros dinámicos en tiempo real
function getConsFiltros() {
  return {
    cliente: (document.getElementById('cons-q-cliente')?.value || '').toLowerCase().trim(),
    factura: (document.getElementById('cons-q-factura')?.value || '').trim(),
    codigo: (document.getElementById('cons-q-codigo')?.value || '').toLowerCase().trim(),
    motorista: (document.getElementById('cons-q-motorista')?.value || '').toLowerCase().trim(),
    estado: document.getElementById('cons-q-estado')?.value || '',
    fecha: document.getElementById('cons-q-fecha')?.value || '',
    fechaEmisionDesde: document.getElementById('cons-q-emision-desde')?.value || '',
    fechaEmisionHasta: document.getElementById('cons-q-emision-hasta')?.value || '',
    fechaEntregaDesde: document.getElementById('cons-q-entrega-desde')?.value || '',
    fechaEntregaHasta: document.getElementById('cons-q-entrega-hasta')?.value || '',
  };
}

function aplicarFiltrosCons(rutas) {
  const f = getConsFiltros();
  return rutas.filter(r => {
    if (r.estado === 'reprogramada') return false;
    if (f.fecha && r.fecha !== f.fecha) return false;
    if (f.estado && r.estado !== f.estado) return false;
    if (f.cliente && !(r.nombre || r.cliente || '').toLowerCase().includes(f.cliente)) return false;
    if (f.factura && !matchFactura(r.factura, f.factura) && !String(r.factura || '').toLowerCase().includes(f.factura.toLowerCase())) return false;
    if (f.codigo && !(String(r.codigoCliente || r.codigo || '')).toLowerCase().includes(f.codigo)) return false;
    if (f.motorista) {
      const mn = (r.motoristaNombre || '').toLowerCase();
      const mid = (r.motorista || '').toLowerCase();
      if (!mn.includes(f.motorista) && !mid.includes(f.motorista)) return false;
    }
    // AUDITORÍA v18: filtros por fecha de emisión y entrega
    const fEm = parseFechaEmision(r.fechaEmision || '');
    if (f.fechaEmisionDesde && fEm && fEm < f.fechaEmisionDesde) return false;
    if (f.fechaEmisionHasta && fEm && fEm > f.fechaEmisionHasta) return false;
    const fEnt = r.fechaEnt || '';
    if (f.fechaEntregaDesde && fEnt && fEnt < f.fechaEntregaDesde) return false;
    if (f.fechaEntregaHasta && fEnt && fEnt > f.fechaEntregaHasta) return false;
    return true;
  });
}

function renderConsSimple() {
  const el = document.getElementById('cons-resultados-simple');
  if (!el) return;

  const fechaFiltro = (document.getElementById('cons-q-fecha-factura')?.value || '').trim();
  let all = (CACHE.rutasTodas || []).filter(r => r.estado !== 'reprogramada');

  // ── Deduplicar por número de factura ──────────────────────────────────────
  // Si la misma factura aparece en varias fechas, mostrar SOLO el registro con
  // el mejor estado final (entregada > no-entregada > pendiente).
  // Así la factura del 12/06 que quedó no-entregada y se entregó el 15/06
  // solo muestra la línea del 15/06 como entregada.
  const PRIO = { entregada: 3, 'no-entregada': 2, pendiente: 1 };
  const porFactura = {};
  all.forEach(r => {
    const k = normFact ? normFact(r.factura) : String(r.factura || '').trim().toLowerCase();
    const prev = porFactura[k];
    if (!prev) { porFactura[k] = r; return; }
    const pActual = PRIO[r.estado]    || 0;
    const pPrev   = PRIO[prev.estado] || 0;
    // Gana el de mayor prioridad; si empatan, el de fecha más reciente
    if (pActual > pPrev) { porFactura[k] = r; return; }
    if (pActual === pPrev && (r.fecha || '') > (prev.fecha || '')) { porFactura[k] = r; }
  });
  all = Object.values(porFactura);

  // Filtrar por fecha de factura (campo fechaEmision o fecha de ruta como fallback)
  // Se aplica DESPUÉS de deduplicar para que el filtro actúe sobre el estado final
  if (fechaFiltro) {
    all = all.filter(r => {
      const fEmision = (r.fechaEmision || '').slice(0,10);
      const fRuta    = (r.fecha       || '').slice(0,10);
      return fEmision === fechaFiltro || (!r.fechaEmision && fRuta === fechaFiltro);
    });
  }

  // Filtrar por estado
  const estadoFiltro = (document.getElementById('cons-q-estado-simple')?.value || '').trim();
  if (estadoFiltro) {
    if (estadoFiltro === 'gestionada') {
      // Mostrar todas las que tienen estadoAdmin gestionado (no entregada)
      all = all.filter(r => r.estadoAdmin && r.estadoAdmin !== 'entregada');
    } else {
      all = all.filter(r => r.estado === estadoFiltro && !(r.estadoAdmin && r.estadoAdmin !== 'entregada'));
    }
  }

  if (!all.length) {
    const msg = fechaFiltro && estadoFiltro ? `Sin facturas ${estadoFiltro}s para esa fecha`
              : fechaFiltro                 ? 'Sin facturas para esa fecha'
              : estadoFiltro               ? `Sin facturas con estado "${estadoFiltro}"`
              :                              'No hay facturas registradas';
    el.innerHTML = `<div class="empty"><i class="ti ti-file-off"></i><p>${msg}</p></div>`;
    return;
  }

  // Ordenar: fecha más reciente primero, luego entregadas al final (pendientes y no-entregadas arriba)
  all.sort((a, b) => {
    const fa = (a.fechaEmision || a.fecha || '');
    const fb = (b.fechaEmision || b.fecha || '');
    if (fb !== fa) return fb.localeCompare(fa);
    return (PRIO[a.estado] ?? 1) - (PRIO[b.estado] ?? 1);
  });

  const nEnt     = all.filter(r => r.estado === 'entregada').length;
  const nPend    = all.filter(r => r.estado === 'pendiente' && !r.estadoAdmin).length;
  const nNoEnt   = all.filter(r => r.estado === 'no-entregada' && !r.estadoAdmin).length;
  const nGest    = all.filter(r => r.estadoAdmin && r.estadoAdmin !== 'entregada').length;

  let h = `<div style="font-size:13px;color:var(--gray-500);margin-bottom:10px">
    <strong>${all.length}</strong> factura(s) ${fechaFiltro ? 'del ' + fmtFecha(fechaFiltro) : 'en total'}
    &nbsp;·&nbsp;
    <span style="color:var(--green)">✓ ${nEnt} entregadas</span>
    &nbsp;·&nbsp;
    <span style="color:var(--amber)">⏳ ${nPend} pendientes</span>
    &nbsp;·&nbsp;
    <span style="color:var(--red)">✗ ${nNoEnt} no entregadas</span>
    ${nGest ? `&nbsp;·&nbsp;<span style="color:#7c3aed">🔧 ${nGest} gestionadas</span>` : ''}
  </div>`;

  // Labels y colores para estados gestionados por admin
  const ADMIN_LABELS = {
    retiro_cliente:  'Retiro Cliente',
    retiro_vendedor: 'Retiro Vendedor',
    anulacion:       'Anulada',
    refacturacion:   'Refacturación',
  };

  all.forEach(r => {
    // Determinar clase visual del card
    const eaMin = r.estadoAdmin && r.estadoAdmin !== 'entregada' ? r.estadoAdmin : null;
    let cardClass = 'pendiente';
    if (r.estado === 'entregada')    cardClass = 'entregada';
    else if (r.estado === 'no-entregada') cardClass = 'no-entregada';
    else if (eaMin)                  cardClass = 'no-entregada'; // borde rojo para gestionadas

    // Línea extra de gestión admin
    const adminLine = eaMin
      ? `<span style="background:#f3f4f6;color:#374151;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700">
           <i class="ti ti-settings" style="color:#7c3aed"></i> Gestionado: ${ADMIN_LABELS[eaMin] || eaMin}
         </span>`
      : '';

    h += `<div class="fcard ${cardClass}" style="margin-bottom:8px">
      <div class="fcard-header">
        <div>
          <div class="fcard-num">FACTURA #${esc(r.factura)}</div>
          <div class="fcard-name">${esc(r.nombre || r.cliente || '—')}</div>
          ${r.codigoCliente || r.codigo ? `<div style="font-size:12px;color:var(--gray-500)">Cód: ${esc(r.codigoCliente || r.codigo)}</div>` : ''}
          ${r.direccion ? `<div class="fcard-dir"><i class="ti ti-map-pin"></i>${esc(r.direccion)}${r.municipio ? ', ' + esc(r.municipio) : ''}</div>` : ''}
        </div>
        ${estadoBadge(r.estado, r.entregaParcial, r.estadoAdmin)}
      </div>
      <div class="fcard-meta">
        <span><i class="ti ti-motorbike" style="color:var(--blue)"></i> ${esc(r.motoristaNombre || '—')}</span>
        <span><i class="ti ti-calendar" style="color:var(--gray-500)"></i> Ruta: ${fmtFecha(r.fecha || '—')}</span>
        ${r.fechaEmision ? `<span><i class="ti ti-file-invoice" style="color:var(--gray-500)"></i> Emisión: ${esc(r.fechaEmision)}</span>` : ''}
        ${r.fechaEnt ? `<span><i class="ti ti-truck-delivery" style="color:var(--green)"></i> Entregada: ${fmtFecha(r.fechaEnt)}${r.horaEnt ? ' ' + esc(r.horaEnt) : ''}</span>` : ''}
        ${r.fechaAdminCambio && eaMin ? `<span><i class="ti ti-calendar-event" style="color:#7c3aed"></i> Gestionado: ${fmtFecha(r.fechaAdminCambio)}</span>` : ''}
        ${r.monto ? `<span><i class="ti ti-coin" style="color:var(--blue)"></i> ${esc(r.monto)}</span>` : ''}
        ${r.motivoReenvio ? `<span style="color:var(--amber)"><i class="ti ti-send"></i> Reenvío: ${esc(r.motivoReenvio)}</span>` : ''}
        ${adminLine}
        <button onclick="verHistorialEstadosFactura(decodeURIComponent('${encodeURIComponent(String(r.factura))}'))"
          style="background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--rs);padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto">
          <i class="ti ti-history"></i> Historial
        </button>
      </div>
    </div>`;
  });
  el.innerHTML = h;
}

  const qEstado = document.getElementById('cpm-q-estado')?.value || '';
  const motoristas = USUARIOS.filter(u => u.rol === 'motorista')
    .filter(m => !qMot || m.nombre.toLowerCase().includes(qMot));
  const todas = (CACHE.rutasTodas || []).filter(r => r.fecha === fecha && r.estado !== 'reprogramada');
  if (!motoristas.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-motorbike"></i><p>Sin motoristas registrados</p></div>'; return;
  }
  let html = '';
  let totalGlobal = 0;
  motoristas.forEach(mot => {
    let mrs = todas.filter(r => r.motorista === mot.id);
    if (qCli)    mrs = mrs.filter(r => (r.nombre||r.cliente||'').toLowerCase().includes(qCli));
    if (qEstado) mrs = mrs.filter(r => r.estado === qEstado);
    if (!mrs.length && (qMot || qCli || qEstado)) return;
    const ent   = mrs.filter(r => r.estado === 'entregada').length;
    const pend  = mrs.filter(r => r.estado === 'pendiente').length;
    const noEnt = mrs.filter(r => r.estado === 'no-entregada').length;
    const total = mrs.length;
    const pct   = total ? Math.round(ent/total*100) : 0;
    const pctClr= pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    totalGlobal += total;
    const ORDER = { pendiente:0, 'no-entregada':1, entregada:2 };
    mrs.sort((a,b) => (ORDER[a.estado]??1)-(ORDER[b.estado]??1));
    html += `
    <div class="mot-card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div class="mot-name"><i class="ti ti-motorbike"></i> ${esc(mot.nombre)}
          <span style="font-size:13px;font-weight:400;color:var(--gray-500);margin-left:4px">${fmtFecha(fecha)}</span>
        </div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;font-size:12px">
          <span style="background:var(--blue-light);color:var(--blue);border-radius:20px;padding:3px 10px;font-weight:700"><i class="ti ti-users"></i> ${total} clientes</span>
          <span style="background:var(--green-bg);color:var(--green);border-radius:20px;padding:3px 10px;font-weight:700">✓ ${ent}</span>
          ${pend  ? `<span style="background:var(--amber-bg);color:var(--amber);border-radius:20px;padding:3px 10px;font-weight:700">⏳ ${pend}</span>` : ''}
          ${noEnt ? `<span style="background:var(--red-bg);color:var(--red);border-radius:20px;padding:3px 10px;font-weight:700">✗ ${noEnt}</span>` : ''}
          <span style="background:${pctClr};color:#fff;border-radius:20px;padding:3px 10px;font-weight:700">${pct}%</span>
        </div>
      </div>
      <div class="prog-wrap" style="margin-bottom:12px">
        <div class="prog-bar" style="width:${pct}%;background:${pctClr}"></div>
      </div>`;
    if (!mrs.length) {
      html += `<div style="text-align:center;padding:14px;color:var(--gray-500);font-size:13px">Sin clientes asignados este día</div>`;
    } else {
      html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px">`;
      mrs.forEach((r, idx) => {
        const esEnt   = r.estado === 'entregada';
        const esNoEnt = r.estado === 'no-entregada';
        const bg  = esEnt ? 'var(--green-bg)' : esNoEnt ? 'var(--red-bg)' : 'var(--white)';
        const bdr = esEnt ? 'var(--green)'    : esNoEnt ? 'var(--red)'    : '#e6a51a';
        const ico = esEnt ? 'ti-check-circle' : esNoEnt ? 'ti-circle-x'  : 'ti-clock';
        const iclr= esEnt ? 'var(--green)'    : esNoEnt ? 'var(--red)'    : 'var(--amber)';
        html += `
        <div style="background:${bg};border:1.5px solid ${bdr};border-radius:var(--rs);padding:12px 14px;position:relative">
          <div style="position:absolute;top:9px;right:11px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:${bdr};opacity:.3">#${idx+1}</div>
          <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">
            <i class="ti ${ico}" style="color:${iclr};font-size:18px;flex-shrink:0;margin-top:2px"></i>
            <div>
              <div style="font-size:15px;font-weight:700;color:var(--gray-900);line-height:1.2">${esc(r.nombre||r.cliente||'—')}</div>
              ${r.codigoCliente||r.codigo ? `<div style="font-size:11px;color:var(--gray-500);font-weight:600">Cód: ${esc(r.codigoCliente||r.codigo)}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--gray-700)">
            ${r.direccion ? `<span><i class="ti ti-map-pin" style="color:var(--blue)"></i> ${esc(r.direccion)}${r.municipio?', '+esc(r.municipio):''}</span>` : ''}
            <span><i class="ti ti-file-invoice" style="color:var(--blue)"></i> Factura <strong>#${esc(r.factura)}</strong></span>
            ${r.monto ? `<span><i class="ti ti-coin" style="color:var(--blue)"></i> ${esc(r.monto)}</span>` : ''}

  const q = query(collection(db,'rutas'), where('fecha','==',hoy()), where('motorista','==',currentUser.id));

function swTab(id, el) {
  CURRENT_TAB = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  if (id === 'buscar') renderMotBuscar();
  else if (id === 'mis-rutas') renderMisRutas();
  else if (id === 'liquidar') renderLiquidar();
  else if (id === 'historial-mot') renderHistorialMot();
}

window.buscarFactura = async function(confirm=false) {
  const q = document.getElementById('fact-num')?.value.trim();
  if (!q || q.length < 1) {
    resetFacturaUI(); return;
  }
  // Search in today's route for this motorista
  const rutaSnap = await getDocs(query(
    collection(db, 'rutas'),
    where('fecha', '==', hoy()),
    where('motorista', '==', currentUser.id)
  ));

  let found = null;
  rutaSnap.forEach(d => {
    const data = d.data();
    if (matchFactura(data.factura, q)) {
      found = { ...data, _id: d.id };
    }
  });

  const inp = document.getElementById('fact-num');
  const preview = document.getElementById('fact-preview');
  const actions = document.getElementById('fact-actions');

  if (!found) {
    inp?.classList.remove('found'); inp?.classList.add('notfound');
    preview.style.display = 'none';
    actions.innerHTML = '<div style="text-align:center;color:var(--red);font-size:14px;padding:10px">Factura no encontrada en tu ruta de hoy</div>';
    currentFactura = null;
    return;
  }

  inp?.classList.remove('notfound'); inp?.classList.add('found');
  currentFactura = found;

  preview.style.display = 'block';
  preview.innerHTML = `
    <div class="fp-name">${esc(found.nombre||found.cliente||'—')}</div>
    <div class="fp-row"><i class="ti ti-file-invoice"></i> Factura <strong>${esc(found.factura)}</strong></div>
    ${found.direccion ? `<div class="fp-row"><i class="ti ti-map-pin"></i>${esc(found.direccion)}${found.municipio ? ', '+esc(found.municipio) : ''}</div>` : ''}
    ${found.monto ? `<div class="fp-row"><i class="ti ti-coin"></i>${esc(found.monto)}</div>` : ''}
    ${found.pedido ? `<div class="fp-row"><i class="ti ti-package"></i>${esc(found.pedido)}</div>` : ''}
    <div style="margin-top:8px">${estadoBadge(found.estado, found.entregaParcial)}</div>

  if (found.estado === 'pendiente') {
    actions.innerHTML = `
      <div class="fcard-actions">
        <button class="fa-btn fa-ok" onclick="marcarEntregada()"><i class="ti ti-check"></i> Entregada</button>
        <button class="fa-btn fa-parcial" onclick="abrirEntregaParcial()"><i class="ti ti-git-branch"></i> Parcial</button>
        <button class="fa-btn fa-no" onclick="abrirNoEntrega()"><i class="ti ti-x"></i> No entregada</button>

    actions.innerHTML = `
      <div style="text-align:center;padding:10px">
        ${estadoBadge(found.estado, found.entregaParcial)}
        ${found.motivoReenvio ? `<div style="margin-top:8px;font-size:12px;color:var(--amber);background:var(--amber-bg);border-radius:var(--rs);padding:8px 12px"><i class="ti ti-send"></i> Último reenvío: <em>${esc(found.motivoReenvio)}</em></div>` : ''}

            <i class="ti ti-send"></i> Reenviar

  } else {

// ── v16: SUBIR FOTO EVIDENCIA ─────────────────────────────
window.subirFotoEvidencia = async function(input, docId, facNum) {
  const file = input.files[0]; if (!file) return;
  try {
    toast('⏳ Subiendo foto...', 5000);
    // Compress image before upload
    const canvas = document.createElement('canvas');
    const img = new Image();
    const url = URL.createObjectURL(file);
    await new Promise(res => { img.onload = res; img.src = url; });
    const maxW = 1200;
    const scale = Math.min(1, maxW / img.width);
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.82));

    const storagePath = `evidencias/${hoy()}/${currentUser.id}_${facNum}_${Date.now()}.jpg`;
    const storRef = ref(storage, storagePath);
    await uploadBytes(storRef, blob, { contentType:'image/jpeg' });
    const downloadURL = await getDownloadURL(storRef);

    // Save URL in Firestore document
    await updateDoc(doc(db,'rutas',docId), {
      fotoEvidencia: downloadURL,
      fotoPath: storagePath,
      fotoTs: Date.now()
    });

    document.getElementById('fact-actions').innerHTML = `
      <div style="text-align:center;padding:10px">
        <img src="${downloadURL}" class="photo-thumb" onclick="openLightbox('${downloadURL}')">
        <div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:700">
          <i class="ti ti-check"></i> Foto guardada correctamente
        </div>
      </div>`;
    toast('✓ Foto de evidencia guardada');
  } catch(e) {
    toast('Error al subir foto: ' + e.message);
    document.getElementById('fact-actions').innerHTML = '';
  }
};

function estadoBadge(estado, esParcial, estadoAdmin) {
  // Estados gestionados por Admin (tienen prioridad sobre el estado de ruta)
  if (estadoAdmin && estadoAdmin !== 'entregada') {
    const cfg = {
      retiro_cliente:  { icon:'ti-user-check',   color:'#0e7490', bg:'#ecfeff', label:'Retiro Cliente'  },
      retiro_vendedor: { icon:'ti-briefcase',     color:'#b45309', bg:'#fef3c7', label:'Retiro Vendedor' },
      anulacion:       { icon:'ti-ban',           color:'#6b7280', bg:'#f3f4f6', label:'Anulada'         },
      refacturacion:   { icon:'ti-file-invoice',  color:'#7c3aed', bg:'#f3e8ff', label:'Refacturación'   },
    };
    const c = cfg[estadoAdmin];
    if (c) {
      return `<span class="badge" style="background:${c.bg};color:${c.color};border:1px solid ${c.color}33">` +
             `<i class="ti ${c.icon}"></i> ${c.label}</span>`;
    }
  }
  if (estado === 'entregada') return '<span class="badge b-ok"><i class="ti ti-check"></i> Entregada</span>';
  if (estado === 'reprogramada') return '<span class="badge b-pend"><i class="ti ti-refresh"></i> Reprogramada</span>';
  if (estado === 'no-entregada' && esParcial) return '<span class="badge b-parcial"><i class="ti ti-git-branch"></i> Entrega Parcial</span>';
  if (estado === 'no-entregada') return '<span class="badge b-no"><i class="ti ti-x"></i> No entregada</span>';
  return '<span class="badge b-pend"><i class="ti ti-clock"></i> Pendiente</span>';
}

window.confirmarEntregaConPago = async function() {
  if (!currentFactura || !window._tipoPagoSel) return;
  document.getElementById('ov-pago').classList.remove('on');

  let lat = null, lng = null, gpsAccuracy = null;
  try {
    const pos = await new Promise((res,rej) => navigator.geolocation.getCurrentPosition(res, rej, {
      timeout:8000, enableHighAccuracy:true, maximumAge:0
    }));
    lat = +pos.coords.latitude.toFixed(6);
    lng = +pos.coords.longitude.toFixed(6);
    gpsAccuracy = Math.round(pos.coords.accuracy);
  } catch(e) {}

  const tipoPago = window._tipoPagoSel;
  const hora = fmtHora();
  const ts = Date.now();

  await updateDoc(doc(db,'rutas',currentFactura._id), {
    estado: 'entregada', horaEnt: hora, fechaEnt: hoy(),
    lat, lng, gpsAccuracy, tipoPago, tsEntrega: ts
  });

  // FIX REASIGNACIÓN: registrar entrega en historial de estados
  await registrarEstadoFactura(currentFactura.factura, 'entregada', {
    motorista: currentUser.id,
    motoristaNombre: currentUser.nombre,
    fechaEntrega: hoy(),
    hora,
    nota: 'Tipo pago: ' + tipoPago,
  });

  await addDoc(collection(db,'historial'), {
    ...currentFactura, estado:'entregada',
    horaEnt: hora, fechaEnt: hoy(),
    motoristaNombre: currentUser.nombre,
    lat, lng, gpsAccuracy, tipoPago, tsEpoch: ts
  });

  const msg = tipoPago === 'Contado'
    ? `✓ Entregada · Contado — retornar ${currentFactura.monto||''}${lat?' · 📍GPS('+gpsAccuracy+'m)':''}`
    : `✓ Entregada · Crédito${lat?' · 📍GPS('+gpsAccuracy+'m)':''}`;
  clearCache();
  toast(msg, 3500);

  // Offer to take photo evidence
  setTimeout(() => {
    const docId = currentFactura._id;
    const facNum = currentFactura.factura;
    document.getElementById('fact-actions').innerHTML = `
      <div style="background:var(--blue-light);border:1.5px solid var(--blue);border-radius:var(--r);padding:14px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px">
          <i class="ti ti-camera"></i> ¿Adjuntar foto de evidencia?
        </div>
        <div style="display:flex;gap:8px;justify-content:center">
          <label style="cursor:pointer;flex:1">
            <input type="file" accept="image/*" capture="environment" style="display:none"
              onchange="subirFotoEvidencia(this,'${docId}','${facNum}')">
            <div style="padding:10px;background:var(--blue);color:#fff;border-radius:var(--rs);font-weight:700;font-size:13px">
              <i class="ti ti-camera"></i> Tomar foto
            </div>
          </label>
          <button onclick="document.getElementById('fact-actions').innerHTML=''" 
            style="flex:1;padding:10px;background:var(--gray-100);color:var(--gray-700);border:none;border-radius:var(--rs);font-weight:700;font-size:13px;cursor:pointer">

window.confirmarNoEntregada = async function() {
  const motivo = document.getElementById('sel-motivo').value;
  const otro = document.getElementById('txt-motivo').value.trim();
  if (!motivo) { toast('Selecciona un motivo'); return; }
  const motivoFinal = motivo === 'Otro' ? otro || 'Otro' : motivo;

  let lat = null, lng = null;
  try {
    const pos = await new Promise((res,rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout:5000}));
    lat = pos.coords.latitude; lng = pos.coords.longitude;
  } catch(e) {}

  await updateDoc(doc(db,'rutas',pendingNoEntrega._id), {
    estado: 'no-entregada', motivo: motivoFinal,
    horaEnt: fmtHora(), fechaEnt: hoy(), lat, lng
  });

  // FIX REASIGNACIÓN: registrar no entrega en historial de estados
  await registrarEstadoFactura(pendingNoEntrega.factura, 'no-entregada', {
    motorista: currentUser.id,
    motoristaNombre: currentUser.nombre,
    motivo: motivoFinal,
    nota: 'Marcada como no entregada',
  });

  // Save to pendientes collection (for cross-day tracking)
  const pendRef = collection(db,'pendientes');
  const existing = await getDocs(query(pendRef, where('facturaOriginal','==',pendingNoEntrega.factura)));
  if (existing.empty) {
    await addDoc(pendRef, {
      facturaOriginal: pendingNoEntrega.factura,
      nombre: pendingNoEntrega.nombre || pendingNoEntrega.cliente || '',
      direccion: pendingNoEntrega.direccion || '',
      municipio: pendingNoEntrega.municipio || '',
      monto: pendingNoEntrega.monto || '',
      pedido: pendingNoEntrega.pedido || '',
      motoristaNombre: currentUser.nombre,
      motivo: motivoFinal,
      fechaOriginal: hoy(),
      intentos: [{ fecha: hoy(), motorista: currentUser.nombre, motivo: motivoFinal }],
      estado: 'pendiente',
      notaCredito: null,
      tsEpoch: Date.now()
    });
  } else {
    const exDoc = existing.docs[0];
    const data = exDoc.data();
    const intentos = data.intentos || [];
    intentos.push({ fecha: hoy(), motorista: currentUser.nombre, motivo: motivoFinal });
    await updateDoc(doc(db,'pendientes',exDoc.id), {
      intentos, motoristaNombre: currentUser.nombre,
      motivo: motivoFinal, estado: 'pendiente', tsEpoch: Date.now()
    });
  }

  clearCache();
  closeModal();
  toast('Registrada como no entregada');
  resetFacturaUI();
  document.getElementById('fact-num').value = '';
};

// ── MOTORISTA: MIS RUTAS ──────────────────────────────────
async function renderMisRutas() {
  const content = document.getElementById('content');
  const cacheKey = 'rutasMot_'+currentUser.id;
  if (!cacheOk(cacheKey)) {
    content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
    const snap = await getDocs(query(
      collection(db,'rutas'),
      where('fecha','==',hoy()),
      where('motorista','==',currentUser.id)
    ));
    setCache(cacheKey, snap.docs.map(d => ({...d.data(), _id: d.id})));
  }
  const rutas = CACHE[cacheKey] || [];
  const total = rutas.length;
  const ent = rutas.filter(r => r.estado==='entregada').length;
  const noEnt = rutas.filter(r => r.estado==='no-entregada').length;
  const pend = rutas.filter(r => r.estado==='pendiente').length;
  const pct = total ? Math.round(ent/total*100) : 0;

  let h = `
    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card green"><div class="stat-num">${ent}</div><div class="stat-label">Entregadas</div></div>
      <div class="stat-card amber"><div class="stat-num">${pend}</div><div class="stat-label">Pendientes</div></div>
      <div class="stat-card red"><div class="stat-num">${noEnt}</div><div class="stat-label">No Entregadas</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;color:var(--gray-500)">Progreso del día</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--blue)">${pct}%</span>
      </div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    </div>
  `;

  if (!rutas.length) {
    h += '<div class="empty"><i class="ti ti-route-off"></i><p>Sin rutas asignadas para hoy</p></div>';
  } else {
    // Sort: pendientes first, then no-entregadas, then entregadas
    const sorted = [...rutas.filter(r=>r.estado==='pendiente'), ...rutas.filter(r=>r.estado==='no-entregada'), ...rutas.filter(r=>r.estado==='entregada')];
    sorted.forEach(r => {
      const gpsTag = r.lat ? `<span class="gps-tag"><i class="ti ti-map-pin"></i>${r.gpsAccuracy ? r.gpsAccuracy+'m' : '✓'}</span>` : `<span class="gps-tag no-gps"><i class="ti ti-map-pin-off"></i>Sin GPS</span>`;
      h += `<div class="fcard ${r.estado}">
        <div class="fcard-header">
          <div>
            <div class="fcard-num">FACTURA #${esc(r.factura)}</div>
            <div class="fcard-name">${esc(r.nombre||r.cliente||'—')}</div>
            ${r.direccion ? `<div class="fcard-dir"><i class="ti ti-map-pin"></i>${esc(r.direccion)}${r.municipio?', '+esc(r.municipio):''}</div>` : ''}
          </div>
          ${estadoBadge(r.estado, r.entregaParcial)}
        </div>
        <div class="fcard-meta">
          ${r.monto ? `<span><i class="ti ti-coin" style="color:var(--blue)"></i> ${esc(r.monto)}</span>` : ''}
          ${r.pedido ? `<span><i class="ti ti-package" style="color:var(--blue)"></i> ${esc(r.pedido)}</span>` : ''}
          ${r.horaEnt ? `<span><i class="ti ti-clock" style="color:var(--green)"></i> ${esc(r.horaEnt)}</span>` : ''}
          ${r.motivo ? `<span><i class="ti ti-alert-circle" style="color:var(--red)"></i> ${esc(r.motivo)}</span>` : ''}
          ${r.tipoPago ? `<span class="badge ${r.tipoPago==='Contado'?'b-ok':'b-blue'}" style="font-size:11px"><i class="ti ti-${r.tipoPago==='Contado'?'cash':'building-bank'}"></i> ${esc(r.tipoPago)}</span>` : ''}
          ${r.estado === 'entregada' ? gpsTag : ''}
        </div>
        ${r.fotoEvidencia ? `<div style="margin-top:8px"><img src="${r.fotoEvidencia}" class="photo-thumb" onclick="openLightbox('${r.fotoEvidencia}')" alt="Evidencia"><span style="font-size:11px;color:var(--green);margin-left:8px;font-weight:700"><i class="ti ti-camera"></i> Foto guardada</span></div>` : ''}
      </div>`;
    });
  }
  content.innerHTML = h;
}

// ── MOTORISTA: LIQUIDAR ───────────────────────────────────
async function renderLiquidar() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
  try {
    const snap = await getDocs(query(
      collection(db,'rutas'),
      where('motorista','==', currentUser.id),
      where('estado','==','entregada')
    ));
    const todas = snap.docs.map(d => d.data());
    // Filtrar contado de hoy
    const hoyStr = hoy();
    const hoyContado = todas.filter(r => r.fecha === hoyStr && r.tipoPago === 'Contado');
    const hoyTotal = hoyContado.reduce((a,r) => a + (parseFloat(r.monto)||0), 0);

    // Agrupar por fecha para histórico
    const byFecha = {};
    todas.filter(r => r.tipoPago === 'Contado').forEach(r => {
      if (!byFecha[r.fecha]) byFecha[r.fecha] = [];
      byFecha[r.fecha].push(r);
    });
    const fechas = Object.keys(byFecha).sort((a,b) => b.localeCompare(a));

    let h = `
      <!-- Hero liquidación del día -->
      <div style="background:linear-gradient(135deg,var(--blue-dark),var(--blue));border-radius:var(--r);padding:24px 20px;margin-bottom:14px;text-align:center;color:#fff">

          <i class="ti ti-cash"></i> TOTAL A LIQUIDAR HOY
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:800;line-height:1">
          $${hoyTotal.toFixed(2)}
        </div>
        <div style="font-size:13px;opacity:.8;margin-top:6px">${hoyContado.length} cobros de contado hoy</div>
      </div>

      <!-- Detalle del día -->
      <div class="card">
        <div class="card-title">Detalle cobros de hoy (Contado)</div>`;

    if (!hoyContado.length) {
      h += '<div class="empty" style="padding:1rem"><i class="ti ti-receipt-off"></i><p>Sin cobros de contado hoy</p></div>';
    } else {
      hoyContado.forEach(r => {
        h += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100)">
          <div>
            <div style="font-weight:600;font-size:14px">${esc(r.nombre||r.cliente||'—')}</div>

          </div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--green)">$${parseFloat(r.monto||0).toFixed(2)}</div>
        </div>`;
      });
    }
    h += `</div>

    <!-- Chart semanal -->
    <div class="card">
      <div class="card-title">Últimos 7 días — Cobros contado</div>
      <canvas id="chart-liq" height="120" style="width:100%;display:block"></canvas>
    </div>

    <!-- Histórico por día -->
    <div class="card">
      <div class="card-title">Histórico de liquidaciones (Contado)</div>`;

    if (!fechas.length) {
      h += '<div class="empty" style="padding:1rem"><i class="ti ti-history"></i><p>Sin historial</p></div>';
    } else {
      fechas.forEach(f => {
        const items = byFecha[f];
        const tot = items.reduce((a,r) => a+(parseFloat(r.monto)||0),0);
        h += `<div class="hday" style="box-shadow:none;margin-bottom:8px">
          <div class="hday-hdr" onclick="this.nextElementSibling.classList.toggle('open')" style="padding:12px 14px">
            <div>

            </div>

              <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--green)">$${tot.toFixed(2)}</span>
              <i class="ti ti-chevron-down" style="color:var(--gray-500)"></i>
            </div>
          </div>
          <div class="hday-body">
            ${items.map(r => `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-100)">
              <div>
                <div style="font-weight:600;font-size:13px">${esc(r.nombre||r.cliente||'—')}</div>
                <div style="font-size:11px;color:var(--gray-500)">Factura #${esc(r.factura)}</div>
              </div>
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--green)">$${parseFloat(r.monto||0).toFixed(2)}</span>
            </div>`).join('')}
          </div>
        </div>`;
      });
    }
    h += '</div>';
    content.innerHTML = h;

    // Draw liquidation chart
    requestAnimationFrame(() => {
      const canvas = document.getElementById('chart-liq');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.offsetWidth || 300, H = 120;
      canvas.width = W * dpr(); canvas.height = H * dpr();
      ctx.scale(dpr(), dpr());
      const days = [];
      for (let i=6;i>=0;i--) {
        const base = new Date(hoy() + 'T12:00:00'); base.setDate(base.getDate()-i);
        days.push(base.toISOString().split('T')[0]);
      }
      const totals = days.map(d => {
        const items = (byFecha[d]||[]);
        return items.reduce((a,r)=>a+(parseFloat(r.monto)||0),0);
      });
      const lbls = days.map(d => { const [,m,dd]=d.split('-'); return dd+'/'+m; });
      const maxT = Math.max(...totals, 1);
      const padL=42, padB=26, padT=10, padR=10;
      const bw = (W-padL-padR)/lbls.length;
      const bh = H-padB-padT;
      ctx.clearRect(0,0,W,H);
      // Gridlines
      [0,0.5,1].forEach(p => {
        const y = padT+bh*(1-p);
        ctx.strokeStyle='#f0f4f8'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        ctx.fillStyle='#bbc8da'; ctx.font='9px Barlow,sans-serif'; ctx.textAlign='right';
        ctx.fillText('$'+(maxT*p).toFixed(0), padL-3, y+3);
      });
      totals.forEach((v,i) => {
        const x = padL+i*bw+bw*0.1, w = bw*0.8;
        const th = v>0 ? Math.max((v/maxT)*bh,3) : 0;
        const grad = ctx.createLinearGradient(0,padT+bh-th,0,padT+bh);
        grad.addColorStop(0,'#1e7d3a'); grad.addColorStop(1,'#27ae60bb');
        ctx.fillStyle = th>0 ? grad : '#f0f4f8';
        roundRect(ctx,x,padT+bh-th||padT+bh-1,w,th||1,3); ctx.fill();
        if(v>0) {
          ctx.fillStyle='#185FA5'; ctx.font='bold 9px Barlow,sans-serif'; ctx.textAlign='center';
          ctx.fillText('$'+v.toFixed(0), x+w/2, padT+bh-th-3);
        }
        ctx.fillStyle='#7a90aa'; ctx.font='9px Barlow,sans-serif';
        ctx.fillText(lbls[i], x+w/2, H-6);
      });
    });
  } catch(e) {
    content.innerHTML = '<div class="empty"><i class="ti ti-wifi-off" style="color:var(--amber)"></i><p style="color:var(--amber)">Error al cargar liquidaciones</p></div>';
  }
}

async function renderHistorialMot() {
  const content = document.getElementById('content');
  const cacheKey = 'histMot_'+currentUser.id;
  if (!cacheOk(cacheKey, 60000)) {
    content.innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div></div>';
    const snap = await getDocs(query(
      collection(db,'rutas'),
      where('motorista','==',currentUser.id)
    ));
    setCache(cacheKey, snap.docs.map(d => ({...d.data(), _id:d.id})));
  }
  const all = CACHE[cacheKey];

  // Group by date
  const byDate = {};
  all.forEach(r => {
    const f = r.fecha || '—';
    if (!byDate[f]) byDate[f] = [];
    byDate[f].push(r);
  });

  const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));
  if (!dates.length) {
    content.innerHTML = '<div class="empty"><i class="ti ti-history"></i><p>Sin historial disponible</p></div>';
    return;
  }

  let h = '';
  dates.forEach(fecha => {
    const items = byDate[fecha];
    const ent = items.filter(r=>r.estado==='entregada').length;
    const noEnt = items.filter(r=>r.estado==='no-entregada').length;
    h += `<div class="hday">
      <div class="hday-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
        <div>
          <div class="hday-title">${fmtFecha(fecha)}</div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:2px">
            ${items.length} facturas · ${ent} entregadas · ${noEnt} no entregadas
          </div>
        </div>
        <i class="ti ti-chevron-down" style="color:var(--gray-500)"></i>
      </div>
      <div class="hday-body">
        ${items.map(r => `<div class="fcard ${r.estado}" style="margin-bottom:8px">
          <div class="fcard-header">
            <div>
              <div class="fcard-num">FACTURA #${esc(r.factura)}</div>
              <div class="fcard-name">${esc(r.nombre||r.cliente||'—')}</div>
            </div>
            ${estadoBadge(r.estado, r.entregaParcial)}
          </div>
          <div class="fcard-meta">
            ${r.horaEnt ? `<span><i class="ti ti-clock"></i> ${esc(r.horaEnt)}</span>` : ''}
            ${r.motivo ? `<span><i class="ti ti-alert-circle" style="color:var(--red)"></i> ${esc(r.motivo)}</span>` : ''}

}
