// ── Normalizar número de factura (quitar ceros iniciales) ──
function normFact(f) { return String(f||'').trim().replace(/^0+/,'').toUpperCase(); }

// ── Cargar CSV de facturas EMITIDAS ───────────────────────
window.cargarCSVEmitidas = function(input) {
  const file = input.files[0]; if (!file) return;
  const lbl = document.getElementById('conc-csv-lbl');
  const msg = document.getElementById('conc-csv-msg');
  lbl.textContent = '⏳ Procesando...';
  msg.textContent = '';

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const text = e.target.result;
      const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
      if (!lines.length) throw new Error('Archivo vacío');

      // Normalizar encabezados: quitar espacios, tildes y caracteres especiales
      const rawHeader = lines[0].split(',').map(h =>
        h.trim().toLowerCase()
         .replace(/["\r]/g,'')
         .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
         .replace(/\s+/g,'')
         .replace(/[^a-z0-9]/g,'')
      );

      // Mapa flexible de columnas — compatible con formato PICME real:
      // pedido, Tipo Documento, Documento(=factura), fecha, Monto, impresa, nula, Codigo, Cliente
      const colMap = {
        factura:  ['documento','factura','nfactura','nrodoc','doc'],
        cliente:  ['cliente','nombre','razon','razonsocial'],
        monto:    ['monto','total','importe','valor'],
        pedido:   ['pedido','nopedido'],
        tipodoc:  ['tipodocumento','tipodoc','tipo'],
        nula:     ['nula','anulada','anulado'],
        codigo:   ['codigo','codigocliente','cod'],
        fecha:    ['fecha','fechaemision'],
      };

      const idx = {};
      Object.entries(colMap).forEach(([campo, aliases]) => {
        const i = rawHeader.findIndex(h => aliases.some(a => h === a || h.startsWith(a) || a.startsWith(h)));
        if (i >= 0) idx[campo] = i;
      });

      if (idx.factura === undefined) {
        throw new Error('Columna de número de factura no encontrada. Encabezados detectados: ' + rawHeader.join(', '));
      }

      CONC_EMITIDAS = [];
      let anuladas = 0;

      for (let li = 1; li < lines.length; li++) {
        const cols = parseCsvLine(lines[li]);
        if (!cols.length) continue;
        const numDoc = (cols[idx.factura] || '').trim().replace(/["\r]/g,'');
        if (!numDoc) continue;

        // Excluir facturas anuladas (columna "nula" = VERDADERO)
        const esNula = idx.nula !== undefined
          ? (cols[idx.nula]||'').trim().toUpperCase() === 'VERDADERO'
          : false;
        if (esNula) { anuladas++; continue; }

        const cliente  = idx.cliente  !== undefined ? (cols[idx.cliente] ||'').replace(/["\r]/g,'').trim() : '';
        const monto    = idx.monto    !== undefined ? (cols[idx.monto]   ||'').replace(/["\r$, ]/g,'').trim() : '';
        const pedido   = idx.pedido   !== undefined ? (cols[idx.pedido]  ||'').replace(/["\r]/g,'').trim() : '';
        const tipodoc  = idx.tipodoc  !== undefined ? (cols[idx.tipodoc] ||'').replace(/["\r]/g,'').trim() : '';
        const codigo   = idx.codigo   !== undefined ? (cols[idx.codigo]  ||'').replace(/["\r]/g,'').trim() : '';
        const fechaDoc = idx.fecha    !== undefined ? (cols[idx.fecha]   ||'').replace(/["\r]/g,'').trim() : '';

        CONC_EMITIDAS.push({ factura: numDoc, nombre: cliente, monto, pedido, tipodoc, codigoCliente: codigo, fechaEmision: fechaDoc, direccion: '', municipio: '' });
      }

      if (!CONC_EMITIDAS.length) throw new Error('Sin facturas válidas (todas anuladas o vacías)');

      // Auto-detectar fecha del CSV (formato dd/mm/yyyy hh:mm)
      const fechaInput = document.getElementById('conc-fecha');
      if (fechaInput && !fechaInput._manualChange) {
        const primerFecha = CONC_EMITIDAS[0]?.fechaEmision || '';
        const matchDmy = primerFecha.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (matchDmy) fechaInput.value = matchDmy[3] + '-' + matchDmy[2] + '-' + matchDmy[1];
      }

      CONC_FECHA = fechaInput?.value || hoy();
      lbl.textContent = '✓ ' + file.name;
      msg.innerHTML = '<div style="margin-top:10px">'
        + '<div style="color:var(--green);font-weight:700;font-size:14px">✓ ' + CONC_EMITIDAS.length + ' facturas emitidas cargadas</div>'
        + (anuladas ? '<div style="color:var(--gray-500);font-size:12px;margin-top:3px">⚠ ' + anuladas + ' factura(s) anuladas excluidas</div>' : '')
        + '<div style="color:var(--gray-500);font-size:12px;margin-top:2px">Fecha: <strong>' + fmtFecha(CONC_FECHA) + '</strong></div>'
        + '</div>';

      await ejecutarComparacion();
      document.getElementById('conc-tab-tabla')?.click();
    } catch(err) {
      lbl.textContent = '✗ Error';
      msg.innerHTML = '<span style="color:var(--red)">✗ ' + err.message + '</span>';
    }
  };
  reader.readAsText(file, 'iso-8859-1');
};

// ── Ejecutar comparación emitidas vs rutas ────────────────
async function ejecutarComparacion() {
  const fecha = CONC_FECHA || hoy();

  // Obtener números de factura de las emitidas para buscarlas en cualquier fecha
  const factNums = CONC_EMITIDAS.map(e => normFact(e.factura)).filter(Boolean);

  // Cargar TODAS las rutas sin filtro de fecha (para encontrar facturas asignadas en días distintos)
  const snap = await getDocs(collection(db,'rutas'));
  const todasRutas = snap.docs.map(d => ({...d.data(), _id: d.id}));

  // Indexar rutas por factura normalizada (sin restricción de fecha)
  const rutasIdx = {};
  todasRutas.forEach(r => {
    const k = normFact(r.factura);
    if (!rutasIdx[k]) rutasIdx[k] = [];
    rutasIdx[k].push(r);
  });

  // Indexar emitidas
  const emitidasIdx = {};
  CONC_EMITIDAS.forEach(e => { emitidasIdx[normFact(e.factura)] = e; });

  // Construir resultado de conciliación
  const resultado = [];

  // 1. Recorrer EMITIDAS → verificar si está en rutas
  CONC_EMITIDAS.forEach(em => {
    const k = normFact(em.factura);
    const rutasMatch = rutasIdx[k] || [];
    if (rutasMatch.length > 0) {
      // Usar el registro más reciente / más actualizado
      const ruta = rutasMatch.sort((a,b)=>(b.tsEpoch||0)-(a.tsEpoch||0))[0];
      resultado.push({
        factura: em.factura,
        nombre: em.nombre || ruta.nombre || ruta.cliente || '—',
        monto: em.monto || ruta.monto || '',
        direccion: em.direccion || ruta.direccion || '',
        municipio: em.municipio || ruta.municipio || '',
        estado: ruta.estado,           // estado REAL del motorista
        motorista: ruta.motorista,
        motoristaNombre: ruta.motoristaNombre || '—',
        horaEnt: ruta.horaEnt || '',
        tipoPago: ruta.tipoPago || '',
        motivo: ruta.motivo || '',
        rutaId: ruta._id,
        fechaRuta: ruta.fecha || '',   // fecha real en que fue puesta en ruta
        concEstado: 'en_ruta',        // concEstado: en_ruta | no_asignada
        estadoAdmin: ruta.estadoAdmin || null, // refacturacion | retiro_cliente | retiro_vendedor | anulacion
      });
    } else {
      resultado.push({
        factura: em.factura,
        nombre: em.nombre || '—',
        monto: em.monto || '',
        direccion: em.direccion || '',
        municipio: em.municipio || '',
        estado: null,
        motorista: null,
        motoristaNombre: '—',
        horaEnt: '',
        tipoPago: '',
        motivo: '',
        rutaId: null,
        concEstado: 'no_asignada',
        estadoAdmin: null,
      });
    }
  });

  // Guardar resultado en cache temporal
  window._CONC_RESULTADO = resultado;
  renderConcTabla(resultado, fecha);
  renderConcResumen(resultado, fecha);
}

// ── Render tabla de conciliación ──────────────────────────
function renderConcTabla(resultado, fecha) {
  const el = document.getElementById('conc-tabla-body');
  const resEl = document.getElementById('conc-filtros-info');
  if (!el) return;

  const filtroEstado = document.getElementById('conc-filtro-estado')?.value || '';
  const filtroTexto  = (document.getElementById('conc-filtro-texto')?.value || '').toLowerCase();

  let filas = resultado;
  if (filtroEstado) filas = filas.filter(r => {
    if (filtroEstado === 'no_asignada') return r.concEstado === 'no_asignada';
    if (filtroEstado === 'entregada')   return r.estado === 'entregada';
    if (filtroEstado === 'pendiente')   return r.estado === 'pendiente' && r.concEstado === 'en_ruta';
    if (filtroEstado === 'no-entregada') return r.estado === 'no-entregada';
    if (filtroEstado === 'refacturacion')  return r.estadoAdmin === 'refacturacion';
    if (filtroEstado === 'retiro_cliente') return r.estadoAdmin === 'retiro_cliente';
    if (filtroEstado === 'retiro_vendedor') return r.estadoAdmin === 'retiro_vendedor';
    if (filtroEstado === 'anulacion')   return r.estadoAdmin === 'anulacion';
    return true;
  });
  if (filtroTexto) filas = filas.filter(r =>
    normFact(r.factura).includes(filtroTexto.toUpperCase()) ||
    (r.nombre||'').toLowerCase().includes(filtroTexto) ||
    (r.motoristaNombre||'').toLowerCase().includes(filtroTexto)
  );

  if (resEl) resEl.textContent = `Mostrando ${filas.length} de ${resultado.length} facturas`;

  if (!filas.length) {
    el.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--gray-500)"><i class="ti ti-search-off"></i> Sin resultados</td></tr>`;
    return;
  }

  el.innerHTML = filas.map(r => {
    // Determinar badge visual
    let badge = '';
    if (r.estadoAdmin) {
      const adminLabels = { refacturacion:'Refacturación', retiro_cliente:'Retiro Cliente', retiro_vendedor:'Retiro Vendedor', anulacion:'Anulación' };
      const adminColors = { refacturacion:'#7c3aed,#f3e8ff', retiro_cliente:'#0e7490,#ecfeff', retiro_vendedor:'#b45309,#fef3c7', anulacion:'#6b7280,#f3f4f6' };
      const [col, bg] = (adminColors[r.estadoAdmin]||'#6b7280,#f3f4f6').split(',');
      badge = `<span style="background:${bg};color:${col};padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;display:inline-block">${adminLabels[r.estadoAdmin]||r.estadoAdmin}</span>`;
    } else if (r.concEstado === 'no_asignada') {
      badge = `<span style="background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">No asignada</span>`;
    } else if (r.estado === 'entregada') {
      badge = `<span style="background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">✓ Entregada</span>`;
    } else if (r.estado === 'no-entregada') {
      badge = `<span style="background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">✗ No entregada</span>`;
    } else if (r.estado === 'pendiente') {
      badge = `<span style="background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">En ruta</span>`;
    } else {
      badge = `<span style="background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700">En ruta</span>`;
    }

    // Indicador visual si la fecha de ruta es diferente a la fecha de emisión
    const fechaRutaLabel = r.fechaRuta
      ? (r.fechaRuta !== (CONC_FECHA || hoy())
          ? `<span style="color:var(--amber);font-weight:700">${fmtFecha(r.fechaRuta)}</span>`
          : `<span style="color:var(--gray-500)">${fmtFecha(r.fechaRuta)}</span>`)
      : '—';

    // Botón de cambio de estado (solo si no entregada o no asignada)
    const puedeGestionar = r.concEstado === 'no_asignada' || (r.estado !== 'entregada');
    const btnGestionar = puedeGestionar
      ? `<button onclick="abrirModalAdminConc('${encodeURIComponent(JSON.stringify({factura:r.factura,nombre:r.nombre,rutaId:r.rutaId,concEstado:r.concEstado,estadoAdmin:r.estadoAdmin}))}',this)"
           style="background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--rs);padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">
           <i class="ti ti-settings"></i> Gestionar
         </button>`
      : `<span style="font-size:11px;color:var(--gray-300)">—</span>`;

    return `<tr>
      <td><strong style="font-family:'Barlow Condensed',sans-serif;font-size:14px">#${esc(r.factura)}</strong></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.nombre)}</td>
      <td style="font-family:'Barlow Condensed',sans-serif;font-weight:700">${r.monto?'$'+r.monto:'—'}</td>
      <td>${badge}</td>
      <td style="font-size:12px">${esc(r.motoristaNombre)}</td>
      <td style="font-size:12px">${r.horaEnt||'—'}</td>
      <td style="font-size:12px">${fechaRutaLabel}</td>
      <td style="font-size:12px">${esc(r.tipoPago||'—')}</td>
      <td>${btnGestionar}</td>
    </tr>`;
  }).join('');
}

// ── Render resumen de conciliación ────────────────────────
function renderConcResumen(resultado, fecha) {
  const el = document.getElementById('conc-resumen-body');
  if (!el) return;

  const total       = resultado.length;
  const enRuta      = resultado.filter(r => r.concEstado === 'en_ruta').length;
  const noAsignada  = resultado.filter(r => r.concEstado === 'no_asignada').length;
  const entregadas  = resultado.filter(r => r.estado === 'entregada').length;
  const pendientes  = resultado.filter(r => r.estado === 'pendiente' && r.concEstado === 'en_ruta').length;
  const noEnt       = resultado.filter(r => r.estado === 'no-entregada').length;
  const adminEstados = resultado.filter(r => !!r.estadoAdmin).length;
  const pct         = total ? Math.round(entregadas/total*100) : 0;

  // Por motorista
  const motoristas = USUARIOS.filter(u => u.rol === 'motorista');
  const porMotorista = motoristas.map(m => {
    const mrs = resultado.filter(r => r.motorista === m.id);
    const mEnt = mrs.filter(r => r.estado === 'entregada').length;
    return { nombre: m.nombre, total: mrs.length, entregadas: mEnt, pct: mrs.length ? Math.round(mEnt/mrs.length*100) : 0 };
  }).filter(m => m.total > 0);

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px">

      <div class="stat-card red"><div class="stat-num">${noAsignada}</div><div class="stat-label">No asignadas</div></div>
      <div class="stat-card ${pct>=90?'green':'amber'}"><div class="stat-num">${pct}%</div><div class="stat-label">% Entregadas</div></div>
    </div>

      </div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${pct>=90?'var(--green)':pct>=70?'#f39c12':'var(--red)'}"></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--gray-500);margin-top:8px">
        <span>✓ ${entregadas} entregadas</span>
        <span>⏳ ${pendientes} en ruta</span>
        <span>✗ ${noEnt} no entregadas</span>
        <span style="color:var(--red)">⚠ ${noAsignada} no asignadas</span>
        ${adminEstados ? `<span style="color:#7c3aed">🔧 ${adminEstados} gestionadas</span>` : ''}

    </div>

    <div class="card">
      <div class="card-title">Por motorista</div>

        const col = m.pct>=90?'var(--green)':m.pct>=70?'var(--amber)':'var(--red)';

// ── Aplicar estado administrativo ─────────────────────────
window.aplicarEstadoAdmin = async function(dataStr, estadoAdmin, btn) {
  let data;
  try { data = JSON.parse(decodeURIComponent(dataStr)); } catch(e) { return; }

  const labels = { refacturacion:'Refacturación', retiro_cliente:'Retiro Cliente', retiro_vendedor:'Retiro Vendedor', anulacion:'Anulación' };
  if (!confirm(`¿Cambiar estado de factura #${data.factura} a "${labels[estadoAdmin]}"?`)) return;

  try {
    if (data.rutaId) {
      // Factura tiene ruta asignada → actualizar en Firestore
      await updateDoc(doc(db,'rutas',data.rutaId), {
        estadoAdmin: estadoAdmin,
        fechaAdminCambio: hoy(),
        tsEpoch: Date.now()
      });
    } else {
      // Factura no asignada → crear registro en colección conciliacion_admin
      const concRef = collection(db,'conciliacion_admin');
      const existing = await getDocs(query(concRef,
        where('factura','==',data.factura),
        where('fecha','==', CONC_FECHA || hoy())
      ));
      if (!existing.empty) {
        await updateDoc(doc(db,'conciliacion_admin',existing.docs[0].id), {
          estadoAdmin, fechaAdminCambio: hoy(), tsEpoch: Date.now()
        });
      } else {
        await addDoc(concRef, {
          factura: data.factura,
          nombre: data.nombre,
          fecha: CONC_FECHA || hoy(),
          estadoAdmin,
          fechaAdminCambio: hoy(),
          concEstado: 'no_asignada',
          tsEpoch: Date.now()
        });
      }
    }

    // Actualizar en memoria
    if (window._CONC_RESULTADO) {
      const row = window._CONC_RESULTADO.find(r => normFact(r.factura) === normFact(data.factura));
      if (row) row.estadoAdmin = estadoAdmin;
      renderConcTabla(window._CONC_RESULTADO, CONC_FECHA || hoy());
      renderConcResumen(window._CONC_RESULTADO, CONC_FECHA || hoy());
    }

    closeModal();
    clearCache();
    toast(`✓ Factura #${data.factura} → ${labels[estadoAdmin]}`);
  } catch(err) {
    toast('Error: ' + err.message);
  }
};

// ── MARCAR COMO EXTRAVIADA ────────────────────────────────
window.marcarExtraviada = async function(pendId) {
  if (!confirm('¿Confirmar esta factura como EXTRAVIADA? Se registrará para seguimiento.')) return;
  try {
    await updateDoc(doc(db,'pendientes',pendId), {
      estado: 'extraviada',
      fechaExtravio: hoy(),
      tsEpoch: Date.now()
    });
    // Also update in rutas if exists
    const pend = (CACHE.pendientes||[]).find(p=>p._id===pendId);
    if (pend) {
      const rutaSnap = await getDocs(query(
        collection(db,'rutas'),
        where('factura','==',pend.facturaOriginal)
      ));
      const batch = writeBatch(db);
      rutaSnap.docs.forEach(d => {
        if (d.data().estado === 'pendiente' || d.data().estado === 'no-entregada') {
          batch.update(doc(db,'rutas',d.id), { estado:'extraviada', fechaExtravio: hoy() });
        }
      });
      await batch.commit();
    }
    clearCache();
    toast('⚠️ Factura marcada como extraviada');
    renderConciliacion();
  } catch(e) {
    toast('Error: ' + e.message);
  }
};

window.cargarCSV = async function(input) {
  const file = input.files[0]; if (!file) return;
  const motId = document.getElementById('sel-mot').value;
  const fecha = document.getElementById('sel-fecha').value.trim() || hoy();
  const lbl = document.getElementById('csv-lbl');
  const msg = document.getElementById('csv-msg');

  if (!motId) { toast('Selecciona el motorista'); return; }
  lbl.textContent = '⏳ Procesando...';

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const text = e.target.result;
      const lines = text.split('\n').filter(l => l.trim());
      if (!lines.length) throw new Error('Archivo vacío');
      const header = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-záéíóúñ]/g,''));
      const campos = ['factura','nombre','cliente','direccion','municipio','departamento','monto','pedido','tipo'];
      const idx = {};
      campos.forEach(c => {
        const i = header.findIndex(h => h === c || h.includes(c));
        if (i >= 0) idx[c] = i;
      });
      if (idx.factura === undefined) throw new Error('No se encontró columna "factura"');

      const mot = USUARIOS.find(u => u.id === motId);
      const batch = writeBatch(db);
      let count = 0;
      const newFacts = [];

      for (let li = 1; li < lines.length; li++) {
        const cols = parseCsvLine(lines[li]);
        if (!cols.length || !cols[idx.factura]?.trim()) continue;
        const f = {};
        campos.forEach(c => { if(idx[c]!==undefined) f[c]=(cols[idx[c]]||'').trim(); });
        if (!f.factura) continue;
        // nombre fallback
        if (!f.nombre && f.cliente) f.nombre = f.cliente;
        newFacts.push(f.factura);
        const newDoc = doc(collection(db,'rutas'));
        batch.set(newDoc, {
          factura: f.factura,
          nombre: f.nombre || f.cliente || '',
          cliente: f.cliente || f.nombre || '',
          direccion: f.direccion || '',
          municipio: f.municipio || '',
          departamento: f.departamento || '',
          monto: f.monto || '',
          pedido: f.pedido || '',
          tipo: f.tipo || '',
          motorista: motId,
          motoristaNombre: mot.nombre,
          fecha: fecha,
          estado: 'pendiente',
          tsEpoch: Date.now() + count
        });
        count++;
      }

      if (!count) throw new Error('No se encontraron facturas');

      // ── ALERTA DUPLICADOS: comparar ANTES de guardar ──
      // Buscar facturas del CSV que ya existan como entregadas en Firestore
      const existSnap = await getDocs(query(collection(db,'rutas'), where('estado','==','entregada')));
      const yaEntregadas = new Set(existSnap.docs.map(d => String(d.data().factura||'').replace(/^0+/,'').toUpperCase()));
      const duplicadas = newFacts.filter(f => yaEntregadas.has(String(f).replace(/^0+/,'').toUpperCase()));

      await batch.commit(); // guardar las rutas nuevas

      lbl.textContent = `✓ ${file.name}`;
      msg.style.color = 'var(--green)';
      msg.textContent = `✓ ${count} facturas cargadas para ${mot.nombre}`;
      clearCache(); // forzar recarga en todas las vistas
      toast(`✓ ${count} facturas cargadas`);

      // Show alert for duplicates
      if (duplicadas.length) {
        const alertDiv = document.getElementById('csv-alert');
        if (alertDiv) {
          alertDiv.style.display = 'block';
          alertDiv.innerHTML = `<div class="alert-banner">
            <i class="ti ti-alert-triangle"></i>
            <div>
              <div class="alert-banner-title">⚠️ ${duplicadas.length} factura(s) ya marcadas como ENTREGADAS</div>
              <div class="alert-banner-body">Las siguientes facturas ya fueron entregadas anteriormente: <strong>${duplicadas.join(', ')}</strong>. Verifica si es un error en el CSV.</div>
            </div>
          </div>`;
        }
      }

      input.value = '';
      setTimeout(cargarResumenRutas, 800);
    } catch(err) {
      lbl.textContent = '✗ Error';
      msg.style.color = 'var(--red)';
      msg.textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(file, 'iso-8859-1');
};

window.limpiarRutaMot = async function(motId) {
  if (!confirm('¿Limpiar todas las facturas de hoy de este motorista?')) return;
  const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',hoy()), where('motorista','==',motId)));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(doc(db,'rutas',d.id)));
  await batch.commit();
  clearCache();
  toast('Ruta limpiada');
  cargarResumenRutas();
};

window.gSubTab = function(id, el) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('g-kpi').style.display = id==='kpi' ? '' : 'none';
  document.getElementById('g-ranking').style.display = id==='ranking' ? '' : 'none';
  document.getElementById('g-tendencia').style.display = id==='tendencia' ? '' : 'none';

  if (id === 'tendencia') {
    requestAnimationFrame(() => {
      const canvas = document.getElementById('chart-tendencia');
      if (!canvas || !window._days30Data) return;
      const data = window._days30Data;
      const ratio = dpr();
      const W = canvas.offsetWidth || 320, H = 160;
      canvas.width = W * ratio; canvas.height = H * ratio;
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      const padL=36,padB=26,padT=16,padR=12;
      const bh = H-padB-padT;
      const maxV = Math.max(...data.map(d=>d.tot), 1);
      const step = data.length > 1 ? (W-padL-padR)/(data.length-1) : 0;
      // Grid
      [0,.5,1].forEach(p => {
        const y = padT+bh*(1-p);
        ctx.strokeStyle='#f0f4f8'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        ctx.fillStyle='#bbc8da'; ctx.font='9px Barlow,sans-serif'; ctx.textAlign='right';
        ctx.fillText(Math.round(maxV*p), padL-3, y+3);
      });
      // Area entregadas
      const pts = data.map((d,i)=>({ x:padL+i*step, y:padT+bh-(d.ent/maxV)*bh, v:d.ent }));
      ctx.beginPath(); ctx.moveTo(pts[0].x, padT+bh);
      pts.forEach((p,i)=>{ if(i===0){ctx.lineTo(p.x,p.y);return;} const prev=pts[i-1]; const cx=(prev.x+p.x)/2; ctx.bezierCurveTo(cx,prev.y,cx,p.y,p.x,p.y); });
      ctx.lineTo(pts[pts.length-1].x, padT+bh); ctx.closePath();
      const grad=ctx.createLinearGradient(0,padT,0,padT+bh);
      grad.addColorStop(0,'rgba(30,125,58,0.25)'); grad.addColorStop(1,'rgba(30,125,58,0)');
      ctx.fillStyle=grad; ctx.fill();
      ctx.strokeStyle='#1e7d3a'; ctx.lineWidth=2; ctx.lineJoin='round';
      ctx.beginPath();
      pts.forEach((p,i)=>{ if(i===0){ctx.moveTo(p.x,p.y);return;} const prev=pts[i-1]; const cx=(prev.x+p.x)/2; ctx.bezierCurveTo(cx,prev.y,cx,p.y,p.x,p.y); });
      ctx.stroke();
      // X labels (every 5 days)
      data.forEach((d,i) => {
        if(i%5!==0) return;
        const [,m,dd]=d.d.split('-');
        ctx.fillStyle='#7a90aa'; ctx.font='8px Barlow,sans-serif'; ctx.textAlign='center';
        ctx.fillText(dd+'/'+m, padL+i*step, H-6);
      });
    });
  }
};

window.procesarAutoAsignar = async function(input) {
  const file = input.files[0]; if (!file) return;
  const fecha = document.getElementById('aa-fecha').value.trim() || hoy();
  const activosIds = [...document.querySelectorAll('[id^="aa-m-"]:checked')].map(el => el.value);
  if (!activosIds.length) { toast('Selecciona al menos un motorista'); return; }

  const activos = USUARIOS.filter(u => activosIds.includes(u.id));
  document.getElementById('aa-lbl').textContent = '⏳ Analizando...';

  const reader = new FileReader();
  reader.onload = async e => {
    const lines = e.target.result.split('\n').filter(l=>l.trim());
    if (!lines.length) { toast('Archivo vacío'); return; }
    const header = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-záéíóúñ]/g,''));
    const idx = {};
    ['factura','nombre','cliente','direccion','municipio','monto','pedido'].forEach(c => {
      const i = header.findIndex(h => h===c || h.includes(c));
      if (i>=0) idx[c]=i;
    });
    if (idx.factura===undefined) { toast('No se encontró columna "factura"'); return; }

    const rows = [];
    for (let li=1;li<lines.length;li++) {
      const cols = parseCsvLine(lines[li]);
      if (!cols.length || !cols[idx.factura]?.trim()) continue;
      const f = {};
      Object.keys(idx).forEach(c => f[c]=(cols[idx[c]]||'').trim());
      if (!f.factura) continue;
      rows.push(f);
    }

    if (!rows.length) { toast('Sin facturas válidas en el CSV'); return; }
    const maxTotal = activos.length * window.MAX_POR_MOTORISTA;
    if (rows.length > maxTotal) {
      toast(`⚠ ${rows.length} facturas superan la capacidad máxima (${maxTotal}). Agrega más motoristas.`);
    }

    // Distribute evenly with round-robin
    const asignadas = activos.map(m => ({ mot: m, facturas: [] }));
    rows.forEach((row, i) => { asignadas[i % activos.length].facturas.push(row); });

    // Preview
    let prev = `<div class="assign-preview">
      <div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px">
        Vista previa — ${rows.length} facturas → ${activos.length} motoristas
      </div>`;
    asignadas.forEach(a => {
      const n = a.facturas.length;
      const cls = n > window.MAX_POR_MOTORISTA ? 'over' : n > 28 ? 'warn' : 'ok';
      prev += `<div class="assign-row">
        <div style="display:flex;align-items:center;gap:10px">
          <i class="ti ti-motorbike" style="color:var(--blue)"></i>
          <span style="font-weight:600;font-size:14px">${esc(a.mot.nombre)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="assign-cap ${cls}">${n}</div>
          ${n>window.MAX_POR_MOTORISTA ? '<span style="color:var(--red);font-size:11px;font-weight:700">⚠ Excede máximo</span>' : ''}
        </div>
      </div>`;
    });
    prev += `</div>
    <button class="btn bp" style="margin-top:12px" onclick="confirmarAutoAsignar()">
      <i class="ti ti-check"></i> Confirmar y Cargar Rutas
    </button>`;

    document.getElementById('aa-preview').innerHTML = prev;
    window._aaData = { asignadas, fecha };
    document.getElementById('aa-lbl').textContent = `✓ ${file.name}`;
  };
  reader.readAsText(file, 'iso-8859-1');
};

window.confirmarAutoAsignar = async function() {
  const { asignadas, fecha } = window._aaData || {};
  if (!asignadas) return;
  try {
    document.getElementById('aa-preview').innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div><p>Guardando rutas...</p></div>';
    const batch = writeBatch(db);
    let count = 0;
    asignadas.forEach(a => {
      a.facturas.forEach(f => {
        const newDoc = doc(collection(db,'rutas'));
        batch.set(newDoc, {
          factura: f.factura,
          nombre: f.nombre || f.cliente || '',
          cliente: f.cliente || f.nombre || '',
          direccion: f.direccion || '',
          municipio: f.municipio || '',
          monto: f.monto || '',
          pedido: f.pedido || '',
          motorista: a.mot.id,
          motoristaNombre: a.mot.nombre,
          fecha, estado:'pendiente',
          tsEpoch: Date.now() + count
        });
        count++;
      });
    });
    await batch.commit();
    clearCache();
    toast(`✓ ${count} facturas asignadas automáticamente`);
    document.getElementById('aa-preview').innerHTML = `
      <div style="background:var(--green-bg);border:1.5px solid var(--green);border-radius:var(--r);padding:14px;text-align:center">
        <i class="ti ti-circle-check" style="color:var(--green);font-size:32px"></i>
        <div style="font-size:16px;font-weight:700;color:var(--green);margin-top:6px">✓ ${count} facturas cargadas correctamente</div>
        <div style="font-size:13px;color:var(--gray-500);margin-top:4px">Entre ${asignadas.length} motoristas</div>
      </div>`;
  } catch(e) {
    toast('Error al guardar: ' + e.message);
    document.getElementById('aa-preview').innerHTML = '';
  }
};

            <input type="text" id="upin-${idx}" value="${esc(u.pin)}"
              style="padding:8px 10px;font-size:14px;border:1.5px solid var(--gray-200);border-radius:var(--rs);width:100%;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px">
          </div>
        </div>
        <button onclick="guardarUsuario(${idx})"
          style="margin-top:10px;padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-family:Barlow,sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px">
          <i class="ti ti-device-floppy"></i> Guardar cambios
        </button>
      </div>`;
    } else {
      // Read-only for other admins
      usersHtml += `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100)">
        <div style="display:flex;align-items:center;gap:10px">
          <i class="ti ${u.icon}" style="color:var(--blue);font-size:18px"></i>
          <div>
            <div style="font-weight:600;font-size:14px">${esc(u.nombre)}</div>
            <div style="font-size:12px;color:var(--gray-500)">${u.rol==='admin'?'Administrador':'Motorista'}</div>
          </div>
        </div>
        <span class="badge ${u.rol==='admin'?'b-blue':'b-pend'}">${u.rol}</span>
      </div>`;
      }
    });
  });

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0">Usuarios del sistema</div>
        ${isSuper ? '<span style="font-size:11px;background:var(--blue-light);color:var(--blue);padding:4px 10px;border-radius:20px;font-weight:700"><i class="ti ti-edit"></i> Modo edición</span>' : ''}
      </div>
      ${usersHtml}
      ${!isSuper ? '<div style="margin-top:8px;font-size:12px;color:var(--gray-500)"><i class="ti ti-info-circle"></i> Solo el Administrador 1 puede editar usuarios.</div>' : ''}
    </div>
    <div class="card">
      <div class="card-title">Zona de peligro</div>
      <button class="btn bd" onclick="borrarTodo()"><i class="ti ti-trash"></i> Borrar TODOS los registros del día</button>
    </div>
  `;
}

window.guardarUsuario = async function(idx) {
  const nombre = document.getElementById(`uname-${idx}`)?.value.trim();
  const pin    = document.getElementById(`upin-${idx}`)?.value.trim();
  if (!nombre) { toast('El nombre no puede estar vacío'); return; }
  if (!pin)    { toast('La contraseña no puede estar vacía'); return; }
  if (pin.length < 3) { toast('La contraseña debe tener al menos 3 caracteres'); return; }

  USUARIOS[idx].nombre = nombre;
  USUARIOS[idx].pin    = pin;

  // Save to Firestore (primary) and localStorage (backup)
  try {
    await setDoc(doc(db, 'usuarios', USUARIOS[idx].id), {
      id: USUARIOS[idx].id, nombre, pin,
      rol: USUARIOS[idx].rol, icon: USUARIOS[idx].icon
    });
    toast(`✓ ${nombre} guardado en la nube`);
  } catch(e) {
    // Fallback to localStorage
    try { localStorage.setItem('picme_usuarios', JSON.stringify(USUARIOS.map(u=>({id:u.id,nombre:u.nombre,pin:u.pin})))); } catch(e2){}
    toast(`✓ ${nombre} guardado localmente`);
  }

  // Update topbar if it's current user
  if (USUARIOS[idx].id === currentUser.id) {
    currentUser.nombre = nombre;
    currentUser.pin    = pin;
    document.getElementById('tb-user').textContent = nombre;
  }

  setTimeout(renderConfig, 300);
};

window.borrarTodo = async function() {
  if (!confirm('¿Borrar TODOS los registros de hoy? Esta acción no se puede deshacer.')) return;
  const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',hoy())));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(doc(db,'rutas',d.id)));
  await batch.commit();
  clearCache();
  toast('Registros del día borrados');
};

// ── v16: EXPORTAR PDF HISTORIAL ───────────────────────────
window.exportarPDFHistorial = function() {
  const all = CACHE.rutasTodas || [];
  const filtFecha = document.getElementById('hist-filtFecha')?.value || '';
  const filtMot = document.getElementById('hist-filtMot')?.value || '';
  const filtEst = document.getElementById('hist-filtEst')?.value || '';

  let rows = all.filter(r => {
    if (filtFecha && r.fecha !== filtFecha) return false;
    if (filtMot && r.motorista !== filtMot) return false;
    if (filtEst && r.estado !== filtEst) return false;
    return true;
  });

  const totEnt = rows.filter(r=>r.estado==='entregada').length;
  const totContado = rows.filter(r=>r.estado==='entregada'&&r.tipoPago==='Contado').reduce((a,r)=>a+(parseFloat(r.monto)||0),0);

  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Historial PICME</title>
  <style>
    body{font-family:Arial,sans-serif;color:#1a2535;padding:20px;font-size:12px}
    h1{color:#185FA5;font-size:18px} .kpi-r{display:flex;gap:12px;margin:8px 0}
    .kpi{background:#f0f6fd;padding:8px 12px;border-radius:6px;min-width:120px}
    .kpi-n{font-size:20px;font-weight:700;color:#185FA5} .kpi-l{font-size:9px;color:#7a90aa;text-transform:uppercase}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:11px}
    th{background:#f7f9fc;padding:6px 8px;text-align:left;border-bottom:2px solid #dce4ef;font-size:10px;text-transform:uppercase;color:#7a90aa}
    td{padding:6px 8px;border-bottom:1px solid #eef2f7}
    .green{color:#1e7d3a} .red{color:#c0392b} .blue{color:#185FA5}
    @media print{body{margin:0;padding:10px}}
  </style></head><body>
  <h1>PICME — Historial de Entregas</h1>
  <p>Filtros: ${filtFecha?'Fecha: '+fmtFecha(filtFecha)+' · ':''}${filtMot?'Motorista aplicado · ':''}${filtEst?'Estado: '+filtEst:''} | Generado: ${new Date().toLocaleString('es')}</p>
  <div class="kpi-r">
    <div class="kpi"><div class="kpi-n">${rows.length}</div><div class="kpi-l">Total Registros</div></div>
    <div class="kpi"><div class="kpi-n">${totEnt}</div><div class="kpi-l">Entregadas</div></div>
    <div class="kpi"><div class="kpi-n">$${totContado.toFixed(2)}</div><div class="kpi-l">Contado Cobrado</div></div>
  </div>
  <table><thead><tr><th>Factura</th><th>Cliente</th><th>Motorista</th><th>Monto</th><th>Pago</th><th>Estado</th><th>Hora</th><th>Fecha</th><th>Motivo</th></tr></thead><tbody>`;

  rows.slice(0,500).forEach(r => {
    const est = r.estado==='entregada' ? 'green' : r.estado==='no-entregada' ? 'red' : '';
    html += `<tr><td>#${r.factura}</td><td>${r.nombre||r.cliente||'—'}</td><td>${r.motoristaNombre||'—'}</td>
      <td>${r.monto?'$'+r.monto:'—'}</td><td>${r.tipoPago||'—'}</td>
      <td class="${est}">${r.estado}</td><td>${r.horaEnt||'—'}</td><td>${fmtFecha(r.fecha)}</td>
      <td style="color:#c0392b">${r.motivo||''}</td></tr>`;
  });

  if (rows.length > 500) html += `<tr><td colspan="9" style="text-align:center;color:#7a90aa;font-style:italic">... y ${rows.length-500} registros más (exportar CSV para todos)</td></tr>`;

  html += `</tbody></table><p style="font-size:10px;color:#7a90aa;margin-top:20px">PICME S.A. DE C.V. · v16</p></body></html>`;

  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 400);
};

// ── EXPORTAR CSV ──────────────────────────────────────────
function toCSV(rows) {
  let c = 'Factura,Cliente,Motorista,Direccion,Municipio,Monto,Pedido,Estado,Hora,Motivo,TipoPago,Fecha\n';
  rows.forEach(r => {
    c += [r.factura, '"'+(r.nombre||r.cliente||'')+'"', '"'+(r.motoristaNombre||r.motorista||'')+'"',
      '"'+(r.direccion||'')+'"', '"'+(r.municipio||'')+'"', r.monto||'', r.pedido||'',
      r.estado, r.horaEnt||'', '"'+(r.motivo||'')+'"', r.tipoPago||'', r.fecha||''
    ].join(',') + '\n';
  });
  return c;
}
function dl(csv, nom) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = nom; a.click();
}
window.expHoy = async function() {
  const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',hoy())));
  dl(toCSV(snap.docs.map(d=>d.data())), 'entregas_'+hoy()+'.csv');
};
window.expDia = async function(fecha) {
  const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',fecha)));
  dl(toCSV(snap.docs.map(d=>d.data())), 'entregas_'+fecha+'.csv');
};
window.expTodo = async function() {
  const snap = await getDocs(collection(db,'rutas'));
  dl(toCSV(snap.docs.map(d=>d.data())), 'entregas_historial.csv');
};

// ── CSV PARSER ────────────────────────────────────────────
function parseCsvLine(line) {
  const result=[]; let cur='', inQ=false;
  for (let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

// ── SBTN (admin table collapse) ───────────────────────────
window.sbtn = function(el) { el.nextElementSibling?.classList.toggle('open'); };

// ── BOOT ──────────────────────────────────────────────────
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

function showLogin() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  renderLogin();
}

// Muestra el login INMEDIATAMENTE con datos locales,
// luego sincroniza Firestore en background sin bloquear.
function bootApp() {
  // Cancelar el fallback de emergencia — el módulo cargó correctamente
  if (window._clearFallback) window._clearFallback();

  // 1. Restaurar desde localStorage al instante
  try {
    const saved = JSON.parse(localStorage.getItem('picme_usuarios') || '[]');
    saved.forEach(s => {
      const u = USUARIOS.find(u => u.id === s.id);
      if (u) { u.nombre = s.nombre; u.pin = s.pin; }
    });
  } catch(e) {}

  // 2. Mostrar login YA — no esperar Firebase
  showLogin();
  // 3. Sync Firestore en background
  withTimeout(getDocs(collection(db, 'usuarios')), 6000)
    .then(snap => {
      if (!snap.empty) {
        snap.forEach(d => {
          const s = d.data();
          const u = USUARIOS.find(u => u.id === s.id);
          if (u) { u.nombre = s.nombre; u.pin = s.pin; }
        });
        if (!currentUser) renderLogin(); // actualizar lista si aún en login
      } else {
        // Primera vez: sembrar en Firestore
        try {
          const batch = writeBatch(db);
          USUARIOS.forEach(u => {
            batch.set(doc(db, 'usuarios', u.id), {
              id: u.id, nombre: u.nombre, pin: u.pin, rol: u.rol, icon: u.icon
            });
          });
          withTimeout(batch.commit(), 5000).catch(() => {});
        } catch(e) {}
      }
    })
    .catch(() => { /* sin conexión — ya estamos en el login con datos por defecto */ });
}

setTimeout(() => {
  try {
    bootApp();
  } catch(e) {
    console.error('bootApp error:', e);
    showLogin();
  }
}, 300);

// Exponer showLogin al scope global por si el fallback lo necesita
window._showLoginFallback = function() {
  try { showLogin(); } catch(e) {
    var l = document.getElementById('loading');
    var lg = document.getElementById('login');
    if(l) l.style.display='none';
    if(lg) lg.style.display='flex';
  }
};
