// ── Obtener filas filtradas actuales ─────────────────────
function getConcFilasActuales() {
  const resultado = window._CONC_RESULTADO || [];
  const filtroEstado = document.getElementById('conc-filtro-estado')?.value || '';
  const filtroTexto  = (document.getElementById('conc-filtro-texto')?.value || '').toLowerCase();
  // NUEVA FUNCIONALIDAD: filtro rango fechas
  const filtroDesde   = document.getElementById('conc-filtro-fecha-desde')?.value || '';
  const filtroHasta   = document.getElementById('conc-filtro-fecha-hasta')?.value || '';
  // FIX BUG #2: mismo selector de tipo-fecha para que exportaciones sean consistentes con la tabla
  const tipoFechaExp  = document.getElementById('conc-filtro-tipo-fecha')?.value || 'ruta';
  const adminLabels = { refacturacion:'Refacturación', retiro_cliente:'Retiro Cliente', retiro_vendedor:'Retiro Vendedor', anulacion:'Anulación' };

  let filas = resultado;
  if (filtroDesde) filas = filas.filter(r => {
    const campo = tipoFechaExp === 'emision' ? (r.fechaEmision || r.fechaRuta || '') : (r.fechaRuta || r.fechaEmision || '');
    return !campo || campo >= filtroDesde;
  });
  if (filtroHasta) filas = filas.filter(r => {
    const campo = tipoFechaExp === 'emision' ? (r.fechaEmision || r.fechaRuta || '') : (r.fechaRuta || r.fechaEmision || '');
    return !campo || campo <= filtroHasta;
  });
  if (filtroEstado) filas = filas.filter(r => {
    if (filtroEstado === 'no_asignada') return r.concEstado === 'no_asignada';
    if (filtroEstado === 'entregada')   return r.estado === 'entregada';
    if (filtroEstado === 'pendiente')   return r.estado === 'pendiente' && r.concEstado === 'en_ruta';
    if (filtroEstado === 'no-entregada') return r.estado === 'no-entregada';
    if (filtroEstado === 'refacturacion')  return r.estadoAdmin === 'refacturacion';
    if (filtroEstado === 'retiro_cliente') return r.estadoAdmin === 'retiro_cliente';
    if (filtroEstado === 'retiro_vendedor') return r.estadoAdmin === 'retiro_vendedor';
    if (filtroEstado === 'anulacion')   return r.estadoAdmin === 'anulacion';
    return true;
  });
  if (filtroTexto) filas = filas.filter(r =>
    normFact(r.factura).includes(filtroTexto.toUpperCase()) ||
    (r.nombre||'').toLowerCase().includes(filtroTexto) ||
    (r.motoristaNombre||'').toLowerCase().includes(filtroTexto)
  );
  return filas;
}

window.exportarCSVComparacion = function() {
  const filas = getConcFilasActuales();
  if (!filas.length) { toast('Sin datos para exportar'); return; }
  const adminLabels = { refacturacion:'Refacturación', retiro_cliente:'Retiro Cliente', retiro_vendedor:'Retiro Vendedor', anulacion:'Anulación' };
  let csv = 'Factura,Cliente,Monto,Estado,Conciliación,Motorista,FechaRuta,HoraEntrega,TipoPago,Motivo,GestiónAdmin\n';
  filas.forEach(r => {
    const estadoLabel = r.estadoAdmin ? (adminLabels[r.estadoAdmin]||r.estadoAdmin) : (r.concEstado==='no_asignada'?'No asignada':r.estado||'—');
    csv += [r.factura,'"'+(r.nombre||'')+'"',r.monto||'',r.estado||'—',r.concEstado,'"'+(r.motoristaNombre||'')+'"',r.fechaRuta||'',r.horaEnt||'',r.tipoPago||'','"'+(r.motivo||'')+'"',adminLabels[r.estadoAdmin]||''].join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'conciliacion_' + (CONC_FECHA||hoy()) + '.csv';
  a.click();
  toast('✓ CSV descargado');
};

// ── MARCAR COMO EXTRAVIADA ────────────────────────────────
window.marcarExtraviada = async function(pendId) {
  if (!confirm('¿Confirmar esta factura como EXTRAVIADA? Se registrará para seguimiento.')) return;
  try {
    await updateDoc(doc(db,'pendientes',pendId), {
      estado: 'extraviada',
      fechaExtravio: hoy(),
      tsEpoch: Date.now()
    });
    // Also update in rutas if exists
    const pend = (CACHE.pendientes||[]).find(p=>p._id===pendId);
    if (pend) {
      const rutaSnap = await getDocs(query(
        collection(db,'rutas'),
        where('factura','==',pend.facturaOriginal)
      ));
      const batch = writeBatch(db);
      rutaSnap.docs.forEach(d => {
        if (d.data().estado === 'pendiente' || d.data().estado === 'no-entregada') {
          batch.update(doc(db,'rutas',d.id), { estado:'extraviada', fechaExtravio: hoy() });
        }
      });
      await batch.commit();
    }
    clearCache();
    toast('⚠️ Factura marcada como extraviada');
    renderConciliacion();
  } catch(e) {
    toast('Error: ' + e.message);
  }
};

  };
  try {

// AUDITORÍA v18: Renderiza historial de cargas (Firestore + localStorage merge)
async function renderHistorialCargas() {
  const el = document.getElementById('historial-cargas-list');
  if (!el) return;

  let historial = [];
  try {
    historial = JSON.parse(localStorage.getItem('picme_historial_cargas') || '[]');
  } catch(e) { historial = []; }

  try {
    const snap = await getDocs(query(collection(db, 'historial_cargas_rutas'), orderBy('tsEpoch', 'desc'), limit(200)));
    const remoto = snap.docs.map(d => d.data());
    const claves = new Set(historial.map(h => `${h.tsEpoch}-${h.fechaRuta}-${h.cantidad}`));
    remoto.forEach(r => {
      const k = `${r.tsEpoch}-${r.fechaRuta}-${r.cantidad}`;
      if (!claves.has(k)) historial.push(r);
    });
  } catch(e) { /* índice compuesto puede requerir creación automática en Firebase */ }

  if (!historial.length) {
    el.innerHTML = '<div style="text-align:center;padding:16px;color:var(--gray-500);font-size:13px"><i class="ti ti-inbox" style="font-size:28px;display:block;margin-bottom:6px;opacity:.3"></i>Aún no hay cargas registradas</div>';
    return;
  }

  historial.sort((a, b) => (b.tsEpoch || 0) - (a.tsEpoch || 0));

  let h = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead>
      <tr style="background:var(--gray-50)">
        <th style="padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--gray-500);letter-spacing:.05em;border-bottom:2px solid var(--gray-200)">Fecha Ruta</th>

        <th style="padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--gray-500);letter-spacing:.05em;border-bottom:2px solid var(--gray-200)">Fecha/Hora Carga</th>
        <th style="padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--gray-500);letter-spacing:.05em;border-bottom:2px solid var(--gray-200)">Usuario</th>
        <th style="padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--gray-500);letter-spacing:.05em;border-bottom:2px solid var(--gray-200)">Motorista</th>
      </tr>
    </thead>
    <tbody>`;

  historial.forEach((reg, i) => {
    const bgRow = i % 2 === 0 ? 'var(--white)' : 'var(--gray-50)';
    const fechaCarga = reg.tsEpoch ? new Date(reg.tsEpoch).toLocaleString('es', { timeZone: 'America/El_Salvador', day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
    h += `<tr style="background:${bgRow}">
      <td style="padding:9px 10px;border-bottom:1px solid var(--gray-100)">
        <span style="font-weight:700;color:var(--blue)">${fmtFecha(reg.fechaRuta || reg.fecha || '—')}</span>
      </td>
      <td style="padding:9px 10px;border-bottom:1px solid var(--gray-100);text-align:center">
        <span style="background:var(--blue-light);color:var(--blue);border-radius:20px;padding:2px 10px;font-weight:700;font-size:13px">${reg.cantidad || 0}</span>
      </td>
      <td style="padding:9px 10px;border-bottom:1px solid var(--gray-100);color:var(--gray-700);font-size:12px">${esc(fechaCarga)}</td>
      <td style="padding:9px 10px;border-bottom:1px solid var(--gray-100)">
        <span style="display:flex;align-items:center;gap:5px;font-size:13px">
          <i class="ti ti-shield-check" style="color:var(--blue);font-size:14px"></i>
          ${esc(reg.usuario || '—')}

}

window.cargarCSV = async function(input) {
  const file = input.files[0]; if (!file) return;
  const motId = document.getElementById('sel-mot').value;
  const fecha = document.getElementById('sel-fecha').value.trim() || hoy();
  const lbl = document.getElementById('csv-lbl');
  const msg = document.getElementById('csv-msg');

  if (!motId) { toast('Selecciona el motorista'); return; }
  lbl.textContent = '⏳ Procesando...';

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const text = e.target.result;
      const lines = text.split('\n').filter(l => l.trim());
      if (!lines.length) throw new Error('Archivo vacío');
      const header = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-záéíóúñ]/g,''));
      const campos = ['factura','nombre','cliente','codigo','codigocliente','direccion','municipio','departamento','monto','pedido','tipo','fechaemision'];
      const idx = {};
      campos.forEach(c => {
        const i = header.findIndex(h => h === c || h.includes(c));
        if (i >= 0) idx[c] = i;
      });
      if (idx.factura === undefined) throw new Error('No se encontró columna "factura"');

      const mot = USUARIOS.find(u => u.id === motId);
      // FIX REASIGNACIÓN: detectar facturas previamente no entregadas
      const noEntIdx = await buildNoEntregadasIndex();
      const reprogramadas = new Set();
      const ctxAsign = { motorista: motId, motoristaNombre: mot.nombre, fechaAsignacion: fecha };
      const batch = writeBatch(db);
      let batchOps = 0;
      let count = 0;
      const newFacts = [];

      for (let li = 1; li < lines.length; li++) {
        const cols = parseCsvLine(lines[li]);
        if (!cols.length || !cols[idx.factura]?.trim()) continue;
        const f = {};
        campos.forEach(c => { if(idx[c]!==undefined) f[c]=(cols[idx[c]]||'').trim(); });
        if (!f.factura) continue;
        if (!f.nombre && f.cliente) f.nombre = f.cliente;
        const codigoCliente = f.codigocliente || f.codigo || '';
        const fechaEmision = f.fechaemision || '';
        newFacts.push(f.factura);

        // FIX REASIGNACIÓN: marcar registros anteriores no entregados como reprogramada
        const k = normFact(f.factura);
        if (noEntIdx[k]) {
          noEntIdx[k].forEach(p => {
            batch.update(doc(db, 'rutas', p.id), {
              estado: 'reprogramada',
              fechaReprogramacion: fecha,
              reprogramadaPor: mot.nombre,
              nuevaFechaRuta: fecha,
              tsEpoch: Date.now(),
            });
            batchOps++;
          });
          reprogramadas.add(f.factura);
          delete noEntIdx[k];
        }

        const newDoc = doc(collection(db,'rutas'));
        batch.set(newDoc, {
          factura: f.factura,
          nombre: f.nombre || f.cliente || '',
          cliente: f.cliente || f.nombre || '',
          codigoCliente,
          direccion: f.direccion || '',
          municipio: f.municipio || '',
          departamento: f.departamento || '',
          monto: f.monto || '',
          pedido: f.pedido || '',
          tipo: f.tipo || '',
          fechaEmision,
          motorista: motId,
          motoristaNombre: mot.nombre,
          fecha: fecha,
          fechaAsignacion: fecha, // AUDITORÍA v18: trazabilidad de asignación
          estado: 'pendiente',
          tsEpoch: Date.now() + count
        });
        batchOps++;
        count++;
      }

      if (!count) throw new Error('No se encontraron facturas');

      const existSnap = await getDocs(query(collection(db,'rutas'), where('estado','==','entregada')));
      const yaEntregadas = new Set(existSnap.docs.map(d => normFact(d.data().factura)));
      const duplicadas = newFacts.filter(f => yaEntregadas.has(normFact(f)));

      await batch.commit();

      // FIX REASIGNACIÓN: registrar historial de estados tras guardar
      for (const fact of newFacts) {
        const ctx = { ...ctxAsign };
        if (reprogramadas.has(fact)) {
          await registrarEstadoFactura(fact, 'reprogramada', {
            ...ctx, nota: 'Reasignada a ruta del ' + fmtFecha(fecha),
          });
          await registrarEstadoFactura(fact, 'pendiente', {
            ...ctx, nota: 'Pendiente de entrega tras reprogramación',
          });
          const pendSnap = await getDocs(query(collection(db, 'pendientes'), where('facturaOriginal', '==', fact)));
          if (!pendSnap.empty) {
            await updateDoc(doc(db, 'pendientes', pendSnap.docs[0].id), {
              estado: 'reprogramada', fechaReprogramacion: fecha, motoristaNombre: mot.nombre, tsEpoch: Date.now(),
            });
          }
        } else {
          await registrarEstadoFactura(fact, 'asignada', ctx);
          await registrarEstadoFactura(fact, 'pendiente', { ...ctx, nota: 'Pendiente de entrega en ruta' });
        }
      }

      if (reprogramadas.size) {
        toast(`↻ ${reprogramadas.size} factura(s) reprogramada(s) desde estado no entregada`);
      }

      lbl.textContent = `✓ ${file.name}`;
      msg.style.color = 'var(--green)';
      msg.textContent = `✓ ${count} facturas cargadas para ${mot.nombre}`;
      clearCache(); // forzar recarga en todas las vistas
      toast(`✓ ${count} facturas cargadas`);

      // NUEVA FUNCIONALIDAD: Guardar en historial de cargas
      guardarRegistroHistorialCarga(count, fecha, mot.nombre);

      // Show alert for duplicates
      if (duplicadas.length) {
        const alertDiv = document.getElementById('csv-alert');
        if (alertDiv) {
          alertDiv.style.display = 'block';
          alertDiv.innerHTML = `<div class="alert-banner">
            <i class="ti ti-alert-triangle"></i>
            <div>
              <div class="alert-banner-title">⚠️ ${duplicadas.length} factura(s) ya marcadas como ENTREGADAS</div>
              <div class="alert-banner-body">Las siguientes facturas ya fueron entregadas anteriormente: <strong>${duplicadas.join(', ')}</strong>. Verifica si es un error en el CSV.</div>
            </div>
          </div>`;
        }
      }

      input.value = '';
      setTimeout(cargarResumenRutas, 800);
    } catch(err) {
      lbl.textContent = '✗ Error';
      msg.style.color = 'var(--red)';
      msg.textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(file, 'iso-8859-1');
};

// AUDITORÍA v18: reportes operativos diario / semanal / mensual (PDF + CSV)
function getRutasEnPeriodo(periodo) {
  const todas = (CACHE.rutasTodas || []).filter(r => r.estado !== 'reprogramada');
  const hoyStr = hoy();
  if (periodo === 'dia') return todas.filter(r => r.fecha === hoyStr);
  if (periodo === 'semana') {
    // Calcular inicio correctamente: hoyStr es 'YYYY-MM-DD', construir Date desde string
    const base = new Date(hoyStr + 'T12:00:00');
    const inicio = new Date(hoyStr + 'T12:00:00');
    inicio.setDate(base.getDate() - 6);
    const iniStr = inicio.toISOString().split('T')[0];
    return todas.filter(r => r.fecha >= iniStr && r.fecha <= hoyStr);
  }
  const mes = hoyStr.substring(0, 7);
  return todas.filter(r => (r.fecha || '').startsWith(mes));
}

window.gSubTab = function(id, el) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('g-kpi').style.display = id==='kpi' ? '' : 'none';
  document.getElementById('g-ranking').style.display = id==='ranking' ? '' : 'none';
  document.getElementById('g-tendencia').style.display = id==='tendencia' ? '' : 'none';

  if (id === 'tendencia') {
    requestAnimationFrame(() => {
      const canvas = document.getElementById('chart-tendencia');
      if (!canvas || !window._days30Data) return;
      const data = window._days30Data;
      const ratio = dpr();
      const W = canvas.offsetWidth || 320, H = 160;
      canvas.width = W * ratio; canvas.height = H * ratio;
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      const padL=36,padB=26,padT=16,padR=12;
      const bh = H-padB-padT;
      const maxV = Math.max(...data.map(d=>d.tot), 1);
      const step = data.length > 1 ? (W-padL-padR)/(data.length-1) : 0;
      // Grid
      [0,.5,1].forEach(p => {
        const y = padT+bh*(1-p);
        ctx.strokeStyle='#f0f4f8'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        ctx.fillStyle='#bbc8da'; ctx.font='9px Barlow,sans-serif'; ctx.textAlign='right';
        ctx.fillText(Math.round(maxV*p), padL-3, y+3);
      });
      // Area entregadas
      const pts = data.map((d,i)=>({ x:padL+i*step, y:padT+bh-(d.ent/maxV)*bh, v:d.ent }));
      ctx.beginPath(); ctx.moveTo(pts[0].x, padT+bh);
      pts.forEach((p,i)=>{ if(i===0){ctx.lineTo(p.x,p.y);return;} const prev=pts[i-1]; const cx=(prev.x+p.x)/2; ctx.bezierCurveTo(cx,prev.y,cx,p.y,p.x,p.y); });
      ctx.lineTo(pts[pts.length-1].x, padT+bh); ctx.closePath();
      const grad=ctx.createLinearGradient(0,padT,0,padT+bh);
      grad.addColorStop(0,'rgba(30,125,58,0.25)'); grad.addColorStop(1,'rgba(30,125,58,0)');
      ctx.fillStyle=grad; ctx.fill();
      ctx.strokeStyle='#1e7d3a'; ctx.lineWidth=2; ctx.lineJoin='round';
      ctx.beginPath();
      pts.forEach((p,i)=>{ if(i===0){ctx.moveTo(p.x,p.y);return;} const prev=pts[i-1]; const cx=(prev.x+p.x)/2; ctx.bezierCurveTo(cx,prev.y,cx,p.y,p.x,p.y); });
      ctx.stroke();
      // X labels (every 5 days)
      data.forEach((d,i) => {
        if(i%5!==0) return;
        const [,m,dd]=d.d.split('-');
        ctx.fillStyle='#7a90aa'; ctx.font='8px Barlow,sans-serif'; ctx.textAlign='center';
        ctx.fillText(dd+'/'+m, padL+i*step, H-6);
      });
    });
  }
};

window.procesarAutoAsignar = async function(input) {
  const file = input.files[0]; if (!file) return;
  const fecha = document.getElementById('aa-fecha').value.trim() || hoy();
  const activosIds = [...document.querySelectorAll('[id^="aa-m-"]:checked')].map(el => el.value);
  if (!activosIds.length) { toast('Selecciona al menos un motorista'); return; }

  const activos = USUARIOS.filter(u => activosIds.includes(u.id));
  document.getElementById('aa-lbl').textContent = '⏳ Analizando...';

  const reader = new FileReader();
  reader.onload = async e => {
    const lines = e.target.result.split('\n').filter(l=>l.trim());
    if (!lines.length) { toast('Archivo vacío'); return; }
    const header = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-záéíóúñ]/g,''));
    const idx = {};
    ['factura','nombre','cliente','direccion','municipio','monto','pedido'].forEach(c => {
      const i = header.findIndex(h => h===c || h.includes(c));
      if (i>=0) idx[c]=i;
    });
    if (idx.factura===undefined) { toast('No se encontró columna "factura"'); return; }

    const rows = [];
    for (let li=1;li<lines.length;li++) {
      const cols = parseCsvLine(lines[li]);
      if (!cols.length || !cols[idx.factura]?.trim()) continue;
      const f = {};
      Object.keys(idx).forEach(c => f[c]=(cols[idx[c]]||'').trim());
      if (!f.factura) continue;
      rows.push(f);
    }

    if (!rows.length) { toast('Sin facturas válidas en el CSV'); return; }
    const maxTotal = activos.length * window.MAX_POR_MOTORISTA;
    if (rows.length > maxTotal) {
      toast(`⚠ ${rows.length} facturas superan la capacidad máxima (${maxTotal}). Agrega más motoristas.`);
    }

    // Distribute evenly with round-robin
    const asignadas = activos.map(m => ({ mot: m, facturas: [] }));
    rows.forEach((row, i) => { asignadas[i % activos.length].facturas.push(row); });

    // Preview
    let prev = `<div class="assign-preview">
      <div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px">

      prev += `<div class="assign-row">
        <div style="display:flex;align-items:center;gap:10px">
          <i class="ti ti-motorbike" style="color:var(--blue)"></i>

          ${n>window.MAX_POR_MOTORISTA ? '<span style="color:var(--red);font-size:11px;font-weight:700">⚠ Excede máximo</span>' : ''}
        </div>
      </div>`;
    });
    prev += `</div>
    <button class="btn bp" style="margin-top:12px" onclick="confirmarAutoAsignar()">
      <i class="ti ti-check"></i> Confirmar y Cargar Rutas
    </button>`;

  };

};

window.confirmarAutoAsignar = async function() {
  const { asignadas, fecha } = window._aaData || {};
  if (!asignadas) return;
  try {
    document.getElementById('aa-preview').innerHTML = '<div class="empty"><div class="loading-spinner" style="margin:0 auto"></div><p>Guardando rutas...</p></div>';
    // FIX REASIGNACIÓN: misma lógica que cargarCSV manual
    const noEntIdx = await buildNoEntregadasIndex();
    const reprogramadas = new Set();
    const batch = writeBatch(db);
    let count = 0;
    asignadas.forEach(a => {
      a.facturas.forEach(f => {
        const k = normFact(f.factura);
        if (noEntIdx[k]) {
          noEntIdx[k].forEach(p => {
            batch.update(doc(db, 'rutas', p.id), {
              estado: 'reprogramada',
              fechaReprogramacion: fecha,
              reprogramadaPor: a.mot.nombre,
              nuevaFechaRuta: fecha,
              tsEpoch: Date.now(),
            });
          });
          reprogramadas.add(f.factura);
          delete noEntIdx[k];
        }
        const newDoc = doc(collection(db,'rutas'));
        batch.set(newDoc, {
          factura: f.factura,
          nombre: f.nombre || f.cliente || '',
          cliente: f.cliente || f.nombre || '',
          codigoCliente: f.codigo || f.codigocliente || '',
          direccion: f.direccion || '',
          municipio: f.municipio || '',
          monto: f.monto || '',
          pedido: f.pedido || '',
          motorista: a.mot.id,
          motoristaNombre: a.mot.nombre,
          fecha, fechaAsignacion: fecha,
          estado:'pendiente',
          tsEpoch: Date.now() + count
        });
        count++;
      });
    });
    await batch.commit();

    for (const a of asignadas) {
      for (const f of a.facturas) {
        const ctx = { motorista: a.mot.id, motoristaNombre: a.mot.nombre, fechaAsignacion: fecha };
        if (reprogramadas.has(f.factura)) {
          await registrarEstadoFactura(f.factura, 'reprogramada', { ...ctx, nota: 'Reasignada vía auto-asignación' });
          await registrarEstadoFactura(f.factura, 'pendiente', { ...ctx, nota: 'Pendiente tras reprogramación' });
        } else {
          await registrarEstadoFactura(f.factura, 'asignada', ctx);
          await registrarEstadoFactura(f.factura, 'pendiente', { ...ctx, nota: 'Pendiente de entrega en ruta' });
        }
      }
    }

    clearCache();
    toast(`✓ ${count} facturas asignadas${reprogramadas.size ? ' · ' + reprogramadas.size + ' reprogramada(s)' : ''}`);
    document.getElementById('aa-preview').innerHTML = `
      <div style="background:var(--green-bg);border:1.5px solid var(--green);border-radius:var(--r);padding:14px;text-align:center">
        <i class="ti ti-circle-check" style="color:var(--green);font-size:32px"></i>
        <div style="font-size:16px;font-weight:700;color:var(--green);margin-top:6px">✓ ${count} facturas cargadas correctamente</div>
        <div style="font-size:13px;color:var(--gray-500);margin-top:4px">Entre ${asignadas.length} motoristas</div>
      </div>`;
  } catch(e) {
    toast('Error al guardar: ' + e.message);
    document.getElementById('aa-preview').innerHTML = '';
  }
};

window.otorgarPermiso = async function() {
  const userId  = document.getElementById('perm-usuario').value;
  const fecha   = document.getElementById('perm-fecha').value;
  const expira  = document.getElementById('perm-expira').value || null;
  const motivo  = document.getElementById('perm-motivo').value.trim();

  if (!userId) { toast('Selecciona un usuario', 'error'); return; }
  if (!fecha)  { toast('Selecciona la fecha autorizada', 'error'); return; }

  const hoyReal = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
  if (fecha === hoyReal) {
    if (!confirm(`La fecha autorizada es hoy (${fmtFecha(fecha)}). ¿Confirmar?`)) return;
  }

  const u = USUARIOS.find(u => u.id === userId);
  const [fy,fm,fd] = fecha.split('-');
  if (!confirm(`¿Autorizar a "${u?.nombre}" a trabajar en fecha ${fd}/${fm}/${fy}?`)) return;

  try {
    // Revocar permisos anteriores del mismo usuario
    const prev = await getDocs(query(collection(db,'permisos_fecha'), where('userId','==',userId), where('activo','==',true)));
    const batch = writeBatch(db);
    prev.forEach(d => batch.update(doc(db,'permisos_fecha',d.id), { activo: false, revocadoEn: hoyReal }));
    await batch.commit();

    // Crear nuevo permiso
    await addDoc(collection(db,'permisos_fecha'), {
      userId,
      fechaPermitida: fecha,
      expira:         expira || null,
      motivo:         motivo || null,
      otorgadoPor:    currentUser.nombre,
      otorgadoEn:     hoyReal,
      activo:         true,
      tsEpoch:        Date.now(),
    });

    toast(`✓ Permiso otorgado a ${u?.nombre} para fecha ${fd}/${fm}/${fy}`, 'ok');
    renderPermisos();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
};

window.revocarPermiso = async function(permisoId, nombreUsuario) {
  if (!confirm(`¿Revocar el permiso de "${nombreUsuario}"? El usuario volverá a la fecha real.`)) return;
  try {
    const hoyReal = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
    await updateDoc(doc(db,'permisos_fecha',permisoId), {
      activo: false,
      revocadoEn: hoyReal,
      revocadoPor: currentUser.nombre,
    });
    toast(`✓ Permiso de ${nombreUsuario} revocado`, 'ok');
    renderPermisos();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
};

window.guardarUsuario = async function(idx) {
  const nombre = document.getElementById(`uname-${idx}`)?.value.trim();
  const pin    = document.getElementById(`upin-${idx}`)?.value.trim();
  if (!nombre) { toast('El nombre no puede estar vacío'); return; }
  if (!pin)    { toast('La contraseña no puede estar vacía'); return; }
  if (pin.length < 3) { toast('La contraseña debe tener al menos 3 caracteres'); return; }

  USUARIOS[idx].nombre = nombre;
  USUARIOS[idx].pin    = pin;

  // Save to Firestore (primary) and localStorage (backup)
  try {
    await setDoc(doc(db, 'usuarios', USUARIOS[idx].id), {
      id: USUARIOS[idx].id, nombre, pin,
      rol: USUARIOS[idx].rol, icon: USUARIOS[idx].icon
    });
    toast(`✓ ${nombre} guardado en la nube`);
  } catch(e) {
    // Fallback to localStorage
    try { localStorage.setItem('picme_usuarios', JSON.stringify(USUARIOS)); } catch(e2){}
    toast(`✓ ${nombre} guardado localmente`);
  }
  // Siempre actualizar localStorage con datos completos
  try { localStorage.setItem('picme_usuarios', JSON.stringify(USUARIOS)); } catch(e2){}

  // Update topbar if it's current user
  if (USUARIOS[idx].id === currentUser.id) {
    currentUser.nombre = nombre;
    currentUser.pin    = pin;
    document.getElementById('tb-user').textContent = nombre;
  }

  setTimeout(renderConfig, 300);
};

window.borrarTodo = async function() {
  if (!confirm('¿Borrar TODOS los registros de hoy? Esta acción no se puede deshacer.')) return;
  const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',hoy())));
  const batch = writeBatch(db);
  snap.docs.forEach(d => batch.delete(doc(db,'rutas',d.id)));
  await batch.commit();
  clearCache();
  toast('Registros del día borrados');
};

window.exportarPDFHistorial = function() {
  const all = CACHE.rutasTodas || [];
  const filtFecha = document.getElementById('hist-filtFecha')?.value || '';
  const filtMot = document.getElementById('hist-filtMot')?.value || '';
  const filtEst = document.getElementById('hist-filtEst')?.value || '';

  let rows = all.filter(r => {
    if (filtFecha && r.fecha !== filtFecha) return false;
    if (filtMot && r.motorista !== filtMot) return false;
    if (filtEst && r.estado !== filtEst) return false;
    return true;
  });

  const totEnt = rows.filter(r=>r.estado==='entregada').length;
  const totContado = rows.filter(r=>r.estado==='entregada'&&r.tipoPago==='Contado').reduce((a,r)=>a+(parseFloat(r.monto)||0),0);

  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Historial PICME</title>
  <style>
    body{font-family:Arial,sans-serif;color:#1a2535;padding:20px;font-size:12px}
    h1{color:#185FA5;font-size:18px} .kpi-r{display:flex;gap:12px;margin:8px 0}
    .kpi{background:#f0f6fd;padding:8px 12px;border-radius:6px;min-width:120px}
    .kpi-n{font-size:20px;font-weight:700;color:#185FA5} .kpi-l{font-size:9px;color:#7a90aa;text-transform:uppercase}
    table{width:100%;border-collapse:collapse;margin-top:10px;font-size:11px}
    th{background:#f7f9fc;padding:6px 8px;text-align:left;border-bottom:2px solid #dce4ef;font-size:10px;text-transform:uppercase;color:#7a90aa}
    td{padding:6px 8px;border-bottom:1px solid #eef2f7}
    .green{color:#1e7d3a} .red{color:#c0392b} .blue{color:#185FA5}
    @media print{body{margin:0;padding:10px}}
  </style></head><body>
  <h1>PICME — Historial de Entregas</h1>
  <p>Filtros: ${filtFecha?'Fecha: '+fmtFecha(filtFecha)+' · ':''}${filtMot?'Motorista aplicado · ':''}${filtEst?'Estado: '+filtEst:''} | Generado: ${new Date().toLocaleString('es')}</p>
  <div class="kpi-r">
    <div class="kpi"><div class="kpi-n">${rows.length}</div><div class="kpi-l">Total Registros</div></div>
    <div class="kpi"><div class="kpi-n">${totEnt}</div><div class="kpi-l">Entregadas</div></div>
    <div class="kpi"><div class="kpi-n">$${totContado.toFixed(2)}</div><div class="kpi-l">Contado Cobrado</div></div>
  </div>
  <table><thead><tr><th>Factura</th><th>Cliente</th><th>Motorista</th><th>Monto</th><th>Pago</th><th>Estado</th><th>Hora</th><th>Fecha</th><th>Motivo</th></tr></thead><tbody>`;

  rows.slice(0,500).forEach(r => {
    const est = r.estado==='entregada' ? 'green' : r.estado==='no-entregada' ? 'red' : '';
    html += `<tr><td>#${r.factura}</td><td>${r.nombre||r.cliente||'—'}</td><td>${r.motoristaNombre||'—'}</td>
      <td>${r.monto?'$'+r.monto:'—'}</td><td>${r.tipoPago||'—'}</td>
      <td class="${est}">${r.estado}</td><td>${r.horaEnt||'—'}</td><td>${fmtFecha(r.fecha)}</td>
      <td style="color:#c0392b">${r.motivo||''}</td></tr>`;
  });

  if (rows.length > 500) html += `<tr><td colspan="9" style="text-align:center;color:#7a90aa;font-style:italic">... y ${rows.length-500} registros más (exportar CSV para todos)</td></tr>`;

  html += `</tbody></table><p style="font-size:10px;color:#7a90aa;margin-top:20px">PICME S.A. DE C.V. · v16</p></body></html>`;

  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 400);
};

// ── EXPORTAR CSV ──────────────────────────────────────────
function toCSV(rows) {
  let c = 'Factura,Cliente,Motorista,Direccion,Municipio,Monto,Pedido,Estado,Hora,Motivo,TipoPago,Fecha\n';
  rows.forEach(r => {
    c += [r.factura, '"'+(r.nombre||r.cliente||'')+'"', '"'+(r.motoristaNombre||r.motorista||'')+'"',
      '"'+(r.direccion||'')+'"', '"'+(r.municipio||'')+'"', r.monto||'', r.pedido||'',
      r.estado, r.horaEnt||'', '"'+(r.motivo||'')+'"', r.tipoPago||'', r.fecha||''
    ].join(',') + '\n';
  });
  return c;
}
function dl(csv, nom) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = nom; a.click();
}
window.expHoy = async function() {
  const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',hoy())));
  dl(toCSV(snap.docs.map(d=>d.data())), 'entregas_'+hoy()+'.csv');
};
window.expDia = async function(fecha) {
  const snap = await getDocs(query(collection(db,'rutas'), where('fecha','==',fecha)));
  dl(toCSV(snap.docs.map(d=>d.data())), 'entregas_'+fecha+'.csv');
};
window.expTodo = async function() {
  const snap = await getDocs(collection(db,'rutas'));
  dl(toCSV(snap.docs.map(d=>d.data())), 'entregas_historial.csv');
};

// ── CSV PARSER ────────────────────────────────────────────
function parseCsvLine(line) {
  const result=[]; let cur='', inQ=false;
  for (let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

// ── SBTN (admin table collapse) ───────────────────────────
window.sbtn = function(el) { el.nextElementSibling?.classList.toggle('open'); };

// ── BOOT ──────────────────────────────────────────────────
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

function showLogin() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  renderLogin();
}

// Muestra el login INMEDIATAMENTE con datos locales,
// luego sincroniza Firestore en background sin bloquear.
function bootApp() {
  // Cancelar el fallback de emergencia — el módulo cargó correctamente
  if (window._clearFallback) window._clearFallback();

  // 1. Restaurar desde localStorage al instante
  try {
    const saved = JSON.parse(localStorage.getItem('picme_usuarios') || '[]');
    saved.forEach(s => {
      const u = USUARIOS.find(u => u.id === s.id);
      if (u) { u.nombre = s.nombre; u.pin = s.pin; }
      else if (s.id && s.rol) USUARIOS.push(s); // usuario nuevo no en defaults
    });
  } catch(e) {}

  // 2. Mostrar login YA — no esperar Firebase
  showLogin();
  // 3. Sync Firestore en background
  withTimeout(getDocs(collection(db, 'usuarios')), 6000)
    .then(snap => {
      if (!snap.empty) {
        snap.forEach(d => {
          const s = d.data();
          if (!s.id) return;
          const idx = USUARIOS.findIndex(u => u.id === s.id);
          if (idx !== -1) {
            // Actualizar usuario existente
            USUARIOS[idx] = { ...USUARIOS[idx], ...s };
          } else {
            // Usuario nuevo guardado en Firestore que no está en el array base
            USUARIOS.push({
              id: s.id,
              nombre: s.nombre || s.id,
              pin: s.pin || '',
              rol: s.rol || 'motorista',
              icon: s.icon || 'ti-motorbike',
            });
          }
        });
        // Guardar en localStorage para próxima carga offline
        try { localStorage.setItem('picme_usuarios', JSON.stringify(USUARIOS)); } catch(e) {}
        if (!currentUser) renderLogin(); // actualizar lista si aún en login
      } else {
        // Primera vez: sembrar en Firestore
        try {
          const batch = writeBatch(db);
          USUARIOS.forEach(u => {
            batch.set(doc(db, 'usuarios', u.id), {
              id: u.id, nombre: u.nombre, pin: u.pin, rol: u.rol, icon: u.icon
            });
          });
          withTimeout(batch.commit(), 5000).catch(() => {});
        } catch(e) {}
      }
    })
    .catch(() => { /* sin conexión — ya estamos en el login con datos por defecto */ });
}

setTimeout(() => {
  try {
    bootApp();
  } catch(e) {
    console.error('bootApp error:', e);
    showLogin();
  }
}, 300);

// Exponer showLogin al scope global por si el fallback lo necesita
window._showLoginFallback = function() {
  try { showLogin(); } catch(e) {
    var l = document.getElementById('loading');
    var lg = document.getElementById('login');
    if(l) l.style.display='none';
    if(lg) lg.style.display='flex';
  }
};
